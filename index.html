<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#f8fafc" />
  <title>VynixPanelB - AI Damage Estimator</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Inter', 'sans-serif'] },
          colors: {
            brand: { 50: '#eff6ff', 100: '#dbeafe', 500: '#3b82f6', 600: '#2563eb', 900: '#1e3a8a' }
          },
          animation: {
            'slide-up': 'slideUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards',
            'float': 'float 3s ease-in-out infinite',
            'scan': 'scan 1.5s ease-in-out infinite',
            'pulse-soft': 'pulseSoft 2s cubic-bezier(0.4, 0, 0.6, 1) infinite',
          },
          keyframes: {
            slideUp: {
              '0%': { opacity: '0', transform: 'translateY(15px)' },
              '100%': { opacity: '1', transform: 'translateY(0)' },
            },
            float: {
              '0%, 100%': { transform: 'translateY(0)' },
              '50%': { transform: 'translateY(-8px)' },
            },
            scan: {
              '0%': { transform: 'translateY(0)' },
              '50%': { transform: 'translateY(64px)' },
              '100%': { transform: 'translateY(0)' },
            },
            pulseSoft: {
              '0%, 100%': { opacity: '1' },
              '50%': { opacity: '.7' },
            }
          }
        }
      }
    }
  </script>

  <style>
    body { 
      background-color: #f8fafc; 
      color: #0f172a; 
      margin: 0; 
      -webkit-font-smoothing: antialiased; 
      -webkit-tap-highlight-color: transparent; /* Removes blue tap highlight on mobile */
      overscroll-behavior-y: none; /* Prevents pull-to-refresh blank spaces */
    }
    
    /* Hide scrollbar for a clean, app-like feel */
    ::-webkit-scrollbar { display: none; }
    * { scrollbar-width: none; }
  </style>

  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
</head>
<body class="bg-gradient-to-br from-slate-50 to-slate-100 min-h-[100dvh]">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    // --- FIREBASE INITIALIZATION ---
    const firebaseConfig = {
      apiKey: "AIzaSyCh7Ute6LeSAxcNDEQwZg5m0cA4ujnLCfg",
      authDomain: "test-17881.firebaseapp.com",
      projectId: "test-17881",
      storageBucket: "test-17881.firebasestorage.app",
      messagingSenderId: "1057428047643",
      appId: "1:1057428047643:web:f3801c0d933225a5cd35be"
    };

    if (!firebase.apps.length) {
      firebase.initializeApp(firebaseConfig);
    }
    const auth = firebase.auth();
    const db = firebase.database();
    const googleProvider = new firebase.auth.GoogleAuthProvider();

    // --- CONSTANTS ---
    const CLOUDINARY_UPLOAD_URL = 'https://api.cloudinary.com/v1_1/dqkujefxj/image/upload';
    const CLOUDINARY_UPLOAD_PRESET = 'banter_box';
    const LABOR_RATE_ZAR = 750;

    // --- ICONS (Inline SVGs) ---
    const IconWrench = () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24" strokeWidth="2"><path strokeLinecap="round" strokeLinejoin="round" d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/></svg>;
    const IconDashboard = () => <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" strokeWidth="2"><rect x="3" y="3" width="7" height="9" rx="1"/><rect x="14" y="3" width="7" height="5" rx="1"/><rect x="14" y="12" width="7" height="9" rx="1"/><rect x="3" y="16" width="7" height="5" rx="1"/></svg>;
    const IconCar = () => <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" strokeWidth="2"><path strokeLinecap="round" strokeLinejoin="round" d="M19 17h2c.6 0 1-.4 1-1v-3c0-.9-.7-1.7-1.5-1.9C18.7 10.6 16 10 16 10s-1.3-1.4-2.2-2.3c-.5-.4-1.1-.7-1.8-.7H5c-.6 0-1.1.4-1.4.8l-1.4 2.5C1.5 10.6 1 11.3 1 12v4c0 .6.4 1 1 1h2m15 0a2.5 2.5 0 1 1-5 0m5 0a2.5 2.5 0 1 0-5 0m-10 0a2.5 2.5 0 1 1-5 0m5 0a2.5 2.5 0 1 0-5 0m10-4H9"/></svg>;
    const IconLogout = () => <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" strokeWidth="2"><path strokeLinecap="round" strokeLinejoin="round" d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4m7 14l5-5-5-5m5 5H9"/></svg>;
    const IconUpload = () => <svg className="w-10 h-10 mb-2" fill="none" stroke="currentColor" viewBox="0 0 24 24" strokeWidth="2"><path strokeLinecap="round" strokeLinejoin="round" d="M4 14.899A7 7 0 1 1 15.71 8h1.79a4.5 4.5 0 0 1 2.5 8.242M12 12v9m-4-4l4-4 4 4"/></svg>;
    const IconSpinner = () => <svg className="w-10 h-10 animate-spin" fill="none" stroke="currentColor" viewBox="0 0 24 24" strokeWidth="2"><circle cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="4" strokeDasharray="30" strokeDashoffset="10" strokeLinecap="round" opacity="0.3"/><path d="M12 2a10 10 0 0 1 10 10" stroke="currentColor" strokeWidth="4" strokeLinecap="round"/></svg>;
    const IconChevronRight = () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" strokeWidth="2"><path strokeLinecap="round" strokeLinejoin="round" d="M9 5l7 7-7 7"/></svg>;
    const IconCamera = () => <svg className="w-16 h-16" fill="none" stroke="currentColor" viewBox="0 0 24 24" strokeWidth="2"><path strokeLinecap="round" strokeLinejoin="round" d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>;
    const IconCheckCircle = () => <svg className="w-16 h-16" fill="none" stroke="currentColor" viewBox="0 0 24 24" strokeWidth="2"><path strokeLinecap="round" strokeLinejoin="round" d="M22 11.08V12a10 10 0 1 1-5.93-9.14M22 4L12 14.01l-3-3"/></svg>;
    const IconSmallCheck = () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" strokeWidth="2"><path strokeLinecap="round" strokeLinejoin="round" d="M5 13l4 4L19 7"/></svg>;
    const IconGoogle = () => <svg className="w-5 h-5" viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>;

    // --- ESTIMATE WIZARD COMPONENT ---
    function EstimateWizard({ onComplete }) {
      const [step, setStep] = useState(1);
      const [isUploading, setIsUploading] = useState(false);
      const [isAnalyzing, setIsAnalyzing] = useState(false);
      
      const [vehicleInfo, setVehicleInfo] = useState({ vin: '', make: '', model: '' });
      const [images, setImages] = useState([]);
      const [estimateData, setEstimateData] = useState(null);

      // Cloudinary Upload Logic
      const handleImageUpload = async (e) => {
        const files = Array.from(e.target.files);
        if (files.length === 0) return;
        
        setIsUploading(true);
        const uploadedUrls = [];

        for (const file of files) {
          const formData = new FormData();
          formData.append('file', file);
          formData.append('upload_preset', CLOUDINARY_UPLOAD_PRESET);

          try {
            const response = await fetch(CLOUDINARY_UPLOAD_URL, {
              method: 'POST',
              body: formData,
            });
            const data = await response.json();
            if (data.secure_url) {
              uploadedUrls.push(data.secure_url);
            }
          } catch (error) {
            console.error("Cloudinary upload failed:", error);
          }
        }

        setImages((prev) => [...prev, ...uploadedUrls]);
        setIsUploading(false);
      };

      // AI Simulation Logic
      useEffect(() => {
        if (step === 3) {
          setIsAnalyzing(true);
          const timer = setTimeout(() => {
            const damageTypes = [
              { type: 'Dent (Deep)', panels: 2, hoursPerPanel: 2.5, partsCost: 450 },
              { type: 'Scratch (Surface)', panels: 1, hoursPerPanel: 1.0, partsCost: 150 },
            ];
            
            let totalHours = 0;
            let totalParts = 0;
            
            const lineItems = damageTypes.map(damage => {
              const laborHours = damage.panels * damage.hoursPerPanel;
              const laborCost = laborHours * LABOR_RATE_ZAR;
              const itemPartsCost = damage.panels * damage.partsCost;
              totalHours += laborHours;
              totalParts += itemPartsCost;
              
              return {
                description: `${damage.type} - ${damage.panels} panel(s)`,
                laborHours,
                laborCost,
                partsCost: itemPartsCost,
                total: laborCost + itemPartsCost
              };
            });

            const subtotal = (totalHours * LABOR_RATE_ZAR) + totalParts;
            const tax = subtotal * 0.15; 

            setEstimateData({
              lineItems, totalHours, laborRate: LABOR_RATE_ZAR, totalParts, subtotal, tax, grandTotal: subtotal + tax
            });
            
            setIsAnalyzing(false);
          }, 3500); 

          return () => clearTimeout(timer);
        }
      }, [step]);

      // Save to Firebase RTDB
      const handleSaveEstimate = async () => {
        if (!estimateData) return;
        
        const estimatePayload = {
          technicianId: auth.currentUser?.uid || 'unknown',
          vehicle: vehicleInfo,
          photos: images,
          financials: estimateData,
          status: 'pending',
          createdAt: firebase.database.ServerValue.TIMESTAMP
        };

        try {
          await db.ref('estimates').push(estimatePayload);
          onComplete(); 
        } catch (error) {
          console.error("Firebase save failed:", error);
          alert("Error saving estimate.");
        }
      };

      return (
        <div className="max-w-3xl mx-auto space-y-4 md:space-y-6">
          {/* Wizard Header Progress - Optimized for mobile scrolling/fitting */}
          <div className="flex items-center justify-between bg-white/80 backdrop-blur-xl border border-white shadow-sm rounded-full px-4 py-3 sm:px-6 sm:py-4 animate-slide-up">
            {[1, 2, 3, 4].map((num) => (
              <div key={num} className={`flex items-center gap-2 ${step >= num ? 'text-brand-600' : 'text-slate-400'}`}>
                <div className={`w-8 h-8 flex items-center justify-center rounded-full border-2 text-sm font-bold transition-all duration-300 ${step >= num ? 'border-brand-500 bg-brand-50 shadow-[0_0_15px_rgba(59,130,246,0.2)] scale-110' : 'border-slate-300 bg-white'}`}>
                  {num}
                </div>
                <div className="hidden md:block text-sm font-semibold">
                  {num === 1 ? 'Vehicle' : num === 2 ? 'Capture' : num === 3 ? 'AI Scan' : 'Summary'}
                </div>
              </div>
            ))}
          </div>

          {/* Wizard Content Panel */}
          <div className="bg-white/90 backdrop-blur-xl border border-white shadow-xl rounded-[2rem] p-5 sm:p-8 min-h-[400px] transition-all duration-500">
            
            {/* STEP 1 */}
            {step === 1 && (
              <div className="space-y-6 animate-slide-up">
                <h2 className="text-xl sm:text-2xl font-bold text-slate-800">Vehicle Details</h2>
                <div className="space-y-4">
                  <input type="text" placeholder="VIN Number" value={vehicleInfo.vin} onChange={(e) => setVehicleInfo({...vehicleInfo, vin: e.target.value})} className="w-full bg-slate-50 border border-slate-200 text-slate-800 rounded-2xl px-5 py-4 focus:bg-white focus:border-brand-500 focus:ring-4 focus:ring-brand-500/20 outline-none transition-all shadow-sm text-base" />
                  {/* Mobile responsive flex-col to sm:flex-row */}
                  <div className="flex flex-col sm:flex-row gap-4">
                    <input type="text" placeholder="Make" value={vehicleInfo.make} onChange={(e) => setVehicleInfo({...vehicleInfo, make: e.target.value})} className="w-full sm:w-1/2 bg-slate-50 border border-slate-200 text-slate-800 rounded-2xl px-5 py-4 focus:bg-white focus:border-brand-500 focus:ring-4 focus:ring-brand-500/20 outline-none transition-all shadow-sm text-base" />
                    <input type="text" placeholder="Model" value={vehicleInfo.model} onChange={(e) => setVehicleInfo({...vehicleInfo, model: e.target.value})} className="w-full sm:w-1/2 bg-slate-50 border border-slate-200 text-slate-800 rounded-2xl px-5 py-4 focus:bg-white focus:border-brand-500 focus:ring-4 focus:ring-brand-500/20 outline-none transition-all shadow-sm text-base" />
                  </div>
                </div>
                <button 
                  disabled={!vehicleInfo.vin || !vehicleInfo.make} 
                  onClick={() => setStep(2)}
                  className="mt-6 flex items-center justify-center gap-2 w-full md:w-auto px-8 py-4 rounded-full bg-brand-600 hover:bg-brand-500 hover:-translate-y-1 hover:shadow-lg hover:shadow-brand-500/30 disabled:bg-slate-300 disabled:hover:translate-y-0 disabled:shadow-none text-white font-semibold transition-all ml-auto text-lg md:text-base"
                >
                  Next Step <IconChevronRight />
                </button>
              </div>
            )}

            {/* STEP 2 */}
            {step === 2 && (
              <div className="space-y-6 animate-slide-up">
                <h2 className="text-xl sm:text-2xl font-bold text-slate-800">Damage Capture</h2>
                <p className="text-slate-500 text-sm sm:text-base">Upload at least 4 angles of the damage for accurate AI analysis.</p>
                
                <label className="flex flex-col items-center justify-center w-full h-48 sm:h-56 border-2 border-dashed border-brand-300 bg-brand-50/50 rounded-3xl cursor-pointer hover:bg-brand-50 hover:border-brand-400 transition-all group">
                  {isUploading ? (
                    <div className="text-brand-500"><IconSpinner /></div>
                  ) : (
                    <div className="text-slate-500 flex flex-col items-center group-hover:scale-105 transition-transform">
                      <div className="text-brand-400"><IconUpload /></div>
                      <span className="font-medium text-sm sm:text-base">Tap to Upload Images</span>
                    </div>
                  )}
                  <input type="file" multiple accept="image/*" className="hidden" onChange={handleImageUpload} disabled={isUploading} />
                </label>

                {images.length > 0 && (
                  /* Mobile responsive grid columns */
                  <div className="grid grid-cols-2 sm:grid-cols-4 gap-3 mt-4">
                    {images.map((img, idx) => (
                      <img key={idx} src={img} alt="Damage" className="w-full h-24 object-cover rounded-2xl shadow-sm border border-slate-100 animate-slide-up" style={{ animationDelay: `${idx * 100}ms` }} />
                    ))}
                  </div>
                )}

                <div className="flex flex-col-reverse sm:flex-row justify-between gap-4 mt-8">
                  <button onClick={() => setStep(1)} className="w-full sm:w-auto px-6 py-4 sm:py-3 rounded-full bg-slate-100 hover:bg-slate-200 text-slate-600 font-medium transition-colors">Back</button>
                  <button 
                    disabled={images.length < 1 || isUploading} 
                    onClick={() => setStep(3)}
                    className="flex justify-center items-center gap-2 w-full sm:w-auto px-8 py-4 sm:py-3 rounded-full bg-brand-600 hover:bg-brand-500 hover:-translate-y-1 hover:shadow-lg hover:shadow-brand-500/30 disabled:bg-slate-300 disabled:hover:translate-y-0 disabled:shadow-none text-white font-semibold transition-all"
                  >
                    Run AI Analysis <IconChevronRight />
                  </button>
                </div>
              </div>
            )}

            {/* STEP 3 */}
            {step === 3 && (
              <div className="flex flex-col items-center justify-center h-[50vh] sm:h-80 space-y-6 animate-slide-up">
                {isAnalyzing ? (
                  <>
                    <div className="relative animate-float">
                      <div className="text-brand-200"><IconCamera /></div>
                      <div className="absolute top-0 left-0 w-full h-1 bg-brand-500 shadow-[0_0_15px_#3b82f6] animate-scan rounded-full" />
                    </div>
                    <h2 className="text-lg sm:text-xl font-bold text-slate-800 animate-pulse-soft text-center">Running Neural Analysis...</h2>
                    <p className="text-slate-500 bg-brand-50 px-4 py-1 rounded-full text-xs sm:text-sm text-center">Detecting dents, scratches, and panel integrity</p>
                  </>
                ) : (
                  <>
                    <div className="text-green-500 bg-green-50 p-3 rounded-full shadow-[0_0_20px_rgba(34,197,94,0.3)] animate-slide-up"><IconCheckCircle /></div>
                    <h2 className="text-2xl font-bold text-slate-800 animate-slide-up" style={{ animationDelay: '100ms' }}>Analysis Complete</h2>
                    <button onClick={() => setStep(4)} className="w-full sm:w-auto px-8 py-4 mt-4 rounded-full bg-brand-600 hover:bg-brand-500 hover:-translate-y-1 hover:shadow-lg hover:shadow-brand-500/30 text-white font-semibold transition-all animate-slide-up" style={{ animationDelay: '200ms' }}>
                      View Estimate Breakdown
                    </button>
                  </>
                )}
              </div>
            )}

            {/* STEP 4 */}
            {step === 4 && estimateData && (
              <div className="space-y-6 animate-slide-up">
                <h2 className="text-xl sm:text-2xl font-bold text-slate-800 border-b border-slate-100 pb-4">Estimate Summary</h2>
                
                <div className="bg-slate-50 rounded-2xl p-4 sm:p-5 border border-slate-200 shadow-sm space-y-3">
                  <h3 className="text-brand-600 font-bold mb-3 flex items-center gap-2 text-sm sm:text-base"><div className="w-4 h-4"><IconWrench/></div> Detected Line Items</h3>
                  {estimateData.lineItems.map((item, idx) => (
                    <div key={idx} className="flex flex-col sm:flex-row justify-between text-sm py-2 border-b border-slate-200/50 last:border-0 gap-1">
                      <span className="text-slate-600 font-medium">{item.description}</span>
                      <span className="font-mono text-slate-900 font-bold text-right">R {item.total.toFixed(2)}</span>
                    </div>
                  ))}
                </div>

                <div className="space-y-2 text-right bg-white p-4 rounded-2xl border border-slate-100 text-xs sm:text-sm">
                  <div className="text-slate-500 flex justify-between sm:justify-end gap-4">Total Labor ({estimateData.totalHours}h): <span className="text-slate-800 font-mono w-24 text-right">R {(estimateData.totalHours * estimateData.laborRate).toFixed(2)}</span></div>
                  <div className="text-slate-500 flex justify-between sm:justify-end gap-4">Total Parts: <span className="text-slate-800 font-mono w-24 text-right">R {estimateData.totalParts.toFixed(2)}</span></div>
                  <div className="text-slate-500 flex justify-between sm:justify-end gap-4">Subtotal: <span className="text-slate-800 font-mono w-24 text-right">R {estimateData.subtotal.toFixed(2)}</span></div>
                  <div className="text-slate-500 flex justify-between sm:justify-end gap-4">VAT (15%): <span className="text-slate-800 font-mono w-24 text-right">R {estimateData.tax.toFixed(2)}</span></div>
                  <div className="text-lg sm:text-xl font-bold text-brand-600 mt-4 pt-4 border-t border-slate-200 flex justify-between sm:justify-end gap-4 items-center">
                    Grand Total: <span className="font-mono bg-brand-50 px-3 py-1 rounded-lg">R {estimateData.grandTotal.toFixed(2)}</span>
                  </div>
                </div>

                <div className="flex flex-col-reverse sm:flex-row justify-between gap-4 mt-8 pt-4">
                  <button onClick={() => setStep(1)} className="w-full sm:w-auto px-6 py-4 sm:py-3 rounded-full bg-slate-100 hover:bg-slate-200 text-slate-600 font-medium transition-colors">Discard</button>
                  <button 
                    onClick={handleSaveEstimate}
                    className="flex justify-center items-center gap-2 w-full sm:w-auto px-8 py-4 sm:py-3 rounded-full bg-brand-600 hover:bg-brand-500 hover:-translate-y-1 hover:shadow-lg hover:shadow-brand-500/30 text-white font-semibold transition-all"
                  >
                    Save to Database <IconSmallCheck />
                  </button>
                </div>
              </div>
            )}
          </div>
        </div>
      );
    }

    // --- MAIN APP SHELL ---
    function App() {
      const [user, setUser] = useState(null);
      const [view, setView] = useState('dashboard'); 
      const [loadingAuth, setLoadingAuth] = useState(true);

      useEffect(() => {
        const unsubscribe = auth.onAuthStateChanged((currentUser) => {
          setUser(currentUser);
          setLoadingAuth(false);
        });
        return () => unsubscribe();
      }, []);

      const handleGoogleLogin = async () => {
        try {
          await auth.signInWithPopup(googleProvider);
        } catch (error) {
          console.error("Login failed:", error);
          alert("Login failed: " + error.message);
        }
      };

      const handleLogout = () => auth.signOut();

      if (loadingAuth) {
        return <div className="min-h-screen flex items-center justify-center bg-slate-50"><IconSpinner className="text-brand-500"/></div>;
      }

      if (!user) {
        return (
          <div className="min-h-[100dvh] flex items-center justify-center p-5 relative overflow-hidden">
            {/* Background Decorative Blobs */}
            <div className="absolute top-[-10%] left-[-10%] w-72 h-72 md:w-96 md:h-96 bg-brand-200/50 rounded-full mix-blend-multiply filter blur-3xl opacity-70 animate-float"></div>
            <div className="absolute bottom-[-10%] right-[-10%] w-72 h-72 md:w-96 md:h-96 bg-blue-200/50 rounded-full mix-blend-multiply filter blur-3xl opacity-70 animate-float" style={{ animationDelay: '1.5s' }}></div>
            
            <div className="w-full max-w-md bg-white/80 backdrop-blur-xl border border-white/40 rounded-[2rem] p-8 md:p-10 shadow-2xl animate-slide-up relative z-10">
              <div className="flex justify-center mb-8 animate-float">
                <div className="w-20 h-20 p-4 bg-gradient-to-br from-brand-500 to-brand-600 text-white rounded-2xl shadow-lg shadow-brand-500/30 transform rotate-3">
                  <IconWrench />
                </div>
              </div>
              <h2 className="text-2xl md:text-3xl font-extrabold text-center text-slate-800 mb-2">VynixPanelB</h2>
              <p className="text-center text-slate-500 mb-8 font-medium text-sm md:text-base">Technician Workspace</p>
              
              <button 
                onClick={handleGoogleLogin} 
                className="w-full flex items-center justify-center gap-3 py-4 px-6 rounded-full bg-white border border-slate-200 text-slate-700 font-semibold shadow-sm hover:shadow-md hover:-translate-y-1 transition-all duration-300 text-[15px]"
              >
                <IconGoogle />
                Continue with Google
              </button>
            </div>
          </div>
        );
      }

      return (
        <div className="min-h-[100dvh] flex flex-col md:flex-row bg-slate-50 text-slate-800 font-sans">
          
          {/* Desktop Sidebar (Hidden on Mobile) */}
          <nav className="hidden md:flex flex-col w-72 bg-white border-r border-slate-200 p-6 shadow-sm z-10 h-screen sticky top-0">
            <div className="flex items-center gap-3 mb-10 px-2">
              <div className="w-10 h-10 p-2 bg-brand-600 text-white rounded-xl shadow-md"><IconWrench /></div>
              <span className="text-2xl font-bold tracking-tight">VynixPanelB</span>
            </div>
            
            <div className="space-y-2 flex-1">
              <button onClick={() => setView('dashboard')} className={`w-full flex items-center gap-4 px-4 py-4 rounded-2xl font-medium transition-all duration-300 ${view === 'dashboard' ? 'bg-brand-50 text-brand-700 shadow-sm' : 'text-slate-600 hover:bg-slate-50 hover:text-slate-900'}`}>
                <IconDashboard /> Dashboard
              </button>
              <button onClick={() => setView('wizard')} className={`w-full flex items-center gap-4 px-4 py-4 rounded-2xl font-medium transition-all duration-300 ${view === 'wizard' ? 'bg-brand-50 text-brand-700 shadow-sm' : 'text-slate-600 hover:bg-slate-50 hover:text-slate-900'}`}>
                <IconCar /> New Estimate
              </button>
            </div>

            <div className="border-t border-slate-100 pt-6 mt-6">
              <div className="flex items-center gap-3 px-2 mb-4 w-full">
                <img src={user.photoURL || "https://ui-avatars.com/api/?name="+user.displayName} alt="Avatar" className="w-10 h-10 rounded-full border border-slate-200 shrink-0" />
                <div className="overflow-hidden min-w-0">
                  <p className="text-sm font-semibold truncate">{user.displayName || "Technician"}</p>
                  <p className="text-xs text-slate-500 truncate">{user.email}</p>
                </div>
              </div>
              <button onClick={handleLogout} className="w-full flex items-center justify-center gap-2 px-4 py-3 text-red-600 bg-red-50 hover:bg-red-100 rounded-xl transition-colors font-medium">
                <IconLogout /> Sign Out
              </button>
            </div>
          </nav>

          {/* Main Content Area */}
          {/* Note the custom pb calculation on mobile to avoid the bottom floating nav and safe area */}
          <main className="flex-1 p-4 md:p-8 pb-[calc(7rem+env(safe-area-inset-bottom))] md:pb-8 overflow-y-auto relative h-[100dvh] md:h-auto">
            {/* Subtle background element */}
            <div className="absolute top-0 left-0 w-full h-48 md:h-64 bg-gradient-to-b from-brand-50 to-transparent -z-10"></div>
            
            <div className="max-w-5xl mx-auto w-full">
              <header className="mb-6 md:mb-8 pt-4 md:pt-0 animate-slide-up flex flex-col md:block items-center text-center md:text-left">
                <div className="md:hidden w-12 h-12 p-2.5 bg-brand-600 text-white rounded-xl shadow-md mb-4"><IconWrench /></div>
                <h1 className="text-2xl md:text-3xl font-bold text-slate-800">{view === 'dashboard' ? 'Dashboard Overview' : 'Create Estimate'}</h1>
                <p className="text-slate-500 mt-1 text-sm md:text-base">{view === 'dashboard' ? 'Review your recent AI analyses and repairs.' : 'Follow the steps to scan vehicle damage.'}</p>
              </header>

              {view === 'wizard' ? (
                <EstimateWizard onComplete={() => setView('dashboard')} />
              ) : (
                <div className="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-4 md:gap-6 animate-slide-up">
                  {/* Dashboard Stats Placeholder */}
                  <div className="bg-white p-5 md:p-6 rounded-3xl border border-slate-100 shadow-sm flex flex-col justify-center">
                    <p className="text-slate-500 text-xs md:text-sm font-medium mb-1">Total Estimates</p>
                    <p className="text-2xl md:text-3xl font-bold text-slate-800">24</p>
                  </div>
                  <div className="bg-white p-5 md:p-6 rounded-3xl border border-slate-100 shadow-sm flex flex-col justify-center">
                    <p className="text-slate-500 text-xs md:text-sm font-medium mb-1">Pending Approval</p>
                    <p className="text-2xl md:text-3xl font-bold text-amber-500">8</p>
                  </div>
                  <div className="bg-white p-5 md:p-6 rounded-3xl border border-slate-100 shadow-sm flex flex-col justify-center sm:col-span-2 md:col-span-1">
                    <p className="text-slate-500 text-xs md:text-sm font-medium mb-1">Revenue (Month)</p>
                    <p className="text-2xl md:text-3xl font-bold text-green-500">R 45,200</p>
                  </div>

                  <div className="md:col-span-3 bg-white border border-slate-100 rounded-3xl p-5 md:p-6 shadow-sm mt-2 md:mt-4">
                    <h2 className="text-lg md:text-xl font-bold mb-4 text-slate-800">Recent Estimates</h2>
                    <div className="text-center py-10 bg-slate-50 rounded-2xl border border-dashed border-slate-200 px-4">
                      <IconCar className="w-10 h-10 text-slate-400 mx-auto mb-2" />
                      <p className="text-slate-500 font-medium text-sm md:text-base">Estimates stored in Firebase realtime database will appear here.</p>
                      <button onClick={() => setView('wizard')} className="mt-5 px-6 py-3 md:py-2 bg-white border border-slate-200 rounded-full text-slate-700 font-medium hover:bg-slate-50 transition-colors shadow-sm w-full sm:w-auto">Start New Estimate</button>
                    </div>
                  </div>
                </div>
              )}
            </div>
          </main>

          {/* Mobile Bottom Navigation (Visible ONLY on Mobile) */}
          <nav className="md:hidden fixed bottom-0 left-0 right-0 bg-white/95 backdrop-blur-xl border-t border-slate-200 px-6 py-3 pb-[calc(0.75rem+env(safe-area-inset-bottom))] flex justify-between items-center z-50 shadow-[0_-10px_40px_rgba(0,0,0,0.05)]">
            <button onClick={() => setView('dashboard')} className={`p-2 rounded-2xl flex flex-col items-center gap-1 transition-all flex-1 ${view === 'dashboard' ? 'text-brand-600' : 'text-slate-400'}`}>
              <div className={`p-2 rounded-xl ${view === 'dashboard' ? 'bg-brand-50' : 'bg-transparent'}`}>
                <IconDashboard />
              </div>
              <span className="text-[10px] font-bold tracking-wide">HOME</span>
            </button>
            
            {/* Prominent Floating Action Button for Wizard */}
            <div className="flex-1 flex justify-center">
              <button onClick={() => setView('wizard')} className="p-4 rounded-full bg-brand-600 text-white shadow-lg shadow-brand-500/40 transform -translate-y-6 hover:scale-105 active:scale-95 transition-all border-4 border-slate-50">
                <IconCar />
              </button>
            </div>
            
            <button onClick={handleLogout} className="p-2 rounded-2xl flex flex-col items-center gap-1 text-slate-400 hover:text-red-500 transition-all flex-1">
              <div className="p-2 bg-transparent">
                <IconLogout />
              </div>
              <span className="text-[10px] font-bold tracking-wide">LOGOUT</span>
            </button>
          </nav>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
