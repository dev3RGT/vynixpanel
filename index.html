      --border:rgba(0,0,0,0.07); --border2:rgba(0,0,0,0.05); --text:#0d1426; --text2:#4a5580; --text3:#8896bb;
      --accent:#1a4fff; --accent2:#0033e6; --accent-glow:rgba(26,79,255,0.25);
      --cyan:#0090ff; --green:#00b86e; --amber:#e8a000; --red:#e03030;
      --shadow:0 4px 24px rgba(0,0,0,0.08); --shadow-lg:0 8px 40px rgba(0,0,0,0.12);
      --input-bg:rgba(0,0,0,0.04); --input-border:rgba(0,0,0,0.1);
    }
    [data-theme="dark"] {
      --bg:#070c1a; --bg2:#0d1530; --surface:rgba(255,255,255,0.04); --surface2:rgba(255,255,255,0.02);
      --border:rgba(255,255,255,0.08); --border2:rgba(255,255,255,0.05); --text:#e8eeff; --text2:#8896cc; --text3:#4a5580;
      --accent:#4d7bff; --accent2:#1a4fff; --accent-glow:rgba(77,123,255,0.25);
      --cyan:#00f5ff; --green:#00ff88; --amber:#ffb800; --red:#ff5050;
      --shadow:0 4px 24px rgba(0,0,0,0.4); --shadow-lg:0 8px 40px rgba(0,0,0,0.6);
      --input-bg:rgba(255,255,255,0.05); --input-border:rgba(255,255,255,0.1);
    }
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;-webkit-font-smoothing:antialiased;overscroll-behavior-y:none;margin:0;transition:background .3s,color .3s}
    ::-webkit-scrollbar{display:none} *{scrollbar-width:none}
    .surface{background:var(--surface);border:1px solid var(--border);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px)}
    .field{background:var(--input-bg);border:1px solid var(--input-border);color:var(--text);border-radius:14px;padding:14px 18px;width:100%;outline:none;font-family:'Inter',sans-serif;font-size:15px;font-weight:500;transition:all .2s;-webkit-appearance:none}
    .field:focus{background:rgba(77,123,255,0.08);border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-glow)}
    .field::placeholder{color:var(--text3)}
    .btn-p{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;border:none;border-radius:100px;padding:14px 26px;font-family:'Inter',sans-serif;font-weight:700;font-size:15px;cursor:pointer;transition:all .22s;display:inline-flex;align-items:center;justify-content:center;gap:8px;touch-action:manipulation}
    .btn-p:hover{transform:translateY(-2px);box-shadow:0 8px 28px var(--accent-glow)}
    .btn-p:active{transform:scale(0.97)}
    .btn-p:disabled{background:var(--input-bg);color:var(--text3);cursor:not-allowed;box-shadow:none;transform:none}
    .btn-g{background:var(--input-bg);color:var(--text2);border:1px solid var(--border);border-radius:100px;padding:13px 22px;font-family:'Inter',sans-serif;font-weight:600;font-size:14px;cursor:pointer;transition:all .2s;display:inline-flex;align-items:center;justify-content:center;gap:7px}
    .btn-g:hover{background:var(--border);color:var(--text)}
    .mono{font-family:'JetBrains Mono',monospace}
    
    @keyframes slideUp{0%{opacity:0;transform:translateY(16px)}100%{opacity:1;transform:translateY(0)}}
    @keyframes shimmer{0%{background-position:-500px 0}100%{background-position:500px 0}}
    @keyframes overlayIn{0%{opacity:0}100%{opacity:1}}
    @keyframes sheetUp{0%{transform:translateY(100%);opacity:0}100%{transform:translateY(0);opacity:1}}
    @keyframes modalIn{0%{opacity:0;transform:translate(-50%,-45%) scale(0.95)}100%{opacity:1;transform:translate(-50%,-50%) scale(1)}}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
    
    .anim-up{animation:slideUp .38s cubic-bezier(.16,1,.3,1) forwards}
    .overlay-in{animation:overlayIn .2s ease forwards}
    .skel{background:linear-gradient(90deg,rgba(255,255,255,0.03) 0%,rgba(255,255,255,0.07) 50%,rgba(255,255,255,0.03) 100%);background-size:500px 100%;animation:shimmer 1.6s infinite;border-radius:14px}
    .live-dot{width:8px;height:8px;border-radius:50%;background:var(--green);display:inline-block;animation:pulse 1.5s ease-in-out infinite;margin-right:6px}
    .service-card{padding:14px 16px;border-radius:16px;border:1.5px solid var(--border);background:var(--input-bg);cursor:pointer;transition:all .2s;user-select:none}
    .service-card:hover{border-color:var(--accent);background:rgba(77,123,255,0.06)}
    .service-card.selected{border-color:var(--accent);background:rgba(77,123,255,0.12);box-shadow:0 0 0 2px var(--accent-glow)}
    .car-select-option{padding:12px 16px;border-radius:12px;cursor:pointer;transition:background .15s;border:1px solid transparent}
    .car-select-option:hover{background:rgba(77,123,255,0.08);border-color:rgba(77,123,255,0.15)}
    .car-select-option.active{background:rgba(77,123,255,0.12);border-color:rgba(77,123,255,0.3)}
    
    .dm-pill{display:flex;align-items:center;background:var(--input-bg);border:1px solid var(--border);border-radius:100px;padding:3px;gap:2px;cursor:pointer;user-select:none}
    .dm-btn{width:32px;height:32px;border-radius:100px;display:flex;align-items:center;justify-content:center;transition:all .25s;color:var(--text3)}
    .dm-btn.active{background:var(--accent);color:#fff;box-shadow:0 2px 10px var(--accent-glow)}
    
    .mobile-nav{position:fixed;bottom:0;left:0;right:0;z-index:100;background:var(--surface);border-top:1px solid var(--border);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);padding:8px 24px calc(8px + env(safe-area-inset-bottom));display:flex;align-items:center;justify-content:space-around}
    .mnav-btn{display:flex;flex-direction:column;align-items:center;gap:4px;padding:6px 12px;border:none;background:transparent;cursor:pointer;font-family:'Inter',sans-serif;font-size:9px;font-weight:700;letter-spacing:.6px;color:var(--text3);transition:all .2s}
    .mnav-btn.active{color:var(--accent)}
    .mnav-fab{width:52px;height:52px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;cursor:pointer;color:#fff;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 20px var(--accent-glow);transform:translateY(-12px)}
    
    .sidebar{width:260px;height:100vh;position:sticky;top:0;background:var(--bg2);border-right:1px solid var(--border);padding:24px 16px;display:flex;flex-direction:column}
    .snav-item{display:flex;align-items:center;gap:12px;padding:12px 16px;border-radius:14px;font-family:'Inter',sans-serif;font-size:14px;font-weight:600;cursor:pointer;background:transparent;color:var(--text2);border:1px solid transparent;transition:all .18s}
    .snav-item.active{background:rgba(77,123,255,0.1);color:var(--accent);border-color:rgba(77,123,255,0.2)}
    .snav-item:not(.active):hover{background:var(--surface);color:var(--text)}
    
    .step-dot{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;transition:all .25s;flex-shrink:0}
    .step-dot.on{background:var(--accent);color:#fff;box-shadow:0 0 0 4px var(--accent-glow)}
    .step-dot.off{background:var(--input-bg);color:var(--text3)}
    
    /* UX Feature: Account Modal / Bottom Sheet */
    .modal-overlay {position:fixed; inset:0; z-index:200; background:rgba(0,0,0,0.65); backdrop-filter:blur(4px); -webkit-backdrop-filter:blur(4px); animation:overlayIn .2s ease forwards;}
    .responsive-panel {
      position:fixed; z-index:201; background:var(--bg2); border:1px solid var(--border);
      bottom:0; left:0; right:0; top:auto; border-radius:24px 24px 0 0;
      padding:16px 20px calc(24px + env(safe-area-inset-bottom));
      animation:sheetUp .36s cubic-bezier(.16,1,.3,1) forwards; box-shadow:var(--shadow-lg);
    }
    .sheet-handle {width:40px; height:4px; background:var(--border); border-radius:100px; margin:0 auto 20px;}
    
    @media(min-width:768px){
      .responsive-panel {
        top:50%; left:50%; bottom:auto; right:auto; transform:translate(-50%,-50%);
        width:100%; max-width:400px; border-radius:24px; padding:32px;
        animation:modalIn .3s cubic-bezier(.16,1,.3,1) forwards;
      }
      .sheet-handle {display:none;}
    }

    input[type=number]::-webkit-inner-spin-button,input[type=number]::-webkit-outer-spin-button{opacity:1}
    .badge{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:100px;font-size:11px;font-weight:700;letter-spacing:.4px;font-family:'JetBrains Mono',monospace}
    .search-dropdown{position:absolute;top:calc(100% + 6px);left:0;right:0;background:var(--bg2);border:1px solid var(--border);border-radius:16px;z-index:50;max-height:260px;overflow-y:auto;box-shadow:var(--shadow-lg)}
    .qty-btn{width:32px;height:32px;border-radius:8px;border:1px solid var(--border);background:var(--input-bg);color:var(--text);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;transition:all .15s;flex-shrink:0}
    .qty-btn:hover{background:var(--accent);color:#fff;border-color:var(--accent)}
  </style>

/* ─── STEP 1: Car Selection ─── */
function CarSelector({onSelect}){
  const [make,setMake]=useState('');
  const [model,setModel]=useState('');
  const [year,setYear]=useState('');
  const [engine,setEngine]=useState('');
  const [vin,setVin]=useState('');
  const [reg,setReg]=useState('');
  const [km,setKm]=useState('');
  const [searchQ,setSearchQ]=useState('');
  const [showDrop,setShowDrop]=useState(false);
  const ref=useRef();

  const makes=Object.keys(CAR_DB).sort();
  const models=make?Object.keys(CAR_DB[make]||{}).sort():[];
  const yearRanges=make&&model?Object.keys(CAR_DB[make]?.[model]||{}):[];
  const engines=make&&model&&year?CAR_DB[make]?.[model]?.[year]||[]:[];

  const filtered=useMemo(()=>{
    if(!searchQ.trim()) return [];
    const q=searchQ.toLowerCase();
    const res=[];
    Object.entries(CAR_DB).forEach(([mk,models])=>{
      Object.entries(models).forEach(([mdl,years])=>{
        if((mk+' '+mdl).toLowerCase().includes(q)) res.push({mk,mdl});
      });
    });
    return res.slice(0,8);
  },[searchQ]);

  useEffect(()=>{
    const h=(e)=>{ if(ref.current&&!ref.current.contains(e.target)) setShowDrop(false); };
    document.addEventListener('mousedown',h);
    return()=>document.removeEventListener('mousedown',h);
  },[]);

  const canProceed = make&&model&&year&&engine&&reg;

  return(
    <div className="anim-up" style={{display:'flex',flexDirection:'column',gap:16}}>
      <div>
        <h2 style={{fontSize:20,fontWeight:800,color:'var(--text)',margin:0}}>Vehicle Check-In</h2>
        <p style={{fontSize:13,color:'var(--text2)',margin:'6px 0 0'}}>Select the vehicle entering the workshop</p>
      </div>

      {/* Quick Search */}
      <div ref={ref} style={{position:'relative'}}>
        <div style={{position:'relative'}}>
          <div style={{position:'absolute',left:16,top:'50%',transform:'translateY(-50%)',color:'var(--text3)'}}><ISearch/></div>
          <input className="field" style={{paddingLeft:44}} placeholder="Quick search make & model…"
            value={searchQ} onChange={e=>{setSearchQ(e.target.value);setShowDrop(true)}}
            onFocus={()=>setShowDrop(true)}/>
        </div>
        {showDrop&&filtered.length>0&&(
          <div className="search-dropdown">
            {filtered.map((r,i)=>(
              <div key={i} className="car-select-option" onClick={()=>{setMake(r.mk);setModel(r.mdl);setYear('');setEngine('');setSearchQ(r.mk+' '+r.mdl);setShowDrop(false)}}>
                <span style={{fontWeight:700,color:'var(--text)'}}>{r.mk}</span> <span style={{color:'var(--text2)'}}>{r.mdl}</span>
              </div>
            ))}
          </div>
        )}
      </div>

      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
        <div>
          <label style={{fontSize:11,fontWeight:700,color:'var(--text3)',marginBottom:6,display:'block',letterSpacing:'0.5px'}}>MAKE</label>
          <select className="field" value={make} onChange={e=>{setMake(e.target.value);setModel('');setYear('');setEngine('')}} style={{cursor:'pointer'}}>
            <option value="">Select Make</option>
            {makes.map(m=><option key={m} value={m}>{m}</option>)}
          </select>
        </div>
        <div>
          <label style={{fontSize:11,fontWeight:700,color:'var(--text3)',marginBottom:6,display:'block',letterSpacing:'0.5px'}}>MODEL</label>
          <select className="field" value={model} onChange={e=>{setModel(e.target.value);setYear('');setEngine('')}} disabled={!make} style={{cursor:'pointer'}}>
            <option value="">Select Model</option>
            {models.map(m=><option key={m} value={m}>{m}</option>)}
          </select>
        </div>
        <div>
          <label style={{fontSize:11,fontWeight:700,color:'var(--text3)',marginBottom:6,display:'block',letterSpacing:'0.5px'}}>YEAR RANGE</label>
          <select className="field" value={year} onChange={e=>{setYear(e.target.value);setEngine('')}} disabled={!model} style={{cursor:'pointer'}}>
            <option value="">Select Year</option>
            {yearRanges.map(y=><option key={y} value={y}>{y}</option>)}
          </select>
        </div>
        <div>
          <label style={{fontSize:11,fontWeight:700,color:'var(--text3)',marginBottom:6,display:'block',letterSpacing:'0.5px'}}>ENGINE</label>
          <select className="field" value={engine} onChange={e=>setEngine(e.target.value)} disabled={!year} style={{cursor:'pointer'}}>
            <option value="">Select Engine</option>
            {engines.map(e=><option key={e} value={e}>{e}</option>)}
          </select>
        </div>
        <div>
          <label style={{fontSize:11,fontWeight:700,color:'var(--text3)',marginBottom:6,display:'block',letterSpacing:'0.5px'}}>REG. PLATE *</label>
          <input className="field" placeholder="e.g. CA 123-456" value={reg} onChange={e=>setReg(e.target.value.toUpperCase())}/>
        </div>
        <div>
          <label style={{fontSize:11,fontWeight:700,color:'var(--text3)',marginBottom:6,display:'block',letterSpacing:'0.5px'}}>ODOMETER (km)</label>
          <input className="field" type="number" placeholder="e.g. 85000" value={km} onChange={e=>setKm(e.target.value)}/>
        </div>
      </div>
      <div>
        <label style={{fontSize:11,fontWeight:700,color:'var(--text3)',marginBottom:6,display:'block',letterSpacing:'0.5px'}}>VIN (optional)</label>
        <input className="field" placeholder="e.g. AAAAAAAAAAAAAAA" value={vin} onChange={e=>setVin(e.target.value.toUpperCase())}/>
      </div>

      <button className="btn-p" disabled={!canProceed}
        onClick={()=>onSelect({make,model,year,engine,reg,vin,km})} style={{width:'100%',marginTop:4}}>
        Select Services <IChev/>
      </button>
    </div>
  );
}

/* ─── STEP 2: Service Selection ─── */
function ServiceSelector({vehicle,onBack,onDone}){
  const [selected,setSelected]=useState({});
  const [notes,setNotes]=useState('');
  const [activeCategory,setActiveCategory]=useState(Object.keys(SERVICE_CATALOG)[0]);

  const toggle=(svc)=>{
    setSelected(p=>{
      const n={...p};
      if(n[svc.id]) delete n[svc.id];
      else n[svc.id]={...svc,qty:1};
      return n;
    });
  };

  const setQty=(id,qty)=>{
    if(qty<1){setSelected(p=>{const n={...p};delete n[id];return n;});return;}
    setSelected(p=>({...p,[id]:{...p[id],qty}}));
  };

  const total=Object.values(selected).reduce((s,i)=>s+(i.price*i.qty),0);
  const count=Object.keys(selected).length;

  return(
    <div className="anim-up" style={{display:'flex',flexDirection:'column',gap:14}}>
      <div style={{display:'flex',alignItems:'center',gap:10}}>
        <div style={{flex:1}}>
          <h2 style={{fontSize:20,fontWeight:800,color:'var(--text)',margin:0}}>Select Services</h2>
          <p style={{fontSize:12,color:'var(--text2)',margin:'4px 0 0'}}>{vehicle.make} {vehicle.model} · {vehicle.reg}</p>
        </div>
        {count>0&&<div style={{background:'rgba(77,123,255,0.12)',border:'1px solid rgba(77,123,255,0.25)',borderRadius:100,padding:'4px 14px'}}>
          <span className="mono" style={{fontSize:13,fontWeight:700,color:'var(--accent)'}}>{count} selected</span>
        </div>}
      </div>

      {/* Category Tabs */}
      <div style={{display:'flex',gap:6,overflowX:'auto',paddingBottom:4}}>
        {Object.keys(SERVICE_CATALOG).map(cat=>(
          <button key={cat} onClick={()=>setActiveCategory(cat)} style={{
            flexShrink:0,padding:'7px 14px',borderRadius:100,border:'1px solid',
            fontSize:12,fontWeight:700,cursor:'pointer',fontFamily:'Inter',transition:'all .15s',
            background:activeCategory===cat?'var(--accent)':'var(--input-bg)',
            color:activeCategory===cat?'#fff':'var(--text2)',
            borderColor:activeCategory===cat?'var(--accent)':'var(--border)'
          }}>{cat}</button>
        ))}
      </div>

      {/* Services Grid */}
      <div style={{display:'flex',flexDirection:'column',gap:8,maxHeight:340,overflowY:'auto'}}>
        {(SERVICE_CATALOG[activeCategory]||[]).map(svc=>{
          const isSel=!!selected[svc.id];
          return(
            <div key={svc.id} className={`service-card ${isSel?'selected':''}`} onClick={()=>toggle(svc)}>
              <div style={{display:'flex',alignItems:'center',gap:12}}>
                <span style={{fontSize:22,flexShrink:0}}>{svc.icon}</span>
                <div style={{flex:1,minWidth:0}}>
                  <p style={{fontSize:13,fontWeight:700,color:'var(--text)',margin:0}}>{svc.name}</p>
                  <p style={{fontSize:11,color:'var(--text3)',margin:'2px 0 0'}}>{svc.parts.join(' · ')||'Labour only'} · {svc.labor}h</p>
                </div>
                <div style={{textAlign:'right',flexShrink:0}}>
                  <p className="mono" style={{fontSize:13,fontWeight:700,color:'var(--accent)',margin:0}}>R {svc.price}</p>
                  {isSel&&<div style={{display:'flex',alignItems:'center',gap:6,marginTop:4}} onClick={e=>e.stopPropagation()}>
                    <button className="qty-btn" onClick={()=>setQty(svc.id,(selected[svc.id]?.qty||1)-1)}>-</button>
                    <span className="mono" style={{fontSize:13,fontWeight:700,color:'var(--text)',minWidth:16,textAlign:'center'}}>{selected[svc.id]?.qty||1}</span>
                    <button className="qty-btn" onClick={()=>setQty(svc.id,(selected[svc.id]?.qty||1)+1)}>+</button>
                  </div>}
                </div>
                {isSel&&<div style={{width:20,height:20,borderRadius:'50%',background:'var(--accent)',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
                  <svg className="w-3 h-3" fill="white" viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>
                </div>}
              </div>
            </div>
          );
        })}
      </div>

      <div>
        <label style={{fontSize:11,fontWeight:700,color:'var(--text3)',marginBottom:6,display:'block',letterSpacing:'0.5px'}}>MECHANIC NOTES</label>
        <textarea className="field" rows={2} placeholder="Additional observations or customer concerns…" value={notes} onChange={e=>setNotes(e.target.value)} style={{resize:'none'}}/>
      </div>

      {count>0&&(
        <div style={{background:'rgba(77,123,255,0.06)',border:'1px solid rgba(77,123,255,0.18)',borderRadius:16,padding:'12px 16px',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
          <span style={{fontSize:14,color:'var(--text2)'}}>{count} service(s) selected</span>
          <span className="mono" style={{fontSize:18,fontWeight:800,color:'var(--accent)'}}>R {total.toFixed(2)}</span>
        </div>
      )}

      <div style={{display:'flex',gap:10}}>
        <button className="btn-g" onClick={onBack} style={{flex:'0 0 auto'}}>Back</button>
        <button className="btn-p" disabled={count===0} onClick={()=>onDone(selected,notes)} style={{flex:1}}>
          Review Quote <IChev/>
        </button>
      </div>
    </div>
  );
}

/* ─── STEP 3: Review & Submit ─── */
function QuoteReview({vehicle,services,notes,onBack,onSubmit,submitting}){
  const items=Object.values(services);
  const laborTotal=items.reduce((s,i)=>s+i.labor*i.qty*LABOR,0);
  const partsTotal=items.reduce((s,i)=>s+i.price*i.qty,0);
  const subtotal=laborTotal+partsTotal;
  const vat=subtotal*0.15;
  const grand=subtotal+vat;

  return(
    <div className="anim-up" style={{display:'flex',flexDirection:'column',gap:14}}>
      <div>
        <h2 style={{fontSize:20,fontWeight:800,color:'var(--text)',margin:0}}>Review Quotation</h2>
        <p style={{fontSize:12,color:'var(--text2)',margin:'4px 0 0'}}>Confirm before sending to admin dashboard</p>
      </div>

      <div style={{background:'var(--input-bg)',borderRadius:16,border:'1px solid var(--border)',padding:'14px 16px'}}>
        <p className="mono" style={{fontSize:9,fontWeight:700,color:'var(--accent)',letterSpacing:'1px',marginBottom:10}}>VEHICLE</p>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:6,fontSize:13}}>
          {[[vehicle.make+' '+vehicle.model,vehicle.engine],[vehicle.reg,vehicle.km?vehicle.km+' km':'–'],[vehicle.year,vehicle.vin||'—']].map(([a,b],i)=>(
            <React.Fragment key={i}><span style={{color:'var(--text)',fontWeight:600}}>{a}</span><span style={{color:'var(--text2)'}}>{b}</span></React.Fragment>
          ))}
        </div>
      </div>

      <div style={{background:'var(--input-bg)',borderRadius:16,border:'1px solid var(--border)',padding:'4px 16px 12px'}}>
        <p className="mono" style={{fontSize:9,fontWeight:700,color:'var(--accent)',letterSpacing:'1px',margin:'14px 0 10px'}}>SERVICES ({items.length})</p>
        {items.map((svc,i)=>(
          <div key={i} style={{display:'flex',justifyContent:'space-between',padding:'8px 0',borderBottom:i<items.length-1?'1px solid var(--border2)':'none',fontSize:13}}>
            <div>
              <span style={{color:'var(--text)',fontWeight:600}}>{svc.name}</span>
              {svc.qty>1&&<span className="badge" style={{background:'rgba(77,123,255,0.1)',color:'var(--accent)',border:'1px solid rgba(77,123,255,0.2)',marginLeft:6,fontSize:10}}>×{svc.qty}</span>}
              <p style={{fontSize:11,color:'var(--text3)',margin:'2px 0 0'}}>{svc.labor*svc.qty}h labour</p>
            </div>
            <span className="mono" style={{fontWeight:700,color:'var(--text)'}}>R {(svc.price*svc.qty).toFixed(0)}</span>
          </div>
        ))}
      </div>

      <div style={{background:'rgba(77,123,255,0.06)',border:'1px solid rgba(77,123,255,0.18)',borderRadius:16,padding:'14px 16px'}}>
        {[[`Labour (${items.reduce((s,i)=>s+i.labor*i.qty,0).toFixed(1)}h × R${LABOR})`,`R ${laborTotal.toFixed(2)}`],['Parts & Materials',`R ${partsTotal.toFixed(2)}`],['Subtotal',`R ${subtotal.toFixed(2)}`],['VAT 15%',`R ${vat.toFixed(2)}`]].map(([l,v])=>(
          <div key={l} style={{display:'flex',justifyContent:'space-between',padding:'5px 0',fontSize:13,color:'var(--text2)'}}>
            <span>{l}</span><span className="mono" style={{color:'var(--text)',fontWeight:600}}>{v}</span>
          </div>
        ))}
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',borderTop:'1px solid rgba(77,123,255,0.2)',paddingTop:12,marginTop:6}}>
          <span style={{fontSize:15,fontWeight:800,color:'var(--accent)'}}>GRAND TOTAL</span>
          <span className="mono" style={{fontSize:22,fontWeight:800,color:'var(--accent)'}}>R {grand.toFixed(2)}</span>
        </div>
      </div>

      {notes&&<div style={{padding:12,borderRadius:12,background:'rgba(255,184,0,0.07)',border:'1px solid rgba(255,184,0,0.2)'}}>
        <p style={{fontSize:11,fontWeight:700,color:'var(--amber)',margin:'0 0 4px',letterSpacing:'0.5px'}}>MECHANIC NOTES</p>
        <p style={{fontSize:13,color:'var(--text2)',margin:0}}>{notes}</p>
      </div>}

      <div style={{padding:12,borderRadius:12,background:'rgba(0,255,136,0.06)',border:'1px solid rgba(0,255,136,0.18)'}}>
        <p style={{fontSize:12,color:'var(--green)',margin:0,fontWeight:600}}>⚡ Submitting will send this quote to the Admin Dashboard in real-time. Print is available admin-side only.</p>
      </div>

      <div style={{display:'flex',gap:10}}>
        <button className="btn-g" onClick={onBack} style={{flex:'0 0 auto'}} disabled={submitting}>Back</button>
        <button className="btn-p" onClick={()=>onSubmit({laborTotal,partsTotal,subtotal,vat,grandTotal:grand})} style={{flex:1}} disabled={submitting}>
          {submitting?<ISpin cls="w-5 h-5"/>:<><ICheck/>Send to Admin</>}
        </button>
      </div>
    </div>
  );
}

/* ─── INTAKE WIZARD ─── */
function IntakeWizard({onDone,profile}){
  const [step,setStep]=useState(1);
  const [vehicle,setVehicle]=useState(null);
  const [services,setServices]=useState({});
  const [notes,setNotes]=useState('');
  const [submitting,setSubmitting]=useState(false);

  const submit=async(totals)=>{
    setSubmitting(true);
    try{
      const items=Object.values(services).map(s=>({
        serviceId: s.id || 'unknown_service',
        name: s.name || 'Unknown Service',
        qty: s.qty || 1,
        parts: s.parts || [],
        laborHours: (s.labor || 0) * (s.qty || 1),
        unitPrice: s.price || 0,
        total: (s.price || 0) * (s.qty || 1),
        icon: s.icon || '🔧'
      }));

      const payload = {
        vehicle: {
          make: vehicle.make || '',
          model: vehicle.model || '',
          year: vehicle.year || '',
          engine: vehicle.engine || '',
          reg: vehicle.reg || '',
          vin: vehicle.vin || '',
          km: vehicle.km || ''
        },
        services: items,
        notes: notes || '',
        financials: {
          laborTotal: totals.laborTotal || 0,
          partsTotal: totals.partsTotal || 0,
          subtotal: totals.subtotal || 0,
          vat: totals.vat || 0,
          grandTotal: totals.grandTotal || 0,
          lineItems: items,
          laborRate: LABOR
        },
        mechanic: {
          uid: auth.currentUser?.uid || 'unknown_user_id',
          name: profile?.name || 'Mechanic',
          shop: profile?.shop || 'Workshop'
        },
        status: 'pending_approval',
        createdAt: Date.now(),
        updatedAt: Date.now()
      };

      await db.ref('workshop_jobs').push(payload);
      onDone();
    }catch(e){
      console.error("Firebase Submission Error:", e);
      alert('Error saving data: '+e.message);
    }
    setSubmitting(false);
  };

  const STEPS=['Vehicle','Services','Quote'];
  return(
    <div style={{maxWidth:680,margin:'0 auto'}}>
      <div className="surface" style={{borderRadius:100,padding:'10px 16px',display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:16}}>
        {STEPS.map((lbl,i)=>{const n=i+1,on=step>=n;return(
          <div key={n} style={{display:'flex',alignItems:'center',gap:6}}>
            <div className={`step-dot ${on?'on':'off'}`}>{n}</div>
            <span className="hidden sm:block" style={{fontSize:12,fontWeight:700,color:on?'var(--text)':'var(--text3)'}}>{lbl}</span>
          </div>
        );})}
      </div>
      <div className="surface" style={{borderRadius:24,padding:'24px 20px',minHeight:400}}>
        {step===1&&<CarSelector onSelect={v=>{setVehicle(v);setStep(2);}}/>}
        {step===2&&<ServiceSelector vehicle={vehicle} onBack={()=>setStep(1)} onDone={(s,n)=>{setServices(s);setNotes(n);setStep(3);}}/>}
        {step===3&&<QuoteReview vehicle={vehicle} services={services} notes={notes} onBack={()=>setStep(2)} onSubmit={submit} submitting={submitting}/>}
      </div>
    </div>
  );
}

/* ─── JOBS DASHBOARD ─── */
function JobsDash({ onNew, profile, jobs }){
  const [open,setOpen]=useState(null);

  const active=jobs?jobs.filter(j=>j.status==='pending_approval').length:0;

  return(
    <div style={{display:'flex',flexDirection:'column',gap:16}}>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
        {[
          {l:'Total Jobs',v:jobs?jobs.length:'–',c:'var(--accent)'},
          {l:'Awaiting Admin',v:jobs?active:'–',c:'var(--amber)'},
          {l:'Approved',v:jobs?jobs.filter(j=>j.status==='approved').length:'–',c:'var(--green)'},
          {l:'My Jobs',v:jobs?jobs.filter(j=>j.mechanic?.uid===auth.currentUser?.uid).length:'–',c:'var(--cyan)'},

          <div key={s.l} style={{padding:'18px 20px',borderRadius:20,background:'var(--surface)',border:'1px solid var(--border)'}}>

          <div>
            <h2 style={{fontSize:16,fontWeight:800,color:'var(--text)',margin:0}}>Workshop Jobs</h2>

            <button className="btn-p" onClick={onNew} style={{margin:'0 auto'}}>Check In Vehicle <IChev/></button>

        ):(
          <div>
            {jobs.map(job=>(
              <div key={job.id}>
                <div style={{display:'flex',alignItems:'center',gap:12,padding:'14px 20px',cursor:'pointer',borderBottom:'1px solid var(--border2)',transition:'background .15s'}}
                  onClick={()=>setOpen(open===job.id?null:job.id)}>
                  <div style={{width:38,height:38,borderRadius:12,background:'rgba(77,123,255,0.1)',border:'1px solid rgba(77,123,255,0.18)',display:'flex',alignItems:'center',justifyContent:'center',color:'var(--accent)',flexShrink:0}}>
                    <ICar/>
                  </div>
                  <div style={{flex:1,minWidth:0}}>
                    <p style={{fontSize:14,fontWeight:700,color:'var(--text)',margin:0}}>{job.vehicle?.make} {job.vehicle?.model}
                      <span className="mono" style={{fontSize:10,color:'var(--text3)',marginLeft:8}}>{job.vehicle?.reg}</span>
                    </p>
                    <p style={{fontSize:11,color:'var(--text3)',margin:'2px 0 0'}}>{job.services?.length} services · {job.mechanic?.name}</p>
                  </div>
                  <div style={{flexShrink:0,textAlign:'right'}}>
                    <span style={{display:'inline-flex',padding:'3px 10px',borderRadius:100,fontSize:10,fontWeight:700,fontFamily:'JetBrains Mono',
                      background:job.status==='approved'?'rgba(0,255,136,0.1)':job.status==='rejected'?'rgba(255,80,80,0.1)':'rgba(255,184,0,0.1)',
                      color:job.status==='approved'?'var(--green)':job.status==='rejected'?'var(--red)':'var(--amber)',
                      border:`1px solid ${job.status==='approved'?'rgba(0,255,136,0.2)':job.status==='rejected'?'rgba(255,80,80,0.2)':'rgba(255,184,0,0.2)'}`}}>
                      {job.status==='pending_approval'?'PENDING':job.status==='approved'?'APPROVED':'REJECTED'}
                    </span>
                    <p className="mono" style={{fontSize:11,fontWeight:700,color:'var(--accent)',margin:'4px 0 0'}}>R {(job.financials?.grandTotal||0).toFixed(0)}</p>
                  </div>
                </div>
                {open===job.id&&(
                  <div className="anim-up" style={{padding:'0 20px 16px',background:'var(--surface2)'}}>
                    <div style={{background:'var(--bg)',border:'1px solid var(--border)',borderRadius:16,padding:14}}>
                      <p className="mono" style={{fontSize:9,fontWeight:700,color:'var(--accent)',letterSpacing:'1px',marginBottom:8}}>SERVICES REQUESTED</p>
                      {job.services?.map((s,i)=>(
                        <div key={i} style={{display:'flex',justifyContent:'space-between',padding:'6px 0',borderBottom:'1px solid var(--border2)',fontSize:13}}>
                          <span style={{color:'var(--text2)'}}>{s.icon} {s.name}{s.qty>1?` ×${s.qty}`:''}</span>
                          <span className="mono" style={{fontWeight:700,color:'var(--text)'}}>R {s.total}</span>
                        </div>
                      ))}
                      <div style={{display:'flex',justifyContent:'space-between',marginTop:10,paddingTop:8,borderTop:'1px solid var(--border)'}}>
                        <span style={{fontWeight:800,color:'var(--accent)'}}>Grand Total (incl. VAT)</span>
                        <span className="mono" style={{fontWeight:800,color:'var(--accent)'}}>R {(job.financials?.grandTotal||0).toFixed(2)}</span>
                      </div>
                      {job.notes&&<p style={{fontSize:12,color:'var(--amber)',marginTop:8,padding:'8px 12px',background:'rgba(255,184,0,0.07)',borderRadius:8}}>📝 {job.notes}</p>}
                      <p style={{fontSize:11,color:'var(--text3)',marginTop:10}}>⚡ Awaiting admin review. Print available on Admin Dashboard.</p>
                    </div>
                  </div>
                )}
              </div>
            ))}
          </div>
        )}
      </div>
    </div>
  );
}

/* ─── APP ─── */
function App(){
  const [user,setUser]=useState(null);
  const [profile,setProfile]=useState({name:'',shop:''});
  const [view,setView]=useState('dashboard');
  const [ready,setReady]=useState(false);
  
  // SINGLE SOURCE OF TRUTH for Mechanic App
  const [jobs, setJobs] = useState(null);

  const [isAccountOpen, setIsAccountOpen] = useState(false);
  const [dark,setDark]=useState(()=>{
    const s=localStorage.getItem('vynix_theme_dark');
    return s!==null?JSON.parse(s):true;
  });

  useEffect(()=>{
    localStorage.setItem('vynix_theme_dark',JSON.stringify(dark));
    document.documentElement.setAttribute('data-theme',dark?'dark':'light');
    document.getElementById('meta-theme').content=dark?'#070c1a':'#f0f4ff';
  },[dark]);

  useEffect(()=>{
    return auth.onAuthStateChanged(u=>{
      if(u){
        setUser(u);
        const ref=db.ref(`users/${u.uid}`);
        ref.on('value',snap=>{
          if(snap.exists()) setProfile(snap.val());
          else{
            const d={name:u.displayName||'Mechanic',shop:'VynixPanelB Workshop'};
            ref.set(d); setProfile(d);
          }
        });
        setReady(true);
      }
    });
  },[]);

  // ONE Master Listener
  useEffect(()=>{
    const ref = db.ref('workshop_jobs').limitToLast(500);
    const cb = ref.on('value', snap => {
      if(!snap.exists()) {
        setJobs([]);
        return;
      }
      const arr = [];
      snap.forEach(child => {
        arr.push({ id: child.key, ...child.val() });
      });
      arr.sort((a,b) => (b.createdAt || 0) - (a.createdAt || 0));
      setJobs(arr);
    });
    return () => ref.off('value', cb); // Safely kill only this listener
  },[]);

  if(!ready||!user) return null; 

  return(
    <div style={{minHeight:'100dvh',display:'flex',flexDirection:'row'}}>
      {/* Sidebar (Desktop) */}
      <nav className="sidebar" style={{display:'none'}} id="sidebar">
        <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:28,padding:'0 4px'}}>
          <div style={{width:36,height:36,padding:8,borderRadius:12,background:'linear-gradient(135deg,#1a4fff,#0033e6)',color:'#fff',flexShrink:0}}><IWrench/></div>
          <div><span style={{fontSize:15,fontWeight:900,color:'var(--text)',display:'block'}}>VynixPanelB</span>
          <span style={{fontSize:10,color:'var(--accent)',fontFamily:'JetBrains Mono',fontWeight:600}}>MECHANIC</span></div>
        </div>
        <div style={{display:'flex',flexDirection:'column',gap:4,flex:1}}>
          {[{id:'dashboard',l:'Dashboard',I:IDash},{id:'wizard',l:'Check-In Vehicle',I:ICar}].map(({id,l,I})=>(
            <button key={id} className={`snav-item ${view===id?'active':''}`} onClick={()=>setView(id)}><I/> {l}</button>
          ))}
        </div>
        
        {/* Sidebar Bottom Profile/Settings */}
        <div style={{borderTop:'1px solid var(--border)',paddingTop:16}}>
          <div style={{display:'flex',justifyContent:'center',marginBottom:16}}><DarkModePill dark={dark} onToggle={()=>setDark(!dark)}/></div>
          
          <div 
            className="surface" 
            onClick={() => setIsAccountOpen(true)}
            style={{display:'flex',alignItems:'center',gap:10,padding:'12px',borderRadius:'16px',cursor:'pointer',transition:'background 0.2s'}}
            onMouseEnter={e => e.currentTarget.style.background = 'rgba(77,123,255,0.06)'}
            onMouseLeave={e => e.currentTarget.style.background = 'var(--surface)'}
          >
            <img src={user.photoURL||`https://ui-avatars.com/api/?name=${encodeURIComponent(profile.name)}&background=1a4fff&color=fff`} alt="" style={{width:36,height:36,borderRadius:'50%',border:'1px solid var(--border)',flexShrink:0}}/>
            <div style={{overflow:'hidden',flex:1}}>
              <p style={{fontSize:13,fontWeight:700,color:'var(--text)',margin:0,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{profile.name||'Mechanic'}</p>
              <p style={{fontSize:11,color:'var(--text3)',margin:'2px 0 0',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{profile.shop||'Workshop'}</p>
            </div>
          </div>
        </div>
      </nav>

      {/* Main Window */}
      <main id="main-content" style={{flex:1,padding:'16px',paddingBottom:'calc(88px + env(safe-area-inset-bottom))',overflowY:'auto',minHeight:'100dvh'}}>
        <div style={{maxWidth:760,margin:'0 auto'}}>
          <header className="md:hidden" style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:20}}>
            <div style={{display:'flex',alignItems:'center',gap:10}}>
              <div style={{width:34,height:34,padding:7,borderRadius:11,background:'linear-gradient(135deg,#1a4fff,#0033e6)',color:'#fff'}}><IWrench/></div>
              <div>
                <p style={{fontSize:15,fontWeight:900,color:'var(--text)',margin:0}}>VynixPanelB</p>
                <p style={{fontSize:9,color:'var(--accent)',margin:0,fontFamily:'JetBrains Mono',fontWeight:600}}>MECHANIC TERMINAL</p>
              </div>
            </div>
            <div style={{display:'flex',alignItems:'center',gap:10}}>
              <DarkModePill dark={dark} onToggle={()=>setDark(!dark)}/>
              <img 
                src={user.photoURL||`https://ui-avatars.com/api/?name=${encodeURIComponent(profile.name)}&background=1a4fff&color=fff`} 
                onClick={() => setIsAccountOpen(true)}
                alt="" style={{width:34,height:34,borderRadius:'50%',border:'1px solid var(--border)',cursor:'pointer'}}
              />
            </div>
          </header>
          <div className="hidden md:block h-[20px]"></div>
          {/* Passed centralized jobs downwards */}
          {view==='wizard'?<IntakeWizard onDone={()=>setView('dashboard')} profile={profile}/>:<JobsDash jobs={jobs} onNew={()=>setView('wizard')} profile={profile}/>}
        </div>
      </main>

      <nav className="mobile-nav md:hidden">
        <button className={`mnav-btn ${view==='dashboard'?'active':''}`} onClick={()=>setView('dashboard')}><IDash/> HOME</button>
        <button className="mnav-fab" onClick={()=>setView('wizard')}><ICar/></button>
        <button className="mnav-btn" onClick={()=>setIsAccountOpen(true)} style={{color:'var(--text3)'}}><IUser/> ACCOUNT</button>
      </nav>

      {/* Account Modal / Bottom Sheet */}
      {isAccountOpen && (
        <>
          <div className="modal-overlay" onClick={() => setIsAccountOpen(false)} />
          <div className="responsive-panel">
            <div className="sheet-handle" />

            <div style={{ textAlign: 'center', marginBottom: '24px' }}>
              <img 
                src={user.photoURL || `https://ui-avatars.com/api/?name=${encodeURIComponent(profile.name)}&background=1a4fff&color=fff`} 
                alt="Profile" 
                style={{ width: '64px', height: '64px', borderRadius: '50%', border: '2px solid var(--accent)', margin: '0 auto 12px auto' }}
              />
              <h2 style={{ fontSize: '20px', fontWeight: '900', color: 'var(--text)', margin: '0 0 4px 0' }}>{profile.name || 'Mechanic'}</h2>
              <p style={{ color: 'var(--text2)', fontSize: '13px', margin: 0 }}>{user.email}</p>
              <div style={{marginTop:'8px'}}>
                <span style={{display:'inline-block', background:'rgba(77,123,255,0.1)', color:'var(--accent)', fontSize:'10px', fontWeight:'700', padding:'3px 10px', borderRadius:'100px', border:'1px solid rgba(77,123,255,0.2)', fontFamily:'JetBrains Mono'}}>
                  {profile.shop || 'Workshop'}
                </span>
              </div>
            </div>

            <div style={{ display: 'flex', flexDirection: 'column', gap: '10px' }}>
              <button 
                style={{ background: 'rgba(224, 48, 48, 0.08)', color: 'var(--red)', border: '1px solid rgba(224, 48, 48, 0.2)', padding: '14px', borderRadius: '12px', fontSize: '14px', fontWeight: '700', cursor: 'pointer', fontFamily:'Inter', display:'flex', justifyContent:'center', alignItems:'center', gap:'8px' }}
                onClick={() => { setIsAccountOpen(false); auth.signOut(); window.location.href = 'login.html'; }}
              >
                <ILogout/> Sign Out
              </button>
              <button 
                className="btn-g"
                style={{ width: '100%', padding: '13px', fontSize: '14px', borderRadius: '12px' }}
                onClick={() => setIsAccountOpen(false)}
              >
                Cancel
              </button>
            </div>

          </div>
        </>
      )}
    </div>
  );
}

const sidebarStyle=document.createElement('style');
sidebarStyle.textContent=`@media(min-width:768px){#sidebar{display:flex!important}#main-content{padding-bottom:24px!important}.mobile-nav{display:none!important}}`;
document.head.appendChild(sidebarStyle);

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
