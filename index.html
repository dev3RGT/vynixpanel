<script type="text/babel">

// Resizes and compresses image to lightweight Base64 to save directly into Realtime DB
const processImage = (file) => {
  return new Promise((resolve) => {
    const reader = new FileReader();
    reader.onload = (e) => {
      const img = new Image();
      img.onload = () => {
        const canvas = document.createElement('canvas');
        const MAX_WIDTH = 800;
        const scaleSize = MAX_WIDTH / img.width;
        canvas.width = MAX_WIDTH;
        canvas.height = img.height * scaleSize;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
        resolve(canvas.toDataURL('image/jpeg', 0.6));
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  });
};

/* ── TOAST ── */
function Toast({message, icon='✓', color='var(--green)', onDone}){
  const [phase, setPhase] = useState('in');
  useEffect(()=>{
    const t1=setTimeout(()=>setPhase('out'),2000);
    const t2=setTimeout(()=>onDone&&onDone(),2300);
    return()=>{clearTimeout(t1);clearTimeout(t2);}
  },[]);
  return <div className={`toast ${phase}`} style={{borderColor:`rgba(${color==='var(--green)'?'0,255,136':color==='var(--red)'?'255,80,80':'77,123,255'},.2)`}}>
    <span style={{color}}>{icon}</span> <span>{message}</span>
  </div>;
}

/* ── DARK MODE PILL ── */

}

/* ── CONFIRM DIALOG ── */
function ConfirmDialog({title,message,onConfirm,onCancel,confirmLabel='Confirm',danger=true}){
  return <>
    <div className="confirm-overlay" onClick={onCancel}/>
    <div className="confirm-overlay" style={{alignItems:'center',justifyContent:'center',padding:24}}>
      <div className="confirm-box" onClick={e=>e.stopPropagation()}>
        <div style={{width:44,height:44,borderRadius:14,background:danger?'rgba(255,80,80,0.1)':'rgba(77,123,255,0.1)',display:'flex',alignItems:'center',justifyContent:'center',margin:'0 auto 16px',fontSize:20}}>
          {danger?'🗑️':'✏️'}
        </div>
        <h3 style={{fontSize:16,fontWeight:800,color:'var(--text)',textAlign:'center',margin:'0 0 8px'}}>{title}</h3>
        <p style={{fontSize:13,color:'var(--text2)',textAlign:'center',margin:'0 0 24px',lineHeight:1.6}}>{message}</p>
        <div style={{display:'flex',gap:10}}>
          <button className="btn-g" onClick={onCancel} style={{flex:1,padding:'11px',fontSize:13,borderRadius:12}}>Cancel</button>
          <button onClick={onConfirm} style={{flex:1,padding:'11px',fontSize:13,fontWeight:700,borderRadius:12,border:'none',cursor:'pointer',fontFamily:'Inter',background:danger?'rgba(255,80,80,0.9)':'var(--accent)',color:'#fff',transition:'all .18s'}}>
            {confirmLabel}
          </button>
        </div>
      </div>
    </div>
  </>;
}

/* ── CAR SELECTOR ── */
function CarSelector({onSelect,sysCars}){
  const [make,setMake]=useState('');
  const [model,setModel]=useState('');
  const [year,setYear]=useState('');
  const [engine,setEngine]=useState('');
  const [vin,setVin]=useState('');
  const [reg,setReg]=useState('');
  const [km,setKm]=useState('');
  const [searchQ,setSearchQ]=useState('');
  const [showDrop,setShowDrop]=useState(false);
  const ref=useRef();
  const makes=Object.keys(sysCars).sort();
  const models=make?Object.keys(sysCars[make]||{}).sort():[];
  const yearRanges=make&&model?Object.keys(sysCars[make]?.[model]||{}):[];
  const engines=make&&model&&year?sysCars[make]?.[model]?.[year]||[]:[];
  const filtered=useMemo(()=>{if(!searchQ.trim())return[];const q=searchQ.toLowerCase();const res=[];Object.entries(sysCars).forEach(([mk,models])=>{Object.entries(models).forEach(([mdl])=>{if((mk+' '+mdl).toLowerCase().includes(q))res.push({mk,mdl});});});return res.slice(0,8);},[searchQ,sysCars]);
  useEffect(()=>{const h=(e)=>{if(ref.current&&!ref.current.contains(e.target))setShowDrop(false)};document.addEventListener('mousedown',h);return()=>document.removeEventListener('mousedown',h);},[]);
  const canProceed=make&&model&&year&&engine&&reg;
  return(
    <div className="anim-up" style={{display:'flex',flexDirection:'column',gap:16}}>
      <div><h2 style={{fontSize:20,fontWeight:800,color:'var(--text)',margin:0}}>Vehicle Check-In</h2><p style={{fontSize:13,color:'var(--text2)',margin:'6px 0 0'}}>Select the vehicle entering the workshop</p></div>
      <div ref={ref} style={{position:'relative'}}>
        <div style={{position:'relative'}}><div style={{position:'absolute',left:16,top:'50%',transform:'translateY(-50%)',color:'var(--text3)'}}><ISearch/></div>
        <input className="field" style={{paddingLeft:44}} placeholder="Quick search make & model…" value={searchQ} onChange={e=>{setSearchQ(e.target.value);setShowDrop(true)}} onFocus={()=>setShowDrop(true)}/></div>
        {showDrop&&filtered.length>0&&<div className="search-dropdown">{filtered.map((r,i)=><div key={i} className="car-select-option" onClick={()=>{setMake(r.mk);setModel(r.mdl);setYear('');setEngine('');setSearchQ(r.mk+' '+r.mdl);setShowDrop(false)}}><span style={{fontWeight:700,color:'var(--text)'}}>{r.mk}</span> <span style={{color:'var(--text2)'}}>{r.mdl}</span></div>)}</div>}
      </div>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
        <div><label style={{fontSize:11,fontWeight:700,color:'var(--text3)',marginBottom:6,display:'block',letterSpacing:'0.5px'}}>MAKE</label><select className="field" value={make} onChange={e=>{setMake(e.target.value);setModel('');setYear('');setEngine('')}} style={{cursor:'pointer'}}><option value="">Select Make</option>{makes.map(m=><option key={m} value={m}>{m}</option>)}</select></div>
        <div><label style={{fontSize:11,fontWeight:700,color:'var(--text3)',marginBottom:6,display:'block',letterSpacing:'0.5px'}}>MODEL</label><select className="field" value={model} onChange={e=>{setModel(e.target.value);setYear('');setEngine('')}} disabled={!make} style={{cursor:'pointer'}}><option value="">Select Model</option>{models.map(m=><option key={m} value={m}>{m}</option>)}</select></div>
        <div><label style={{fontSize:11,fontWeight:700,color:'var(--text3)',marginBottom:6,display:'block',letterSpacing:'0.5px'}}>YEAR RANGE</label><select className="field" value={year} onChange={e=>{setYear(e.target.value);setEngine('')}} disabled={!model} style={{cursor:'pointer'}}><option value="">Select Year</option>{yearRanges.map(y=><option key={y} value={y}>{y}</option>)}</select></div>
        <div><label style={{fontSize:11,fontWeight:700,color:'var(--text3)',marginBottom:6,display:'block',letterSpacing:'0.5px'}}>ENGINE</label><select className="field" value={engine} onChange={e=>setEngine(e.target.value)} disabled={!year} style={{cursor:'pointer'}}><option value="">Select Engine</option>{engines.map(e=><option key={e} value={e}>{e}</option>)}</select></div>
        <div><label style={{fontSize:11,fontWeight:700,color:'var(--text3)',marginBottom:6,display:'block',letterSpacing:'0.5px'}}>REG. PLATE *</label><input className="field" placeholder="e.g. CA 123-456" value={reg} onChange={e=>setReg(e.target.value.toUpperCase())}/></div>
        <div><label style={{fontSize:11,fontWeight:700,color:'var(--text3)',marginBottom:6,display:'block',letterSpacing:'0.5px'}}>ODOMETER (km)</label><input className="field" type="number" placeholder="e.g. 85000" value={km} onChange={e=>setKm(e.target.value)}/></div>
      </div>
      <div><label style={{fontSize:11,fontWeight:700,color:'var(--text3)',marginBottom:6,display:'block',letterSpacing:'0.5px'}}>VIN (optional)</label><input className="field" placeholder="e.g. AAAAAAAAAAAAAAA" value={vin} onChange={e=>setVin(e.target.value.toUpperCase())}/></div>
      <button className="btn-p" disabled={!canProceed} onClick={()=>onSelect({make,model,year,engine,reg,vin,km})} style={{width:'100%',marginTop:4}}>Select Services <IChev/></button>
    </div>
  );
}

/* ── SERVICE SELECTOR (WITH CAMERA INTEGRATION) ── */
function ServiceSelector({vehicle,onBack,onDone,sysServices}){
  const [selected,setSelected]=useState({});
  const [notes,setNotes]=useState('');
  const [photos,setPhotos]=useState([]);
  const [activeCategory,setActiveCategory]=useState('');
  const fileRef = useRef(null);

  useEffect(()=>{const keys=Object.keys(sysServices);if(!activeCategory&&keys.length>0)setActiveCategory(keys[0]);else if(activeCategory&&!keys.includes(activeCategory)&&keys.length>0)setActiveCategory(keys[0]);},[sysServices,activeCategory]);
  
  const toggle=(svc)=>setSelected(p=>{const n={...p};if(n[svc.id])delete n[svc.id];else n[svc.id]={...svc,qty:1};return n;});
  const setQty=(id,qty)=>{if(qty<1){setSelected(p=>{const n={...p};delete n[id];return n;});return;}setSelected(p=>({...p,[id]:{...p[id],qty}}));};
  
  const handlePhotoCapture = async (e) => {
    const file = e.target.files[0];
    if (!file) return;
    try {
      const base64Data = await processImage(file);
      setPhotos(prev => [...prev, base64Data]);
    } catch(err) {
      alert("Error processing image.");
    }
  };

  const removePhoto = (index) => {
    setPhotos(prev => prev.filter((_, i) => i !== index));
  };

  const total=Object.values(selected).reduce((s,i)=>s+(i.price*i.qty),0);
  const count=Object.keys(selected).length;
  const activeCategoryData=sysServices[activeCategory]||[];
  
  return(
    <div className="anim-up" style={{display:'flex',flexDirection:'column',gap:14}}>
      <div style={{display:'flex',alignItems:'center',gap:10}}>
        <div style={{flex:1}}><h2 style={{fontSize:20,fontWeight:800,color:'var(--text)',margin:0}}>Select Parts & Services</h2><p style={{fontSize:12,color:'var(--accent)',margin:'4px 0 0',fontWeight:600}}>Using pricing for: {vehicle.make}</p></div>
        {count>0&&<div style={{background:'rgba(77,123,255,0.12)',border:'1px solid rgba(77,123,255,0.25)',borderRadius:100,padding:'4px 14px'}}><span className="mono" style={{fontSize:13,fontWeight:700,color:'var(--accent)'}}>{count} selected</span></div>}
      </div>
      <div style={{display:'flex',gap:6,overflowX:'auto',paddingBottom:4}}>
        {Object.keys(sysServices).map(cat=><button key={cat} onClick={()=>setActiveCategory(cat)} style={{flexShrink:0,padding:'7px 14px',borderRadius:100,border:'1px solid',fontSize:12,fontWeight:700,cursor:'pointer',fontFamily:'Inter',transition:'all .15s',background:activeCategory===cat?'var(--accent)':'var(--input-bg)',color:activeCategory===cat?'#fff':'var(--text2)',borderColor:activeCategory===cat?'var(--accent)':'var(--border)'}}>{cat}</button>)}
      </div>
      <div style={{display:'flex',flexDirection:'column',gap:8,maxHeight:240,overflowY:'auto'}}>
        {activeCategoryData.map(svc=>{const isSel=!!selected[svc.id];return(
          <div key={svc.id} className={`service-card ${isSel?'selected':''}`} onClick={()=>toggle(svc)}>
            <div style={{display:'flex',alignItems:'center',gap:12}}>
              <span style={{fontSize:22,flexShrink:0}}>{svc.icon}</span>
              <div style={{flex:1,minWidth:0}}><p style={{fontSize:13,fontWeight:700,color:'var(--text)',margin:0}}>{svc.name}</p><p style={{fontSize:11,color:'var(--text3)',margin:'2px 0 0',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>Included part · {svc.labor}h labour</p></div>
              <div style={{textAlign:'right',flexShrink:0}}><p className="mono" style={{fontSize:13,fontWeight:700,color:'var(--accent)',margin:0}}>R {svc.price}</p>
                {isSel&&<div style={{display:'flex',alignItems:'center',gap:6,marginTop:4}} onClick={e=>e.stopPropagation()}><button className="qty-btn" onClick={()=>setQty(svc.id,(selected[svc.id]?.qty||1)-1)}>-</button><span className="mono" style={{fontSize:13,fontWeight:700,color:'var(--text)',minWidth:16,textAlign:'center'}}>{selected[svc.id]?.qty||1}</span><button className="qty-btn" onClick={()=>setQty(svc.id,(selected[svc.id]?.qty||1)+1)}>+</button></div>}
              </div>
              {isSel&&<div style={{width:20,height:20,borderRadius:'50%',background:'var(--accent)',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}><svg className="w-3 h-3" fill="white" viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg></div>}
            </div>
          </div>
        );})}
      </div>

      {/* Media & Notes Section */}
      <div style={{background:'var(--surface2)', borderRadius: 16, padding: 14, border: '1px solid var(--border)'}}>
        <label style={{fontSize:11,fontWeight:700,color:'var(--text3)',marginBottom:10,display:'flex',justifyContent:'space-between',alignItems:'center',letterSpacing:'0.5px'}}>
          <span>MECHANIC NOTES & MEDIA</span>
          <button onClick={() => fileRef.current?.click()} style={{background:'var(--input-bg)', border:'1px solid var(--accent)', color:'var(--accent)', borderRadius:100, padding:'4px 10px', fontSize:10, fontWeight:700, display:'flex', alignItems:'center', gap:4}}><ICamera/> Add Photo</button>
        </label>
        
        <input type="file" accept="image/*" capture="environment" hidden ref={fileRef} onChange={handlePhotoCapture} />
        
        {photos.length > 0 && (
          <div style={{display:'flex', gap:8, overflowX:'auto', marginBottom:12, paddingBottom:4}}>
            {photos.map((url, idx) => (
              <div key={idx} style={{position:'relative', width:64, height:64, flexShrink:0, borderRadius:12, overflow:'hidden', border:'1px solid var(--border)'}}>
                <img src={url} style={{width:'100%', height:'100%', objectFit:'cover'}} alt="Damage" />
                <button onClick={() => removePhoto(idx)} style={{position:'absolute', top:2, right:2, width:20, height:20, borderRadius:'50%', background:'rgba(0,0,0,0.6)', color:'#fff', border:'none', fontSize:12, display:'flex', alignItems:'center', justifyContent:'center'}}>×</button>
              </div>
            ))}
          </div>
        )}

        <textarea className="field" rows={2} placeholder="Additional observations, existing damage, or customer concerns…" value={notes} onChange={e=>setNotes(e.target.value)} style={{resize:'none'}}/>
      </div>

      {count>0&&<div style={{background:'rgba(77,123,255,0.06)',border:'1px solid rgba(77,123,255,0.18)',borderRadius:16,padding:'12px 16px',display:'flex',justifyContent:'space-between',alignItems:'center'}}><span style={{fontSize:14,color:'var(--text2)'}}>{count} item(s) selected</span><span className="mono" style={{fontSize:18,fontWeight:800,color:'var(--accent)'}}>R {total.toFixed(2)}</span></div>}
      <div style={{display:'flex',gap:10}}><button className="btn-g" onClick={onBack} style={{flex:'0 0 auto'}}>Back</button><button className="btn-p" disabled={count===0} onClick={()=>onDone(selected,notes,photos)} style={{flex:1}}>Review Quote <IChev/></button></div>
    </div>
  );
}

/* ── QUOTE REVIEW ── */
function QuoteReview({vehicle,services,notes,photos,onBack,onSubmit,submitting}){
  const items=Object.values(services);
  const laborTotal=items.reduce((s,i)=>s+i.labor*i.qty*LABOR,0);
  const partsTotal=items.reduce((s,i)=>s+i.price*i.qty,0);
  const subtotal=laborTotal+partsTotal;
  const vat=subtotal*0.15;
  const grand=subtotal+vat;
  return(
    <div className="anim-up" style={{display:'flex',flexDirection:'column',gap:14}}>
      <div><h2 style={{fontSize:20,fontWeight:800,color:'var(--text)',margin:0}}>Review Quotation</h2><p style={{fontSize:12,color:'var(--text2)',margin:'4px 0 0'}}>Confirm before sending to admin dashboard</p></div>
      <div style={{background:'var(--input-bg)',borderRadius:16,border:'1px solid var(--border)',padding:'14px 16px'}}>
        <p className="mono" style={{fontSize:9,fontWeight:700,color:'var(--accent)',letterSpacing:'1px',marginBottom:10}}>VEHICLE</p>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:6,fontSize:13}}>
          {[[vehicle.make+' '+vehicle.model,vehicle.engine],[vehicle.reg,vehicle.km?vehicle.km+' km':'–'],[vehicle.year,vehicle.vin||'—']].map(([a,b],i)=><React.Fragment key={i}><span style={{color:'var(--text)',fontWeight:600}}>{a}</span><span style={{color:'var(--text2)'}}>{b}</span></React.Fragment>)}
        </div>
      </div>
      <div style={{background:'var(--input-bg)',borderRadius:16,border:'1px solid var(--border)',padding:'4px 16px 12px'}}>
        <p className="mono" style={{fontSize:9,fontWeight:700,color:'var(--accent)',letterSpacing:'1px',margin:'14px 0 10px'}}>SERVICES ({items.length})</p>
        {items.map((svc,i)=><div key={i} style={{display:'flex',justifyContent:'space-between',padding:'8px 0',borderBottom:i<items.length-1?'1px solid var(--border2)':'none',fontSize:13}}><div><span style={{color:'var(--text)',fontWeight:600}}>{svc.name}</span>{svc.qty>1&&<span className="badge" style={{background:'rgba(77,123,255,0.1)',color:'var(--accent)',border:'1px solid rgba(77,123,255,0.2)',marginLeft:6,fontSize:10}}>×{svc.qty}</span>}<p style={{fontSize:11,color:'var(--text3)',margin:'2px 0 0'}}>{svc.labor*svc.qty}h labour</p></div><span className="mono" style={{fontWeight:700,color:'var(--text)'}}>R {(svc.price*svc.qty).toFixed(0)}</span></div>)}
      </div>
      <div style={{background:'rgba(77,123,255,0.06)',border:'1px solid rgba(77,123,255,0.18)',borderRadius:16,padding:'14px 16px'}}>
        {[[`Labour (${items.reduce((s,i)=>s+i.labor*i.qty,0).toFixed(1)}h × R${LABOR})`,`R ${laborTotal.toFixed(2)}`],['Parts & Materials',`R ${partsTotal.toFixed(2)}`],['Subtotal',`R ${subtotal.toFixed(2)}`],['VAT 15%',`R ${vat.toFixed(2)}`]].map(([l,v])=><div key={l} style={{display:'flex',justifyContent:'space-between',padding:'5px 0',fontSize:13,color:'var(--text2)'}}><span>{l}</span><span className="mono" style={{color:'var(--text)',fontWeight:600}}>{v}</span></div>)}
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',borderTop:'1px solid rgba(77,123,255,0.2)',paddingTop:12,marginTop:6}}><span style={{fontSize:15,fontWeight:800,color:'var(--accent)'}}>GRAND TOTAL</span><span className="mono" style={{fontSize:22,fontWeight:800,color:'var(--accent)'}}>R {grand.toFixed(2)}</span></div>
      </div>
      
      {(notes || photos?.length > 0) && (
        <div style={{padding:12,borderRadius:12,background:'var(--surface)',border:'1px solid var(--border)'}}>
          <p style={{fontSize:11,fontWeight:700,color:'var(--text)',margin:'0 0 8px',letterSpacing:'0.5px'}}>DOCUMENTS</p>
          {photos?.length > 0 && (
            <div style={{display:'flex', gap:6, overflowX:'auto', marginBottom: notes ? 10 : 0}}>
              {photos.map((url, idx) => <img key={idx} src={url} style={{width:48, height:48, borderRadius:8, objectFit:'cover', border:'1px solid var(--border)'}} />)}
            </div>
          )}
          {notes && <p style={{fontSize:13,color:'var(--text2)',margin:0, background:'rgba(255,184,0,0.07)', padding:'8px 10px', borderRadius:8}}>📝 {notes}</p>}
        </div>
      )}

      <div style={{padding:12,borderRadius:12,background:'rgba(0,255,136,0.06)',border:'1px solid rgba(0,255,136,0.18)'}}><p style={{fontSize:12,color:'var(--green)',margin:0,fontWeight:600}}>⚡ Submitting will send this quote to the Admin Dashboard in real-time.</p></div>
      <div style={{display:'flex',gap:10}}><button className="btn-g" onClick={onBack} style={{flex:'0 0 auto'}} disabled={submitting}>Back</button><button className="btn-p" onClick={()=>onSubmit({laborTotal,partsTotal,subtotal,vat,grandTotal:grand})} style={{flex:1}} disabled={submitting}>{submitting?<ISpin cls="w-5 h-5"/>:<><ICheck/>Send to Admin</>}</button></div>
    </div>
  );
}

/* ── INTAKE WIZARD ── */
function IntakeWizard({onDone,profile,systemData}){
  const [step,setStep]=useState(1);
  const [vehicle,setVehicle]=useState(null);
  const [services,setServices]=useState({});
  const [notes,setNotes]=useState('');
  const [photos,setPhotos]=useState([]);
  const [submitting,setSubmitting]=useState(false);
  const [animDir,setAnimDir]=useState('left');
  
  const sysCars=systemData?.car_db||{};
  const sysServices=useMemo(()=>{
    let catalog=systemData?.parts_catalog||{};
    if(vehicle?.make&&systemData?.make_catalogs?.[vehicle.make])catalog=systemData.make_catalogs[vehicle.make];
    const result={};
    Object.keys(catalog).forEach(catName=>{const catData=catalog[catName];const partsArr=(catData.parts||[]).map(p=>typeof p==='string'?{name:p,price:0}:p);const items=partsArr.map((part,idx)=>({id:`pt-${catName.replace(/[^a-zA-Z0-9]/g,'')}-${idx}`.toLowerCase(),name:part.name,labor:0.5,icon:catData.icon||'🔧',price:part.price||0,parts:[{name:part.name,price:part.price||0}]}));if(items.length>0)result[catName]=items;});
    if(Object.keys(result).length>0)return result;
    return systemData?.services||{};
  },[systemData,vehicle]);

  const goTo=(s,dir='left')=>{setAnimDir(dir);setStep(s);};

  const submit=async(totals)=>{
    setSubmitting(true);
    try{
      const items=Object.values(services).map(s=>({serviceId:s.id||'unknown',name:s.name||'Unknown',qty:s.qty||1,parts:s.parts||[],laborHours:(s.labor||0)*(s.qty||1),unitPrice:s.price||0,total:(s.price||0)*(s.qty||1),icon:s.icon||'🔧'}));
      const payload={
        vehicle:{make:vehicle.make||'',model:vehicle.model||'',year:vehicle.year||'',engine:vehicle.engine||'',reg:vehicle.reg||'',vin:vehicle.vin||'',km:vehicle.km||''},
        services:items,
        notes:notes||'',
        photos:photos||[],
        financials:{laborTotal:totals.laborTotal||0,partsTotal:totals.partsTotal||0,subtotal:totals.subtotal||0,vat:totals.vat||0,grandTotal:totals.grandTotal||0,lineItems:items,laborRate:LABOR},
        mechanic:{uid:auth.currentUser?.uid||'unknown',name:profile?.name||'Mechanic',shop:profile?.shop||'Workshop'},
        status:'pending_approval',
        createdAt:Date.now(),
        updatedAt:Date.now()
      };
      await db.ref('workshop_jobs').push(payload);
      onDone();
    }catch(e){alert('Error saving data: '+e.message);}
    setSubmitting(false);
  };

  const STEPS=['Vehicle','Services','Quote'];
  const animClass=animDir==='left'?'anim-left':'anim-right';
  return(
    <div style={{maxWidth:680,margin:'0 auto'}}>
      <div className="surface" style={{borderRadius:100,padding:'10px 16px',display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:16}}>
        {STEPS.map((lbl,i)=>{const n=i+1,on=step>=n,done=step>n;return(
          <React.Fragment key={n}>
            <div style={{display:'flex',alignItems:'center',gap:6}}>
              <div className={`step-dot ${done?'done':on?'on':'off'}`}>{done?'✓':n}</div>
              <span style={{fontSize:12,fontWeight:700,color:on?'var(--text)':'var(--text3)'}}>{lbl}</span>
            </div>
            {i<2&&<div style={{flex:1,height:2,background:done?'var(--accent)':'var(--border)',borderRadius:2,margin:'0 8px',transition:'background .3s'}}/>}
          </React.Fragment>
        );})}
      </div>
      <div className="surface" style={{borderRadius:24,padding:'24px 20px',minHeight:400,overflow:'hidden'}}>
        <div key={step} className={animClass}>
          {step===1&&<CarSelector onSelect={v=>{setVehicle(v);goTo(2,'left');}} sysCars={sysCars}/>}
          {step===2&&<ServiceSelector vehicle={vehicle} onBack={()=>goTo(1,'right')} onDone={(s,n,p)=>{setServices(s);setNotes(n);setPhotos(p);goTo(3,'left');}} sysServices={sysServices}/>}
          {step===3&&<QuoteReview vehicle={vehicle} services={services} notes={notes} photos={photos} onBack={()=>goTo(2,'right')} onSubmit={submit} submitting={submitting}/>}
        </div>
      </div>
    </div>
  );
}

/* ── EDIT JOB MODAL ── */
function EditJobModal({job, onClose, onSave}){
  const [notes, setNotes] = useState(job.notes||'');
  const [km, setKm] = useState(job.vehicle?.km||'');
  const [saving, setSaving] = useState(false);
  const save = async()=>{
    setSaving(true);
    try{
      await db.ref(`workshop_jobs/${job.id}`).update({notes, 'vehicle/km': km, updatedAt: Date.now()});
      onSave();
    }catch(e){alert('Error: '+e.message);}
    setSaving(false);
  };
  return <>
    <div className="modal-overlay" onClick={onClose}/>
    <div className="responsive-panel">
      <div className="sheet-handle"/>
      <h3 style={{fontSize:18,fontWeight:800,color:'var(--text)',margin:'0 0 4px'}}>Edit Job</h3>
      <p style={{fontSize:12,color:'var(--text2)',margin:'0 0 20px'}}>{job.vehicle?.make} {job.vehicle?.model} · {job.vehicle?.reg}</p>
      <div style={{display:'flex',flexDirection:'column',gap:14}}>
        <div><label style={{fontSize:11,fontWeight:700,color:'var(--text3)',marginBottom:6,display:'block',letterSpacing:'0.5px'}}>ODOMETER (km)</label><input className="profile-edit-field" type="number" placeholder="e.g. 85000" value={km} onChange={e=>setKm(e.target.value)}/></div>
        <div><label style={{fontSize:11,fontWeight:700,color:'var(--text3)',marginBottom:6,display:'block',letterSpacing:'0.5px'}}>MECHANIC NOTES</label><textarea className="profile-edit-field" rows={3} placeholder="Additional observations…" value={notes} onChange={e=>setNotes(e.target.value)} style={{resize:'none'}}/></div>
        <div style={{display:'flex',gap:10,marginTop:4}}>
          <button className="btn-g" onClick={onClose} style={{flex:'0 0 auto',borderRadius:12,padding:'12px 20px'}}>Cancel</button>
          <button className="btn-p" onClick={save} disabled={saving} style={{flex:1,borderRadius:12}}>{saving?<ISpin cls="w-5 h-5"/>:<><ISave/> Save Changes</>}</button>
        </div>
      </div>
    </div>
  </>;
}

/* ── JOBS DASHBOARD ── */
function JobsDash({onNew,profile,jobs,showToast}){
  const [open,setOpen]=useState(null);
  const [filterStatus,setFilterStatus]=useState('all');
  const [dateFrom,setDateFrom]=useState('');
  const [dateTo,setDateTo]=useState('');
  const [showFilters,setShowFilters]=useState(false);
  const [confirmDelete,setConfirmDelete]=useState(null);
  const [editJob,setEditJob]=useState(null);

  const toDateMs=(str,end=false)=>{if(!str)return null;const d=new Date(str);if(end){d.setHours(23,59,59,999);}else{d.setHours(0,0,0,0);}return d.getTime();};

  const filtered=useMemo(()=>{
    if(!jobs)return null;
    return jobs.filter(j=>{
      if(filterStatus!=='all'&&j.status!==filterStatus)return false;
      const ts=j.createdAt||0;
      const from=toDateMs(dateFrom,false);
      const to=toDateMs(dateTo,true);
      if(from&&ts<from)return false;
      if(to&&ts>to)return false;
      return true;
    });
  },[jobs,filterStatus,dateFrom,dateTo]);

  const activeFiltersCount=[filterStatus!=='all',!!dateFrom,!!dateTo].filter(Boolean).length;

  const deleteJob=async(id)=>{
    try{await db.ref(`workshop_jobs/${id}`).remove();showToast('Job deleted','🗑️','var(--red)');}
    catch(e){alert('Error: '+e.message);}
    setConfirmDelete(null);
  };

  const updateJobStatus = async (id, newStatus) => {
    try {
      await db.ref(`workshop_jobs/${id}`).update({status: newStatus, updatedAt: Date.now()});
      showToast('Status Updated', '🔧', 'var(--accent)');
    } catch(e) {
      alert('Error updating status: ' + e.message);
    }
  };

  const clearFilters=()=>{setFilterStatus('all');setDateFrom('');setDateTo('');};

  const active=jobs?jobs.filter(j=>j.status==='pending_approval').length:0;
  
  return(
    <div style={{display:'flex',flexDirection:'column',gap:16}}>
      {/* Stats */}
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
        {[
          {l:'Total Jobs',v:jobs?jobs.length:'–',c:'var(--accent)',icon:'📋'},
          {l:'Awaiting Admin',v:jobs?active:'–',c:'var(--amber)',icon:'⏳'},
          {l:'Approved',v:jobs?jobs.filter(j=>j.status==='approved').length:'–',c:'var(--cyan)',icon:'✅'},
          {l:'My Jobs',v:jobs?jobs.filter(j=>j.mechanic?.uid===auth.currentUser?.uid).length:'–',c:'var(--green)',icon:'🔧'},
        ].map((s,idx)=>(
          <div key={s.l} className="stat-card" style={{animationDelay:`${idx*60}ms`,animation:'cardEnter .4s cubic-bezier(.16,1,.3,1) both'}}>
            <p style={{fontSize:10,fontWeight:700,color:'var(--text3)',marginBottom:8,letterSpacing:'0.5px',display:'flex',alignItems:'center',gap:5}}>{s.icon} {s.l.toUpperCase()}</p>
            <p className="mono" style={{fontSize:26,fontWeight:900,color:s.c,margin:0,lineHeight:1}}>{s.v}</p>
          </div>
        ))}
      </div>

      {/* Jobs Table */}
      <div className="surface" style={{borderRadius:20,overflow:'hidden'}}>
        {/* Header */}
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'16px 20px',borderBottom:'1px solid var(--border)',gap:10,flexWrap:'wrap'}}>
          <div>
            <h2 style={{fontSize:16,fontWeight:800,color:'var(--text)',margin:0}}>Workshop Jobs</h2>
            <p style={{fontSize:11,color:'var(--text3)',margin:'3px 0 0'}}><span className="live-dot"/>Live from Firebase{filtered&&jobs&&filtered.length!==jobs.length?` · ${filtered.length}/${jobs.length} shown`:''}</p>
          </div>
          <div style={{display:'flex',gap:8,alignItems:'center'}}>
            <button onClick={()=>setShowFilters(true)} style={{display:'flex',alignItems:'center',gap:6,padding:'8px 14px',borderRadius:100,border:'1px solid',background:activeFiltersCount>0?'rgba(77,123,255,0.1)':'var(--input-bg)',borderColor:activeFiltersCount>0?'rgba(77,123,255,0.3)':'var(--border)',color:activeFiltersCount>0?'var(--accent)':'var(--text2)',fontSize:12,fontWeight:700,cursor:'pointer',fontFamily:'Inter',transition:'all .18s'}}>
              <IFilter/> Filter{activeFiltersCount>0?` (${activeFiltersCount})`:''}
            </button>
            <button className="btn-p" onClick={onNew} style={{padding:'9px 18px',fontSize:13}}><IPlus/> New Job</button>
          </div>
        </div>

        {/* Job List */}
        {jobs===null?(
          <div style={{padding:16,display:'flex',flexDirection:'column',gap:10}}>
            {[1,2,3].map(i=><div key={i} className="skel" style={{height:70,animationDelay:`${(i-1)*150}ms`}}/>)}
          </div>
        ):filtered&&filtered.length===0?(
          <div style={{textAlign:'center',padding:'48px 24px'}}>
            <div style={{fontSize:32,marginBottom:12}}>🔍</div>
            <p style={{color:'var(--text2)',fontSize:14,marginBottom:8}}>
              {jobs.length===0?'No jobs yet. Check in a vehicle to start.':'No jobs match your filters.'}
            </p>
            {jobs.length===0?<button className="btn-p" onClick={onNew} style={{margin:'0 auto'}}>Check In Vehicle <IChev/></button>:<button className="btn-g" onClick={clearFilters} style={{margin:'0 auto'}}>Clear Filters</button>}
          </div>
        ):(
          <div>
            {(filtered||[]).map((job,idx)=>{
              const sUI = getStatusUI(job.status);
              return (
              <div key={job.id} className="job-card" style={{animationDelay:`${idx*40}ms`}}>
                <div style={{display:'flex',alignItems:'center',gap:12,padding:'14px 20px',cursor:'pointer'}} onClick={()=>setOpen(open===job.id?null:job.id)}>
                  <div style={{width:38,height:38,borderRadius:12,background:'rgba(77,123,255,0.1)',border:'1px solid rgba(77,123,255,0.18)',display:'flex',alignItems:'center',justifyContent:'center',color:'var(--accent)',flexShrink:0}}><ICar/></div>
                  <div style={{flex:1,minWidth:0}}>
                    <p style={{fontSize:14,fontWeight:700,color:'var(--text)',margin:0}}>{job.vehicle?.make} {job.vehicle?.model}
                      <span className="mono" style={{fontSize:10,color:'var(--text3)',marginLeft:8}}>{job.vehicle?.reg}</span>
                    </p>
                    <p style={{fontSize:11,color:'var(--text3)',margin:'2px 0 0'}}>{job.services?.length} services · {job.mechanic?.name} · {job.createdAt?new Date(job.createdAt).toLocaleDateString('en-ZA',{day:'2-digit',month:'short',year:'numeric'}):''}</p>
                  </div>
                  <div style={{flexShrink:0,textAlign:'right'}}>
                    <span style={{display:'inline-flex',padding:'3px 10px',borderRadius:100,fontSize:10,fontWeight:700,fontFamily:'JetBrains Mono',background:sUI.bg,color:sUI.c,border:`1px solid ${sUI.b}`}}>
                      {sUI.l}
                    </span>
                    <p className="mono" style={{fontSize:11,fontWeight:700,color:'var(--accent)',margin:'4px 0 0'}}>R {(job.financials?.grandTotal||0).toFixed(0)}</p>
                  </div>
                </div>
                {open===job.id&&(
                  <div className="job-expand" style={{padding:'0 20px 16px',background:'var(--surface2)'}}>
                    <div style={{background:'var(--bg)',border:'1px solid var(--border)',borderRadius:16,padding:14}}>
                      <p className="mono" style={{fontSize:9,fontWeight:700,color:'var(--accent)',letterSpacing:'1px',marginBottom:8}}>SERVICES REQUESTED</p>
                      {job.services?.map((s,i)=><div key={i} style={{display:'flex',justifyContent:'space-between',padding:'6px 0',borderBottom:'1px solid var(--border2)',fontSize:13}}><span style={{color:'var(--text2)'}}>{s.icon} {s.name}{s.qty>1?` ×${s.qty}`:''}</span><span className="mono" style={{fontWeight:700,color:'var(--text)'}}>R {s.total}</span></div>)}
                      <div style={{display:'flex',justifyContent:'space-between',marginTop:10,paddingTop:8,borderTop:'1px solid var(--border)'}}><span style={{fontWeight:800,color:'var(--accent)'}}>Grand Total (incl. VAT)</span><span className="mono" style={{fontWeight:800,color:'var(--accent)'}}>R {(job.financials?.grandTotal||0).toFixed(2)}</span></div>
                      
                      {/* Render Photos if any */}
                      {job.photos?.length > 0 && (
                        <div style={{marginTop: 12, display: 'flex', gap: 8, overflowX: 'auto'}}>
                           {job.photos.map((p, i) => <img key={i} src={p} style={{width: 64, height: 64, borderRadius: 8, objectFit: 'cover', border: '1px solid var(--border)'}}/>)}
                        </div>
                      )}

                      {job.notes&&<p style={{fontSize:12,color:'var(--amber)',marginTop:8,padding:'8px 12px',background:'rgba(255,184,0,0.07)',borderRadius:8}}>📝 {job.notes}</p>}
                      
                      {/* Mechanic Workflow Status Actions */}
                      {['approved', 'in_progress', 'waiting_parts'].includes(job.status) && (
                        <div style={{display:'flex', gap:8, marginTop:14, paddingTop:12, borderTop:'1px solid var(--border)'}}>
                          {job.status === 'approved' && <button onClick={() => updateJobStatus(job.id, 'in_progress')} className="btn-p" style={{flex:1}}><IWrench/> Start Job</button>}
                          {job.status === 'in_progress' && (
                            <>
                              <button onClick={() => updateJobStatus(job.id, 'waiting_parts')} className="btn-g" style={{flex:1}}><IClock/> Waiting Parts</button>
                              <button onClick={() => updateJobStatus(job.id, 'completed')} className="btn-p" style={{flex:1, background: 'var(--green)'}}><ICheck/> Completed</button>
                            </>
                          )}
                          {job.status === 'waiting_parts' && <button onClick={() => updateJobStatus(job.id, 'in_progress')} className="btn-p" style={{flex:1}}><IWrench/> Resume Job</button>}
                        </div>
                      )}

                      {/* Admin Actions */}
                      <div style={{display:'flex',gap:8,marginTop:14,paddingTop:12,borderTop:['approved', 'in_progress', 'waiting_parts'].includes(job.status) ? 'none' : '1px solid var(--border2)'}}>
                        <button className="edit-btn" onClick={e=>{e.stopPropagation();setEditJob(job);}}><IEdit/> Edit Info</button>
                        <button className="delete-btn" onClick={e=>{e.stopPropagation();setConfirmDelete(job);}}><IDelete/> Delete</button>
                        {job.status === 'pending_approval' && <span style={{marginLeft:'auto',fontSize:11,color:'var(--text3)',alignSelf:'center'}}>⚡ Awaiting admin review</span>}
                      </div>
                    </div>
                  </div>
                )}
              </div>
            )})}
          </div>
        )}
      </div>

      {/* Filter Bottom Sheet / Modal */}
      {showFilters && (
        <>
          <div className="modal-overlay" onClick={() => setShowFilters(false)} />
          <div className="responsive-panel">
            <div className="sheet-handle" />
            
            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 20 }}>
              <h3 style={{ fontSize: 18, fontWeight: 800, color: 'var(--text)', margin: 0 }}>Filters</h3>
              {activeFiltersCount > 0 && (
                <button onClick={clearFilters} style={{ fontSize: 13, color: 'var(--accent)', background: 'none', border: 'none', cursor: 'pointer', fontFamily: 'Inter', fontWeight: 700, padding: 0 }}>

                  { v: 'rejected', l: 'Rejected' }

            {/* Date Filter */}
            <div style={{ marginBottom: 28 }}>

              </label>
              <div style={{ display: 'grid', gridTemplateColumns: '1fr auto 1fr', gap: 10, alignItems: 'center' }}>

            <button className="btn-p" onClick={() => setShowFilters(false)} style={{ width: '100%', justifyContent: 'center' }}>
              Show Results {filtered ? `(${filtered.length})` : ''}
            </button>
          </div>
        </>
      )}

      {confirmDelete&&<ConfirmDialog title="Delete Job?" message={`This will permanently remove the job for ${confirmDelete.vehicle?.make} ${confirmDelete.vehicle?.model} (${confirmDelete.vehicle?.reg}). This cannot be undone.`} onConfirm={()=>deleteJob(confirmDelete.id)} onCancel={()=>setConfirmDelete(null)} confirmLabel="Delete Job" danger={true}/>}
      {editJob&&<EditJobModal job={editJob} onClose={()=>setEditJob(null)} onSave={()=>{setEditJob(null);showToast('Job updated','✓','var(--green)');}}/>}
    </div>
  );
}

/* ── ACCOUNT PANEL ── */
function AccountPanel({user, profile, setProfile, onClose, onSignOut, dark, onToggleDark}){
  const [editMode, setEditMode] = useState(false);
  const [name, setName] = useState(profile.name||'');
  const [shop, setShop] = useState(profile.shop||'');
  const [phone, setPhone] = useState(profile.phone||'');
  const [saving, setSaving] = useState(false);
  const [saved, setSaved] = useState(false);

  const save = async()=>{
    setSaving(true);
    try{
      const updated = {name: name.trim()||'Mechanic', shop: shop.trim()||'Workshop', phone: phone.trim()};
      await db.ref(`users/${user.uid}`).update(updated);
      setProfile(p=>({...p,...updated}));
      setSaved(true);
      setTimeout(()=>setSaved(false),2500);
      setEditMode(false);
    }catch(e){alert('Error saving: '+e.message);}
    setSaving(false);
  };

  return <>
    <div className="modal-overlay" onClick={onClose}/>
    <div className="responsive-panel">
      <div className="sheet-handle"/>
      {/* Header */}
      <div style={{textAlign:'center',marginBottom:24}}>
        <div style={{position:'relative',display:'inline-block'}}>
          <img src={user.photoURL||`https://ui-avatars.com/api/?name=${encodeURIComponent(profile.name)}&background=1a4fff&color=fff`} alt="Profile" style={{width:68,height:68,borderRadius:'50%',border:'2px solid var(--accent)',margin:'0 auto 12px auto',display:'block'}}/>
          <div style={{position:'absolute',bottom:10,right:-2,width:18,height:18,borderRadius:'50%',background:'var(--green)',border:'2px solid var(--bg2)'}}/>
        </div>
        {!editMode?(
          <>
            <h2 style={{fontSize:20,fontWeight:900,color:'var(--text)',margin:'0 0 4px'}}>{profile.name||'Mechanic'}</h2>
            <p style={{color:'var(--text2)',fontSize:13,margin:'0 0 6px'}}>{user.email}</p>
            <span style={{display:'inline-block',background:'rgba(77,123,255,0.1)',color:'var(--accent)',fontSize:10,fontWeight:700,padding:'3px 12px',borderRadius:100,border:'1px solid rgba(77,123,255,0.2)',fontFamily:'JetBrains Mono'}}>
              {profile.shop||'Workshop'}
            </span>
            {profile.phone&&<p style={{fontSize:12,color:'var(--text3)',margin:'8px 0 0'}}>📞 {profile.phone}</p>}
          </>
        ):(
          <div style={{display:'flex',flexDirection:'column',gap:10,textAlign:'left',marginTop:8}}>
            <div><label style={{fontSize:11,fontWeight:700,color:'var(--text3)',marginBottom:5,display:'block',letterSpacing:'0.5px'}}>FULL NAME</label><input className="profile-edit-field" value={name} onChange={e=>setName(e.target.value)} placeholder="Your name"/></div>
            <div><label style={{fontSize:11,fontWeight:700,color:'var(--text3)',marginBottom:5,display:'block',letterSpacing:'0.5px'}}>WORKSHOP</label><input className="profile-edit-field" value={shop} onChange={e=>setShop(e.target.value)} placeholder="Workshop name"/></div>
            <div><label style={{fontSize:11,fontWeight:700,color:'var(--text3)',marginBottom:5,display:'block',letterSpacing:'0.5px'}}>PHONE (optional)</label><input className="profile-edit-field" value={phone} onChange={e=>setPhone(e.target.value)} placeholder="+27 82 000 0000"/></div>
          </div>
        )}
      </div>

      {/* Dark Mode Row */}
      {!editMode&&<div style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'12px 16px',borderRadius:14,background:'var(--input-bg)',border:'1px solid var(--border)',marginBottom:12}}>
        <span style={{fontSize:13,fontWeight:600,color:'var(--text2)'}}>Theme</span>
        <DarkModePill dark={dark} onToggle={onToggleDark}/>
      </div>}

      <div style={{display:'flex',flexDirection:'column',gap:8}}>
        {!editMode?(
          <>
            <button className="edit-btn" style={{justifyContent:'center',padding:'13px',fontSize:14,borderRadius:12,width:'100%'}} onClick={()=>setEditMode(true)}><IEdit/> Edit Profile</button>
            {saved&&<div style={{textAlign:'center',fontSize:12,color:'var(--green)',padding:'6px',animation:'fadeIn .3s ease'}}>✓ Changes saved!</div>}
            <button style={{background:'rgba(255,80,80,0.08)',color:'var(--red)',border:'1px solid rgba(255,80,80,0.2)',padding:'13px',borderRadius:12,fontSize:14,fontWeight:700,cursor:'pointer',fontFamily:'Inter',display:'flex',justifyContent:'center',alignItems:'center',gap:8,transition:'all .18s'}} onClick={onSignOut}><ILogout/> Sign Out</button>
            <button className="btn-g" style={{width:'100%',padding:'12px',fontSize:13,borderRadius:12}} onClick={onClose}>Close</button>
          </>
        ):(
          <>
            <button className="btn-p" onClick={save} disabled={saving} style={{borderRadius:12,padding:'13px'}}>{saving?<ISpin cls="w-5 h-5"/>:<><ISave/> Save Changes</>}</button>
            <button className="btn-g" style={{borderRadius:12,padding:'12px',fontSize:13}} onClick={()=>setEditMode(false)}>Cancel</button>
          </>
        )}
      </div>
    </div>
  </>;
}

/* ── SWIPE NAV CONTAINER ── */
const VIEWS=['dashboard','wizard','account'];
function SwipeContainer({view, setView, children}){
  const containerRef=useRef();
  const startX=useRef(null);
  const startY=useRef(null);
  const curIdx=VIEWS.indexOf(view);

  const handleTouchStart=useCallback(e=>{
    startX.current=e.touches[0].clientX;
    startY.current=e.touches[0].clientY;
  },[]);

  const handleTouchEnd=useCallback(e=>{
    if(startX.current===null)return;
    const dx=e.changedTouches[0].clientX-startX.current;
    const dy=Math.abs(e.changedTouches[0].clientY-startY.current);
    if(dy>Math.abs(dx)||Math.abs(dx)<50)return;
    if(dx<-50&&curIdx<VIEWS.length-1)setView(VIEWS[curIdx+1]);
    else if(dx>50&&curIdx>0)setView(VIEWS[curIdx-1]);
    startX.current=null;
  },[curIdx,setView]);

  return <div ref={containerRef} style={{flex:1,overflow:'hidden'}} onTouchStart={handleTouchStart} onTouchEnd={handleTouchEnd}>{children}</div>;
}

/* ── APP ── */
function App(){
  const [user,setUser]=useState(null);
  const [profile,setProfile]=useState({name:'',shop:''});
  const [view,setView]=useState('dashboard');
  const [prevView,setPrevView]=useState('dashboard');
  const [ready,setReady]=useState(false);
  const [jobs,setJobs]=useState(null);
  const [systemData,setSystemData]=useState(null);
  const [isAccountOpen,setIsAccountOpen]=useState(false);
  const [dark,setDark]=useState(()=>{const s=localStorage.getItem('vynix_theme_dark');return s!==null?JSON.parse(s):true;});
  const [toast,setToast]=useState(null);
  const [animDir,setAnimDir]=useState('left');

  const navOrder=['dashboard','wizard'];
  const changeView=(v)=>{
    const ci=navOrder.indexOf(view);
    const ni=navOrder.indexOf(v);
    setAnimDir(ni>=ci?'left':'right');
    setPrevView(view);
    setView(v);
  };

  const showToast=(msg,icon='✓',color='var(--green)')=>{setToast({msg,icon,color,key:Date.now()});};

  useEffect(()=>{
    localStorage.setItem('vynix_theme_dark',JSON.stringify(dark));
    document.documentElement.setAttribute('data-theme',dark?'dark':'light');
    document.getElementById('meta-theme').content=dark?'#070c1a':'#f0f4ff';
  },[dark]);

  useEffect(()=>{
    return auth.onAuthStateChanged(u=>{
      if(u){
        setUser(u);
        const ref=db.ref(`users/${u.uid}`);
        ref.on('value',snap=>{
          if(snap.exists())setProfile(snap.val());
          else{const d={name:u.displayName||'Mechanic',shop:'VynixPanelB Workshop'};ref.set(d);setProfile(d);}
        });
        setReady(true);
      }
    });
  },[]);

  useEffect(()=>{
    const sysRef=db.ref('system');
    const sysCb=sysRef.on('value',snap=>{
      if(snap.exists())setSystemData(snap.val());
      else{const seed={car_db:{},services:{}};sysRef.set(seed);setSystemData(seed);}
    });
    return()=>sysRef.off('value',sysCb);
  },[]);

  useEffect(()=>{
    const ref=db.ref('workshop_jobs').limitToLast(500);
    const cb=ref.on('value',snap=>{
      if(!snap.exists()){setJobs([]);return;}
      const arr=[];
      snap.forEach(child=>{arr.push({id:child.key,...child.val()});});
      arr.sort((a,b)=>(b.createdAt||0)-(a.createdAt||0));
      setJobs(arr);
    });
    return()=>ref.off('value',cb);
  },[]);

  if(!ready||!user||!systemData)return null;

  const viewAnimClass = animDir==='left'?'anim-left':'anim-right';

  return(
    <div style={{minHeight:'100dvh',display:'flex',flexDirection:'row'}}>
      {/* Sidebar (Desktop) */}
      <nav className="sidebar" style={{display:'none'}} id="sidebar">
        <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:28,padding:'0 4px'}}>
          <div style={{width:36,height:36,padding:8,borderRadius:12,background:'linear-gradient(135deg,#1a4fff,#0033e6)',color:'#fff',flexShrink:0}}><IWrench/></div>
          <div><span style={{fontSize:15,fontWeight:900,color:'var(--text)',display:'block'}}>VynixPanelB</span><span style={{fontSize:10,color:'var(--accent)',fontFamily:'JetBrains Mono',fontWeight:600}}>MECHANIC</span></div>
        </div>
        <div style={{display:'flex',flexDirection:'column',gap:4,flex:1}}>
          {[{id:'dashboard',l:'Dashboard',I:IDash},{id:'wizard',l:'Check-In Vehicle',I:ICar}].map(({id,l,I})=>(
            <button key={id} className={`snav-item ${view===id?'active':''}`} onClick={()=>changeView(id)}><I/> {l}</button>
          ))}
        </div>
        <div style={{borderTop:'1px solid var(--border)',paddingTop:16}}>
          <div style={{display:'flex',justifyContent:'center',marginBottom:16}}><DarkModePill dark={dark} onToggle={()=>setDark(!dark)}/></div>
          <div className="surface" onClick={()=>setIsAccountOpen(true)} style={{display:'flex',alignItems:'center',gap:10,padding:'12px',borderRadius:'16px',cursor:'pointer',transition:'background 0.2s'}} onMouseEnter={e=>e.currentTarget.style.background='rgba(77,123,255,0.06)'} onMouseLeave={e=>e.currentTarget.style.background='var(--surface)'}>
            <img src={user.photoURL||`https://ui-avatars.com/api/?name=${encodeURIComponent(profile.name)}&background=1a4fff&color=fff`} alt="" style={{width:36,height:36,borderRadius:'50%',border:'1px solid var(--border)',flexShrink:0}}/>
            <div style={{overflow:'hidden',flex:1}}>
              <p style={{fontSize:13,fontWeight:700,color:'var(--text)',margin:0,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{profile.name||'Mechanic'}</p>
              <p style={{fontSize:11,color:'var(--text3)',margin:'2px 0 0',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{profile.shop||'Workshop'}</p>
            </div>
          </div>
        </div>
      </nav>

      {/* Main */}
      <SwipeContainer view={view} setView={v=>{if(v==='account')setIsAccountOpen(true);else changeView(v);}}>
        <main id="main-content" style={{flex:1,padding:'16px',paddingBottom:'calc(88px + env(safe-area-inset-bottom))',overflowY:'auto',minHeight:'100dvh'}}>
          <div style={{maxWidth:760,margin:'0 auto'}}>
            <header className="md:hidden" style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:20}}>
              <div style={{display:'flex',alignItems:'center',gap:10}}>
                <div style={{width:34,height:34,padding:7,borderRadius:11,background:'linear-gradient(135deg,#1a4fff,#0033e6)',color:'#fff'}}><IWrench/></div>
                <div><p style={{fontSize:15,fontWeight:900,color:'var(--text)',margin:0}}>VynixPanelB</p><p style={{fontSize:9,color:'var(--accent)',margin:0,fontFamily:'JetBrains Mono',fontWeight:600}}>MECHANIC TERMINAL</p></div>
              </div>
              <div style={{display:'flex',alignItems:'center',gap:10}}>
                <DarkModePill dark={dark} onToggle={()=>setDark(!dark)}/>
                <img src={user.photoURL||`https://ui-avatars.com/api/?name=${encodeURIComponent(profile.name)}&background=1a4fff&color=fff`} onClick={()=>setIsAccountOpen(true)} alt="" style={{width:34,height:34,borderRadius:'50%',border:'1px solid var(--border)',cursor:'pointer',transition:'transform .2s'}} onMouseEnter={e=>e.target.style.transform='scale(1.08)'} onMouseLeave={e=>e.target.style.transform='scale(1)'}/>
              </div>
            </header>
            <div className="hidden md:block h-[20px]"/>
            <div key={view} className={viewAnimClass}>
              {view==='wizard'?<IntakeWizard onDone={()=>{changeView('dashboard');showToast('Quote submitted!','🚗','var(--green)');}} profile={profile} systemData={systemData}/>:<JobsDash jobs={jobs} onNew={()=>changeView('wizard')} profile={profile} showToast={showToast}/>}
            </div>
          </div>
        </main>
      </SwipeContainer>

      {/* Mobile Nav */}
      <nav className="mobile-nav md:hidden">
        <button className={`mnav-btn ${view==='dashboard'?'active':''}`} onClick={()=>changeView('dashboard')}>
          <div className="nav-icon-wrap"><IDash/></div> HOME
        </button>
        <button className="mnav-fab" onClick={()=>changeView('wizard')}><ICar/></button>
        <button className={`mnav-btn ${isAccountOpen?'active':''}`} onClick={()=>setIsAccountOpen(true)} style={{color:isAccountOpen?'var(--accent)':'var(--text3)'}}>
          <div className="nav-icon-wrap"><IUser/></div> ACCOUNT
        </button>
      </nav>

      {/* Account Modal */}
      {isAccountOpen&&<AccountPanel user={user} profile={profile} setProfile={setProfile} onClose={()=>setIsAccountOpen(false)} onSignOut={()=>{setIsAccountOpen(false);auth.signOut().then(()=>window.location.replace('login.html'));}} dark={dark} onToggleDark={()=>setDark(d=>!d)}/>}

      {/* Toast */}
      {toast&&<Toast key={toast.key} message={toast.msg} icon={toast.icon} color={toast.color} onDone={()=>setToast(null)}/>}
    </div>
  );
}

const sidebarStyle=document.createElement('style');
sidebarStyle.textContent=`@media(min-width:768px){#sidebar{display:flex!important}#main-content{padding-bottom:24px!important}.mobile-nav{display:none!important}}`;
document.head.appendChild(sidebarStyle);

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
