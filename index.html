<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VynixPanelB - AI Damage Estimator</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: { gray: { 900: '#0f172a', 800: '#1e293b' } }
        }
      }
    }
  </script>

  <style>
    body { background-color: #0f172a; color: white; margin: 0; font-family: system-ui, sans-serif; }
    @keyframes scan {
      0% { transform: translateY(0); }
      50% { transform: translateY(64px); }
      100% { transform: translateY(0); }
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .animate-fadeIn { animation: fadeIn 0.4s ease-out forwards; }
    .animate-scan { animation: scan 1.5s ease-in-out infinite; }
  </style>

  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    // --- FIREBASE INITIALIZATION ---
    const firebaseConfig = {
      apiKey: "AIzaSyCh7Ute6LeSAxcNDEQwZg5m0cA4ujnLCfg",
      authDomain: "test-17881.firebaseapp.com",
      projectId: "test-17881",
      storageBucket: "test-17881.firebasestorage.app",
      messagingSenderId: "1057428047643",
      appId: "1:1057428047643:web:f3801c0d933225a5cd35be"
    };

    if (!firebase.apps.length) {
      firebase.initializeApp(firebaseConfig);
    }
    const auth = firebase.auth();
    const db = firebase.database();

    // --- CONSTANTS ---
    const CLOUDINARY_UPLOAD_URL = 'https://api.cloudinary.com/v1_1/dqkujefxj/image/upload';
    const CLOUDINARY_UPLOAD_PRESET = 'banter_box';
    const LABOR_RATE_ZAR = 750;

    // --- ICONS (Inline SVGs) ---
    const IconWrench = () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24" strokeWidth="2"><path strokeLinecap="round" strokeLinejoin="round" d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/></svg>;
    const IconDashboard = () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" strokeWidth="2"><rect x="3" y="3" width="7" height="9" rx="1"/><rect x="14" y="3" width="7" height="5" rx="1"/><rect x="14" y="12" width="7" height="9" rx="1"/><rect x="3" y="16" width="7" height="5" rx="1"/></svg>;
    const IconCar = () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" strokeWidth="2"><path strokeLinecap="round" strokeLinejoin="round" d="M19 17h2c.6 0 1-.4 1-1v-3c0-.9-.7-1.7-1.5-1.9C18.7 10.6 16 10 16 10s-1.3-1.4-2.2-2.3c-.5-.4-1.1-.7-1.8-.7H5c-.6 0-1.1.4-1.4.8l-1.4 2.5C1.5 10.6 1 11.3 1 12v4c0 .6.4 1 1 1h2m15 0a2.5 2.5 0 1 1-5 0m5 0a2.5 2.5 0 1 0-5 0m-10 0a2.5 2.5 0 1 1-5 0m5 0a2.5 2.5 0 1 0-5 0m10-4H9"/></svg>;
    const IconLogout = () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" strokeWidth="2"><path strokeLinecap="round" strokeLinejoin="round" d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4m7 14l5-5-5-5m5 5H9"/></svg>;
    const IconUpload = () => <svg className="w-10 h-10 mb-2" fill="none" stroke="currentColor" viewBox="0 0 24 24" strokeWidth="2"><path strokeLinecap="round" strokeLinejoin="round" d="M4 14.899A7 7 0 1 1 15.71 8h1.79a4.5 4.5 0 0 1 2.5 8.242M12 12v9m-4-4l4-4 4 4"/></svg>;
    const IconSpinner = () => <svg className="w-10 h-10 animate-spin" fill="none" stroke="currentColor" viewBox="0 0 24 24" strokeWidth="2"><circle cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="4" strokeDasharray="30" strokeDashoffset="10" strokeLinecap="round" opacity="0.3"/><path d="M12 2a10 10 0 0 1 10 10" stroke="currentColor" strokeWidth="4" strokeLinecap="round"/></svg>;
    const IconChevronRight = () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" strokeWidth="2"><path strokeLinecap="round" strokeLinejoin="round" d="M9 5l7 7-7 7"/></svg>;
    const IconCamera = () => <svg className="w-16 h-16" fill="none" stroke="currentColor" viewBox="0 0 24 24" strokeWidth="2"><path strokeLinecap="round" strokeLinejoin="round" d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>;
    const IconCheckCircle = () => <svg className="w-16 h-16" fill="none" stroke="currentColor" viewBox="0 0 24 24" strokeWidth="2"><path strokeLinecap="round" strokeLinejoin="round" d="M22 11.08V12a10 10 0 1 1-5.93-9.14M22 4L12 14.01l-3-3"/></svg>;
    const IconSmallCheck = () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" strokeWidth="2"><path strokeLinecap="round" strokeLinejoin="round" d="M5 13l4 4L19 7"/></svg>;

    // --- ESTIMATE WIZARD COMPONENT ---
    function EstimateWizard({ onComplete }) {
      const [step, setStep] = useState(1);
      const [isUploading, setIsUploading] = useState(false);
      const [isAnalyzing, setIsAnalyzing] = useState(false);
      
      const [vehicleInfo, setVehicleInfo] = useState({ vin: '', make: '', model: '' });
      const [images, setImages] = useState([]);
      const [estimateData, setEstimateData] = useState(null);

      // Cloudinary Upload Logic
      const handleImageUpload = async (e) => {
        const files = Array.from(e.target.files);
        if (files.length === 0) return;
        
        setIsUploading(true);
        const uploadedUrls = [];

        for (const file of files) {
          const formData = new FormData();
          formData.append('file', file);
          formData.append('upload_preset', CLOUDINARY_UPLOAD_PRESET);

          try {
            const response = await fetch(CLOUDINARY_UPLOAD_URL, {
              method: 'POST',
              body: formData,
            });
            const data = await response.json();
            if (data.secure_url) {
              uploadedUrls.push(data.secure_url);
            }
          } catch (error) {
            console.error("Cloudinary upload failed:", error);
          }
        }

        setImages((prev) => [...prev, ...uploadedUrls]);
        setIsUploading(false);
      };

      // AI Simulation Logic
      useEffect(() => {
        if (step === 3) {
          setIsAnalyzing(true);
          const timer = setTimeout(() => {
            const damageTypes = [
              { type: 'Dent (Deep)', panels: 2, hoursPerPanel: 2.5, partsCost: 450 },
              { type: 'Scratch (Surface)', panels: 1, hoursPerPanel: 1.0, partsCost: 150 },
            ];
            
            let totalHours = 0;
            let totalParts = 0;
            
            const lineItems = damageTypes.map(damage => {
              const laborHours = damage.panels * damage.hoursPerPanel;
              const laborCost = laborHours * LABOR_RATE_ZAR;
              const itemPartsCost = damage.panels * damage.partsCost;
              totalHours += laborHours;
              totalParts += itemPartsCost;
              
              return {
                description: `${damage.type} - ${damage.panels} panel(s)`,
                laborHours,
                laborCost,
                partsCost: itemPartsCost,
                total: laborCost + itemPartsCost
              };
            });

            const subtotal = (totalHours * LABOR_RATE_ZAR) + totalParts;
            const tax = subtotal * 0.15; 

            setEstimateData({
              lineItems, totalHours, laborRate: LABOR_RATE_ZAR, totalParts, subtotal, tax, grandTotal: subtotal + tax
            });
            
            setIsAnalyzing(false);
          }, 3500); 

          return () => clearTimeout(timer);
        }
      }, [step]);

      // Save to Firebase RTDB
      const handleSaveEstimate = async () => {
        if (!estimateData) return;
        
        const estimatePayload = {
          technicianId: auth.currentUser?.uid || 'unknown',
          vehicle: vehicleInfo,
          photos: images,
          financials: estimateData,
          status: 'pending',
          createdAt: firebase.database.ServerValue.TIMESTAMP
        };

        try {
          await db.ref('estimates').push(estimatePayload);
          onComplete(); 
        } catch (error) {
          console.error("Firebase save failed:", error);
          alert("Error saving estimate.");
        }
      };

      return (
        <div className="max-w-3xl mx-auto space-y-6">
          <div className="flex items-center justify-between bg-white/5 backdrop-blur-md border border-white/10 rounded-full px-6 py-4">
            {[1, 2, 3, 4].map((num) => (
              <div key={num} className={`flex items-center gap-2 ${step >= num ? 'text-blue-400' : 'text-gray-600'}`}>
                <div className={`w-8 h-8 flex items-center justify-center rounded-full border-2 ${step >= num ? 'border-blue-400 shadow-[0_0_10px_rgba(59,130,246,0.5)]' : 'border-gray-600'}`}>
                  {num}
                </div>
                <div className="hidden sm:block text-sm font-semibold">
                  {num === 1 ? 'Vehicle' : num === 2 ? 'Capture' : num === 3 ? 'AI Scan' : 'Summary'}
                </div>
              </div>
            ))}
          </div>

          <div className="bg-white/5 backdrop-blur-md border border-white/10 rounded-2xl p-6 md:p-8 min-h-[400px]">
            {step === 1 && (
              <div className="space-y-6 animate-fadeIn">
                <h2 className="text-2xl font-bold">Vehicle Details</h2>
                <div className="space-y-4">
                  <input type="text" placeholder="VIN Number" value={vehicleInfo.vin} onChange={(e) => setVehicleInfo({...vehicleInfo, vin: e.target.value})} className="w-full bg-white/5 border border-white/10 rounded-full px-4 py-3 focus:border-blue-500 outline-none transition-colors" />
                  <div className="flex gap-4">
                    <input type="text" placeholder="Make" value={vehicleInfo.make} onChange={(e) => setVehicleInfo({...vehicleInfo, make: e.target.value})} className="w-1/2 bg-white/5 border border-white/10 rounded-full px-4 py-3 focus:border-blue-500 outline-none transition-colors" />
                    <input type="text" placeholder="Model" value={vehicleInfo.model} onChange={(e) => setVehicleInfo({...vehicleInfo, model: e.target.value})} className="w-1/2 bg-white/5 border border-white/10 rounded-full px-4 py-3 focus:border-blue-500 outline-none transition-colors" />
                  </div>
                </div>
                <button 
                  disabled={!vehicleInfo.vin || !vehicleInfo.make} 
                  onClick={() => setStep(2)}
                  className="mt-6 flex items-center justify-center gap-2 w-full sm:w-auto px-8 py-3 rounded-full bg-blue-600 hover:bg-blue-500 disabled:bg-gray-600 text-white font-semibold shadow-[0_0_15px_rgba(59,130,246,0.4)] disabled:shadow-none transition-all ml-auto"
                >
                  Next Step <IconChevronRight />
                </button>
              </div>
            )}

            {step === 2 && (
              <div className="space-y-6 animate-fadeIn">
                <h2 className="text-2xl font-bold">Damage Capture</h2>
                <p className="text-gray-400">Upload at least 4 angles of the damage for accurate AI analysis.</p>
                
                <label className="flex flex-col items-center justify-center w-full h-48 border-2 border-dashed border-white/20 rounded-2xl cursor-pointer hover:bg-white/5 transition-colors">
                  {isUploading ? (
                    <div className="text-blue-400"><IconSpinner /></div>
                  ) : (
                    <div className="text-gray-400 flex flex-col items-center"><IconUpload /><span>Tap to Upload Images</span></div>
                  )}
                  <input type="file" multiple accept="image/*" className="hidden" onChange={handleImageUpload} disabled={isUploading} />
                </label>

                {images.length > 0 && (
                  <div className="grid grid-cols-4 gap-2 mt-4">
                    {images.map((img, idx) => (
                      <img key={idx} src={img} alt="Damage" className="w-full h-20 object-cover rounded-xl border border-white/10" />
                    ))}
                  </div>
                )}

                <div className="flex justify-between mt-6">
                  <button onClick={() => setStep(1)} className="px-6 py-3 rounded-full bg-white/5 hover:bg-white/10 border border-white/10 transition-colors">Back</button>
                  <button 
                    disabled={images.length < 1 || isUploading} 
                    onClick={() => setStep(3)}
                    className="flex items-center gap-2 px-8 py-3 rounded-full bg-blue-600 hover:bg-blue-500 disabled:bg-gray-600 text-white font-semibold shadow-[0_0_15px_rgba(59,130,246,0.4)] disabled:shadow-none transition-all"
                  >
                    Run AI Analysis <IconChevronRight />
                  </button>
                </div>
              </div>
            )}

            {step === 3 && (
              <div className="flex flex-col items-center justify-center h-64 space-y-6 animate-fadeIn">
                {isAnalyzing ? (
                  <>
                    <div className="relative">
                      <div className="text-blue-500/50"><IconCamera /></div>
                      <div className="absolute top-0 left-0 w-full h-1 bg-blue-400 shadow-[0_0_10px_#60a5fa] animate-scan" />
                    </div>
                    <h2 className="text-xl font-bold animate-pulse">Running Neural Damage Analysis...</h2>
                    <p className="text-gray-400">Detecting dents, scratches, and panel integrity.</p>
                  </>
                ) : (
                  <>
                    <div className="text-green-400 shadow-[0_0_20px_rgba(74,222,128,0.3)] rounded-full"><IconCheckCircle /></div>
                    <h2 className="text-2xl font-bold">Analysis Complete</h2>
                    <button onClick={() => setStep(4)} className="px-8 py-3 rounded-full bg-blue-600 hover:bg-blue-500 text-white font-semibold shadow-[0_0_15px_rgba(59,130,246,0.4)] transition-all">
                      View Estimate Breakdown
                    </button>
                  </>
                )}
              </div>
            )}

            {step === 4 && estimateData && (
              <div className="space-y-6 animate-fadeIn">
                <h2 className="text-2xl font-bold border-b border-white/10 pb-4">Estimate Summary</h2>
                
                <div className="bg-black/20 rounded-xl p-4 border border-white/5 space-y-3">
                  <h3 className="text-blue-400 font-semibold mb-2">Detected Line Items</h3>
                  {estimateData.lineItems.map((item, idx) => (
                    <div key={idx} className="flex justify-between text-sm">
                      <span className="text-gray-300">{item.description}</span>
                      <span className="font-mono text-white">R {item.total.toFixed(2)}</span>
                    </div>
                  ))}
                </div>

                <div className="space-y-2 text-right">
                  <div className="text-sm text-gray-400">Total Labor ({estimateData.totalHours} hrs @ R{estimateData.laborRate}): <span className="text-white font-mono ml-4">R {(estimateData.totalHours * estimateData.laborRate).toFixed(2)}</span></div>
                  <div className="text-sm text-gray-400">Total Parts: <span className="text-white font-mono ml-4">R {estimateData.totalParts.toFixed(2)}</span></div>
                  <div className="text-sm text-gray-400">Subtotal: <span className="text-white font-mono ml-4">R {estimateData.subtotal.toFixed(2)}</span></div>
                  <div className="text-sm text-gray-400">VAT (15%): <span className="text-white font-mono ml-4">R {estimateData.tax.toFixed(2)}</span></div>
                  <div className="text-xl font-bold text-blue-400 mt-4 border-t border-white/10 pt-4">
                    Grand Total: <span className="font-mono">R {estimateData.grandTotal.toFixed(2)}</span>
                  </div>
                </div>

                <div className="flex justify-between mt-8">
                  <button onClick={() => setStep(1)} className="px-6 py-3 rounded-full bg-white/5 hover:bg-white/10 border border-white/10 transition-colors">Discard</button>
                  <button 
                    onClick={handleSaveEstimate}
                    className="flex items-center gap-2 px-8 py-3 rounded-full bg-blue-600 hover:bg-blue-500 text-white font-semibold shadow-[0_0_15px_rgba(59,130,246,0.4)] transition-all"
                  >
                    Save to Database <IconSmallCheck />
                  </button>
                </div>
              </div>
            )}
          </div>
        </div>
      );
    }

    // --- MAIN APP SHELL ---
    function App() {
      const [user, setUser] = useState(null);
      const [email, setEmail] = useState('');
      const [password, setPassword] = useState('');
      const [view, setView] = useState('dashboard'); 

      useEffect(() => {
        const unsubscribe = auth.onAuthStateChanged((currentUser) => {
          setUser(currentUser);
        });
        return () => unsubscribe();
      }, []);

      const handleLogin = async (e) => {
        e.preventDefault();
        try {
          await auth.signInWithEmailAndPassword(email, password);
        } catch (error) {
          alert("Login failed: " + error.message);
        }
      };

      const handleLogout = () => auth.signOut();

      if (!user) {
        return (
          <div className="min-h-screen flex items-center justify-center p-4">
            <div className="w-full max-w-md bg-white/5 backdrop-blur-md border border-white/10 rounded-2xl p-8 shadow-2xl">
              <div className="flex justify-center mb-6">
                <div className="w-14 h-14 p-3 bg-blue-600/20 text-blue-400 rounded-full shadow-[0_0_15px_rgba(59,130,246,0.4)]">
                  <IconWrench />
                </div>
              </div>
              <h2 className="text-2xl font-bold text-center mb-8">VynixPanelB Login</h2>
              <form onSubmit={handleLogin} className="space-y-4">
                <input type="email" placeholder="Technician Email" value={email} onChange={(e) => setEmail(e.target.value)} className="w-full bg-white/5 border border-white/10 rounded-full px-4 py-3 outline-none focus:border-blue-500 transition-colors" required />
                <input type="password" placeholder="Password" value={password} onChange={(e) => setPassword(e.target.value)} className="w-full bg-white/5 border border-white/10 rounded-full px-4 py-3 outline-none focus:border-blue-500 transition-colors" required />
                <button type="submit" className="w-full py-3 rounded-full bg-blue-600 hover:bg-blue-500 text-white font-semibold shadow-[0_0_15px_rgba(59,130,246,0.4)] transition-all">Secure Login</button>
              </form>
            </div>
          </div>
        );
      }

      return (
        <div className="min-h-screen flex flex-col md:flex-row bg-gray-900">
          <nav className="hidden md:flex flex-col w-64 bg-white/5 backdrop-blur-md border-r border-white/10 p-6">
            <div className="flex items-center gap-3 mb-10 text-xl font-bold text-blue-400">
              <div className="w-6 h-6"><IconWrench /></div> VynixPanelB
            </div>
            <div className="space-y-4 flex-1">
              <button onClick={() => setView('dashboard')} className={`w-full flex items-center gap-3 px-4 py-3 rounded-full transition-all ${view === 'dashboard' ? 'bg-blue-600/20 text-blue-400 shadow-[0_0_15px_rgba(59,130,246,0.2)]' : 'hover:bg-white/5'}`}>
                <IconDashboard /> Dashboard
              </button>
              <button onClick={() => setView('wizard')} className={`w-full flex items-center gap-3 px-4 py-3 rounded-full transition-all ${view === 'wizard' ? 'bg-blue-600/20 text-blue-400 shadow-[0_0_15px_rgba(59,130,246,0.2)]' : 'hover:bg-white/5'}`}>
                <IconCar /> New Estimate
              </button>
            </div>
            <button onClick={handleLogout} className="flex items-center gap-3 px-4 py-3 text-red-400 hover:bg-red-500/10 rounded-full transition-all">
              <IconLogout /> Logout
            </button>
          </nav>

          <main className="flex-1 p-4 md:p-8 pb-24 md:pb-8 overflow-y-auto">
            {view === 'wizard' ? (
              <EstimateWizard onComplete={() => setView('dashboard')} />
            ) : (
              <div className="bg-white/5 backdrop-blur-md border border-white/10 rounded-2xl p-6">
                <h2 className="text-2xl font-bold mb-4">Recent Estimates</h2>
                <p className="text-gray-400">Estimates stored in Firebase realtime database will appear here.</p>
              </div>
            )}
          </main>

          <nav className="md:hidden fixed bottom-0 left-0 right-0 bg-gray-900/90 backdrop-blur-md border-t border-white/10 p-4 flex justify-around items-center z-50">
            <button onClick={() => setView('dashboard')} className={`p-3 rounded-full ${view === 'dashboard' ? 'bg-blue-600/20 text-blue-400 shadow-[0_0_15px_rgba(59,130,246,0.2)]' : 'text-gray-400'}`}>
              <IconDashboard />
            </button>
            <button onClick={() => setView('wizard')} className={`p-3 rounded-full ${view === 'wizard' ? 'bg-blue-600/20 text-blue-400 shadow-[0_0_15px_rgba(59,130,246,0.2)]' : 'text-gray-400'}`}>
              <IconCar />
            </button>
            <button onClick={handleLogout} className="p-3 rounded-full text-red-400 hover:bg-red-500/10">
              <IconLogout />
            </button>
          </nav>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
