function SearchableDropdown({ label, value, onChange, options, placeholder, disabled }) {
  const [open, setOpen] = useState(false);
  const [search, setSearch] = useState('');
  const wrapRef = useRef(null);
  const searchRef = useRef(null);

  const filtered = useMemo(() => {
    if (!search.trim()) return options;
    const q = search.toLowerCase();
    return options.filter(o => o.toLowerCase().includes(q));
  }, [options, search]);

  useEffect(() => {
    if (open && searchRef.current) searchRef.current.focus();
  }, [open]);

  useEffect(() => {
    const handler = (e) => {
      if (wrapRef.current && !wrapRef.current.contains(e.target)) {
        setOpen(false); setSearch('');
      }
    };
    document.addEventListener('mousedown', handler);
    return () => document.removeEventListener('mousedown', handler);
  }, []);

  const select = (opt) => { onChange(opt); setOpen(false); setSearch(''); };

  return (
    <div>
      {label && <label style={{fontSize:10,fontWeight:700,color:'var(--text3)',display:'block',marginBottom:6,letterSpacing:'0.5px'}}>{label}</label>}
      <div className="dd-wrap" ref={wrapRef}>
        <button type="button" className="dd-input" onClick={() => { if(!disabled) setOpen(o => !o); }}
          style={{opacity:disabled?0.45:1,cursor:disabled?'not-allowed':'pointer',textAlign:'left',display:'flex',alignItems:'center',justifyContent:'space-between',gap:8,color:value?'var(--text)':'var(--text3)'}}>
          <span style={{overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',flex:1}}>{value || placeholder}</span>
          <span className={`dd-arrow ${open?'open':''}`} style={{position:'static',transform:open?'rotate(180deg)':'none',flexShrink:0}}><IChevDown/></span>
        </button>
        {open && (
          <div className="dd-list">
            {options.length > 8 && (
              <div className="dd-search">
                <input ref={searchRef} value={search} onChange={e => setSearch(e.target.value)}
                  placeholder={`Search ${label?.toLowerCase() || ''}…`}
                  onKeyDown={e => { if(e.key==='Escape'){setOpen(false);setSearch('');} }}/>
              </div>
            )}
            {filtered.length === 0
              ? <div className="dd-empty">No results for "{search}"</div>
              : filtered.map(opt => (
                <div key={opt} className={`dd-item ${opt===value?'selected':''}`} onClick={() => select(opt)} title={opt}>{opt}</div>
              ))
            }
          </div>
        )}
      </div>
    </div>
  );
}

/* ════════════════════════════════════════════════════════════

function exportJobPDF(job, shopInfo){
  const {jsPDF}=window.jspdf;
  const doc=new jsPDF({orientation:'portrait',unit:'mm',format:'a4'});
  const pw=doc.internal.pageSize.getWidth();
  const shopName=shopInfo?.shop||'VynixPanelB Auto';
  const adminName=shopInfo?.name||'Admin';
  doc.setFillColor(7,12,26);doc.rect(0,0,pw,42,'F');
  doc.setFillColor(26,79,255);doc.rect(0,0,4,42,'F');
  doc.setFont('helvetica','bold');doc.setFontSize(20);doc.setTextColor(232,238,255);
  doc.text(shopName,14,16);
  doc.setFontSize(9);doc.setFont('helvetica','normal');doc.setTextColor(150,170,220);
  doc.text('Vehicle Service Quotation',14,24);
  doc.text(`Issued: ${new Date().toLocaleDateString('en-ZA',{day:'2-digit',month:'long',year:'numeric'})}`,14,31);
  doc.text(`Ref: JOB-${job.id.slice(-8).toUpperCase()}`,pw-14,24,{align:'right'});
  doc.text(`Authorised by: ${adminName}`,pw-14,31,{align:'right'});
  if(job.status==='approved'){doc.setTextColor(0,255,136);doc.setFontSize(48);doc.setFont('helvetica','bold');doc.setGState(new doc.GState({opacity:0.06}));doc.text('APPROVED',pw/2,150,{align:'center',angle:45});doc.setGState(new doc.GState({opacity:1}));}
  doc.setFillColor(15,22,55);doc.roundedRect(10,48,pw-20,24,3,3,'F');
  doc.setFont('helvetica','bold');doc.setFontSize(8);doc.setTextColor(0,245,255);doc.text('VEHICLE INFORMATION',16,57);
  doc.setFont('helvetica','normal');doc.setTextColor(200,210,240);doc.setFontSize(9);
  const v=job.vehicle||{};
  doc.text(`${v.make||'—'} ${v.model||'—'} ${v.year||''}`,16,64);
  doc.text(`Reg: ${v.reg||'—'}   Engine: ${v.engine||'—'}   Odometer: ${v.km||'—'} km`,16,70);
  if(v.vin)doc.text(`VIN: ${v.vin}`,16,76);
  doc.setFillColor(20,30,65);doc.roundedRect(pw-100,48,90,24,3,3,'F');
  doc.setFont('helvetica','bold');doc.setFontSize(8);doc.setTextColor(0,245,255);doc.text('MECHANIC',pw-96,57);
  doc.setFont('helvetica','normal');doc.setTextColor(200,210,240);doc.setFontSize(9);
  doc.text(job.mechanic?.name||'—',pw-96,64);doc.text(job.mechanic?.shop||'—',pw-96,70);
  let y=(v.vin?78:72)+8;
  
  // Parse parts safely to strings for PDF
  const parseParts = (partsArr) => {
    return (partsArr || []).map(p => typeof p === 'string' ? p : p.name).join(', ') || '—';
  };

  doc.autoTable({
    startY:y,
    head:[['Service','Parts','Qty','Labour (h)','Unit Price','Total (R)']],
    body:(job.services||[]).map(s=>[s.name||s.serviceId, parseParts(s.parts), s.qty||1, ((s.laborHours)||'—'), `R ${(s.unitPrice||s.total||0).toFixed(2)}`, `R ${(s.total||0).toFixed(2)}`]),
    headStyles:{fillColor:[26,79,255],textColor:[255,255,255],fontStyle:'bold',fontSize:7.5},
    bodyStyles:{textColor:[30,40,80],fontSize:7.5,fillColor:[240,244,255]},
    alternateRowStyles:{fillColor:[228,234,255]},
    columnStyles:{0:{cellWidth:48},1:{cellWidth:42},2:{halign:'center',cellWidth:10},3:{halign:'center',cellWidth:18},4:{halign:'right',cellWidth:22},5:{halign:'right',fontStyle:'bold',cellWidth:22}},
    margin:{left:10,right:10},
    theme:'grid'
  });
  
  let fy=doc.lastAutoTable.finalY+8;
  const fin=job.financials||{};
  doc.setFillColor(240,244,255);doc.roundedRect(pw-90,fy,80,52,3,3,'F');
  doc.setFontSize(8);doc.setFont('helvetica','normal');doc.setTextColor(80,100,150);
  const rc=pw-14;
  doc.text(`Labour (${(fin.laborTotal/LABOR||0).toFixed(1)}h × R${LABOR})`,pw-92,fy+10,{align:'right'});doc.text(`R ${(fin.laborTotal||0).toFixed(2)}`,rc,fy+10,{align:'right'});
  doc.text('Parts & Materials',pw-92,fy+19,{align:'right'});doc.text(`R ${(fin.partsTotal||0).toFixed(2)}`,rc,fy+19,{align:'right'});
  doc.text('Subtotal',pw-92,fy+28,{align:'right'});doc.text(`R ${(fin.subtotal||0).toFixed(2)}`,rc,fy+28,{align:'right'});
  doc.text('VAT 15%',pw-92,fy+37,{align:'right'});doc.text(`R ${(fin.vat||0).toFixed(2)}`,rc,fy+37,{align:'right'});
  doc.setFont('helvetica','bold');doc.setFontSize(11);doc.setTextColor(26,79,255);
  doc.text('GRAND TOTAL',pw-92,fy+49,{align:'right'});doc.text(`R ${(fin.grandTotal||0).toFixed(2)}`,rc,fy+49,{align:'right'});
  if(job.notes){doc.setFillColor(255,240,200);doc.roundedRect(10,fy,pw-104,30,3,3,'F');doc.setFont('helvetica','bold');doc.setFontSize(8);doc.setTextColor(150,100,0);doc.text('MECHANIC NOTES',16,fy+9);doc.setFont('helvetica','normal');doc.setTextColor(80,60,0);doc.setFontSize(8);const ns=doc.splitTextToSize(job.notes,pw-120);doc.text(ns,16,fy+17);}
  if(job.status==='approved'||job.status==='rejected'){const sc=job.status==='approved'?[0,180,110]:[224,48,48];doc.setDrawColor(...sc);doc.setLineWidth(1.5);doc.roundedRect(10,fy+56,50,14,3,3,'S');doc.setFont('helvetica','bold');doc.setFontSize(9);doc.setTextColor(...sc);doc.text(job.status.toUpperCase(),35,fy+65,{align:'center'});}
  const ph=doc.internal.pageSize.getHeight();
  doc.setFillColor(7,12,26);doc.rect(0,ph-14,pw,14,'F');
  doc.setFont('helvetica','normal');doc.setFontSize(7);doc.setTextColor(100,120,160);
  doc.text(`VynixPanelB Admin Dashboard | This is an official quotation | Job ID: ${job.id}`,pw/2,ph-7,{align:'center'});
  doc.save(`Quote_${v.make||'Vehicle'}_${v.reg||'REG'}_${Date.now()}.pdf`);
}

  const [search, setSearch] = useState('');
  const [newPartName, setNewPartName] = useState('');
  const [addingPartTo, setAddingPartTo] = useState(null);

  // Sync state when systemData or selectedMake changes
  useEffect(() => {
    if (selectedMake === 'default') {
      setLocalParts(JSON.parse(JSON.stringify(systemData?.parts_catalog || DEFAULT_PARTS_CATALOG)));
    } else {
      const makeCat = systemData?.make_catalogs?.[selectedMake];
      if (makeCat) {
        setLocalParts(JSON.parse(JSON.stringify(makeCat)));
      } else {
        setLocalParts(null); // Indicates no custom catalog exists for this make yet
      }
    }
    setDirty(false);
  }, [systemData, selectedMake]);

  const handleInitCustomCatalog = () => {
    setLocalParts(JSON.parse(JSON.stringify(systemData?.parts_catalog || DEFAULT_PARTS_CATALOG)));
    setDirty(true);
  };

  const handleMakeChange = (e) => {
    if (dirty && !window.confirm('You have unsaved changes. Discard them?')) return;
    setSelectedMake(e.target.value);
  };

  const handlePartPriceChange = (key, idx, val) => {
    const n = parseInt(val, 10);
    setLocalParts(prev => {
      const next = {...prev};
      const parts = [...(next[key].parts || [])].map(p => typeof p === 'string' ? {name: p, price: 0} : {...p});
      parts[idx].price = isNaN(n) ? 0 : n;
      next[key].parts = parts;
      return next;
    });
    setDirty(true);
  };

  const handleAddPart = (key) => {
    const name = newPartName.trim();
    if (!name) return;
    setLocalParts(prev => {
      const next = {...prev};
      const parts = [...(next[key].parts || [])].map(p => typeof p === 'string' ? {name: p, price: 0} : p);
      parts.push({ name, price: 0 });
      next[key].parts = parts;
      return next;
    });
    setNewPartName('');
    setAddingPartTo(null);
    setDirty(true);
  };

  const handleRemovePart = (key, idx) => {
    setLocalParts(prev => {
      const next = {...prev};
      next[key].parts = next[key].parts.filter((_, i) => i !== idx);
      return next;
    });
    setDirty(true);
  };

  const save = async () => {
    setSaving(true);
    try {
      if (selectedMake === 'default') {
        await db.ref('system/parts_catalog').set(localParts);
      } else {
        await db.ref(`system/make_catalogs/${selectedMake}`).set(localParts);
      }
      setDirty(false);
      setToast(true);
      setTimeout(() => setToast(false), 2800);
    } catch (e) { alert(e.message); }
    setSaving(false);
  };

  const filtered = useMemo(() => {
    if (!localParts) return [];
    const entries = Object.entries(localParts);
    if (!search.trim()) return entries;
    const q = search.toLowerCase();
    return entries.filter(([key, val]) =>
      key.toLowerCase().includes(q) || (val.parts || []).some(p => {
        const name = typeof p === 'string' ? p : p.name;
        return name.toLowerCase().includes(q);
      })
    );
  }, [localParts, search]);

  const totalValue = useMemo(() => {
    if (!localParts) return 0;
    return Object.values(localParts).reduce((sum, cat) => {
      const catTotal = (cat.parts || []).reduce((s, p) => s + (p.price || 0), 0);
      return sum + catTotal;
    }, 0);
  }, [localParts]);

  return (
    <div style={{display:'flex',flexDirection:'column',gap:0}}>

      {toast && (
        <div className="save-toast">
          <ICheck/> Pricing saved successfully!
        </div>
      )}

      <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:20,flexWrap:'wrap',gap:12}}>
        <div>
          <h2 style={{fontSize:22,fontWeight:900,color:'var(--text)',margin:0}}>Parts Catalog</h2>
          <p style={{fontSize:13,color:'var(--text2)',margin:'4px 0 0'}}>Set individual part prices for mechanics to use when building job quotes.</p>
        </div>
        
        <div style={{display:'flex',alignItems:'center',gap:10,flexWrap:'wrap',background:'var(--input-bg)',border:'1px solid var(--border)',padding:'6px 14px',borderRadius:16}}>
          <label style={{fontSize:12,fontWeight:700,color:'var(--text3)'}}>TARGET PRICING:</label>
          <select value={selectedMake} onChange={handleMakeChange} style={{background:'var(--bg2)',color:'var(--text)',border:'1px solid var(--border)',padding:'6px 12px',borderRadius:8,fontSize:13,fontWeight:600,outline:'none',cursor:'pointer'}}>
            <option value="default">Global Default (All Cars)</option>
            <optgroup label="Car-Specific Pricing overrides">
              {makes.map(m => <option key={m} value={m}>{m} {systemData?.make_catalogs?.[m] ? ' (Customized)' : ''}</option>)}
            </optgroup>
          </select>
        </div>
      </div>

      {localParts === null ? (
        <div style={{textAlign:'center',padding:'80px 20px',background:'var(--surface)',borderRadius:16,border:'1px dashed var(--border)'}}>
          <h3 style={{fontSize:18,fontWeight:800,color:'var(--text)',margin:'0 0 8px'}}>No custom pricing for {selectedMake}</h3>
          <p style={{fontSize:13,color:'var(--text2)',margin:'0 0 24px',maxWidth:400,marginLeft:'auto',marginRight:'auto'}}>
            Currently, {selectedMake} vehicles use the <b>Global Default Pricing</b>. If you want to set specific part prices for {selectedMake}, click below to initialize a dedicated catalog.
          </p>
          <button className="btn-p" onClick={handleInitCustomCatalog}><IPlus/> Create Custom Pricing for {selectedMake}</button>
        </div>
      ) : (
        <>
          <div style={{display:'flex',alignItems:'center',gap:10,flexWrap:'wrap',marginBottom:20}}>
            <div style={{position:'relative',flex:1}}>
              <div style={{position:'absolute',left:14,top:'50%',transform:'translateY(-50%)',color:'var(--text3)',pointerEvents:'none'}}><ISearch/></div>
              <input className="search-input" style={{paddingLeft:40,maxWidth:340}}
                placeholder={`Search ${selectedMake==='default'?'Global':'Custom '+selectedMake} parts…`}
                value={search}
                onChange={e => setSearch(e.target.value)}
              />
            </div>
            
            <div style={{padding:'8px 16px',borderRadius:12,background:'rgba(77,123,255,0.08)',border:'1px solid rgba(77,123,255,0.2)',fontSize:12,color:'var(--accent)',fontFamily:'JetBrains Mono',fontWeight:700}}>
              {Object.keys(localParts).length} categories · R {totalValue.toLocaleString()} total value
            </div>
            {dirty && (
              <div style={{display:'flex',alignItems:'center',gap:6,padding:'7px 14px',borderRadius:10,background:'rgba(255,184,0,0.1)',border:'1px solid rgba(255,184,0,0.25)',fontSize:12,color:'var(--amber)',fontWeight:700}}>
                ● Unsaved changes
              </div>
            )}
          </div>

          <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(320px,1fr))',gap:14}}>
            {filtered.map(([key, data]) => {
              const isEditing = editingKey === key;
              const isAddingHere = addingPartTo === key;
              const categoryTotal = (data.parts || []).reduce((s, p) => s + (p.price || 0), 0);
              
              return (
                <div key={key} className={`parts-card ${isEditing ? 'editing' : ''}`}>
                  <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:12}}>
                    <div className="parts-icon">{data.icon || '🔧'}</div>
                    <div style={{flex:1,minWidth:0}}>
                      <p style={{fontSize:13,fontWeight:800,color:'var(--text)',margin:0,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{key}</p>
                      <p style={{fontSize:10,color:'var(--text3)',margin:'2px 0 0'}}>
                        {(data.parts||[]).length} part(s) · <span className="mono" style={{color:'var(--accent)',fontWeight:700}}>R {categoryTotal}</span>
                      </p>
                    </div>
                    <button
                      onClick={() => { setEditingKey(isEditing ? null : key); setAddingPartTo(null); setNewPartName(''); }}
                      style={{background:isEditing?'rgba(77,123,255,0.15)':'var(--input-bg)',border:`1px solid ${isEditing?'rgba(77,123,255,0.4)':'var(--border)'}`,borderRadius:8,padding:'5px 8px',cursor:'pointer',color:isEditing?'var(--accent)':'var(--text3)',display:'flex',alignItems:'center',gap:4,fontSize:11,fontWeight:600,fontFamily:'Inter',transition:'all .15s',flexShrink:0}}
                    >
                      <IEdit/> {isEditing ? 'Done' : 'Edit parts'}
                    </button>
                  </div>

                  <div style={{display:'flex',flexDirection:'column',gap:0}}>
                    {(data.parts || []).map((part, idx) => {
                      const partObj = typeof part === 'string' ? {name: part, price: 0} : part;
                      return (
                        <div key={idx} className="part-item" style={{display:'flex',alignItems:'center',gap:8,padding:'6px 0',borderBottom:'1px solid var(--border2)'}}>
                          <span className="part-dot"/>
                          <span style={{flex:1,fontSize:12,color:'var(--text2)',textOverflow:'ellipsis',overflow:'hidden',whiteSpace:'nowrap'}} title={partObj.name}>{partObj.name}</span>
                          
                          <div className="price-input-wrap" style={{padding:'4px 8px'}}>
                            <span style={{fontSize:11}}>R</span>
                            <input
                              type="number"
                              value={partObj.price || 0}
                              onChange={e => handlePartPriceChange(key, idx, e.target.value)}
                              min={0}
                              step={10}
                              style={{width:60,fontSize:13}}
                            />
                          </div>
                          
                          {isEditing && (
                            <button
                              onClick={() => handleRemovePart(key, idx)}
                              style={{background:'rgba(255,80,80,0.08)',border:'1px solid rgba(255,80,80,0.2)',borderRadius:6,padding:'2px 7px',cursor:'pointer',color:'var(--red)',fontSize:11,fontWeight:700,fontFamily:'JetBrains Mono',flexShrink:0,lineHeight:1.4}}
                            >×</button>
                          )}
                        </div>
                      );
                    })}
                  </div>

                  {isEditing && (
                    <div style={{marginTop:10}}>
                      {isAddingHere ? (
                        <div style={{display:'flex',gap:6,marginTop:6}}>
                          <input
                            className="field"
                            style={{padding:'7px 12px',fontSize:12,flex:1}}
                            placeholder="Part name…"
                            value={newPartName}
                            onChange={e => setNewPartName(e.target.value)}
                            onKeyDown={e => { if(e.key==='Enter') handleAddPart(key); if(e.key==='Escape'){ setAddingPartTo(null); setNewPartName(''); } }}
                            autoFocus
                          />
                          <button className="btn-p" style={{padding:'7px 14px',fontSize:12}} onClick={() => handleAddPart(key)}>Add</button>
                          <button className="btn-g" style={{padding:'7px 10px',fontSize:12}} onClick={() => { setAddingPartTo(null); setNewPartName(''); }}>✕</button>
                        </div>
                      ) : (
                        <button
                          onClick={() => { setAddingPartTo(key); setNewPartName(''); }}
                          style={{width:'100%',marginTop:6,padding:'7px',borderRadius:10,border:'1px dashed var(--accent)',background:'rgba(77,123,255,0.04)',color:'var(--accent)',fontSize:12,fontWeight:600,cursor:'pointer',fontFamily:'Inter',display:'flex',alignItems:'center',justifyContent:'center',gap:6,transition:'all .15s'}}
                        >
                          <IPlus/> Add new part
                        </button>
                      )}
                    </div>
                  )}
                </div>
              );
            })}
          </div>

          {filtered.length === 0 && (
            <div style={{textAlign:'center',padding:'60px 24px',color:'var(--text3)',fontSize:14}}>
              No categories match "{search}"
            </div>
          )}

          <div className="parts-save-banner">
            <div>
              <p style={{fontSize:13,fontWeight:700,color:'var(--text)',margin:0}}>
                {dirty ? '⚠ You have unsaved changes' : '✓ All changes saved to Firebase'}
              </p>
              <p style={{fontSize:11,color:'var(--text3)',margin:'2px 0 0'}}>
                Saved to: <span className="mono" style={{fontSize:11}}>
                  {selectedMake === 'default' ? 'Global Default Pricing' : `Overrides Pricing for ${selectedMake}`}
                </span>
              </p>
            </div>
            <button className="btn-p" onClick={save} disabled={saving || !dirty} style={{padding:'10px 22px',fontSize:13}}>
              {saving ? <ISpin cls="w-4 h-4"/> : <><ISave/> Save Pricing</>}
            </button>
          </div>
        </>
      )}
    </div>
  );
}

/* ════════════════════════════════════════════════════════════
   SYSTEM DATABASE VIEW
   ════════════════════════════════════════════════════════════ */
function SystemDatabaseView({ systemData }){
  const [tab, setTab] = useState('vehicles');
  const carDB = systemData?.car_db || {};

  const makes = useMemo(() => Object.keys(carDB).sort(), [carDB]);
  const [selectedMake, setSelectedMake] = useState('');
  const [selectedModel, setSelectedModel] = useState('');
  const [makeSearch, setMakeSearch] = useState('');

  useEffect(() => { if (!selectedMake && makes.length > 0) setSelectedMake(makes[0]); }, [makes]);

  const models = useMemo(() => {
    if (!selectedMake || !carDB[selectedMake]) return [];
    return Object.keys(carDB[selectedMake]).sort();
  }, [carDB, selectedMake]);

  const handleMakeSelect = useCallback((make) => {
    setSelectedMake(make);
    const m = Object.keys(carDB[make] || {}).sort();
    setSelectedModel(m[0] || '');
  }, [carDB]);

  useEffect(() => {
    if (models.length > 0 && !models.includes(selectedModel)) setSelectedModel(models[0]);
  }, [models]);

  const yearRanges = useMemo(() => {
    if (!selectedMake || !selectedModel) return [];
    return Object.entries(carDB[selectedMake]?.[selectedModel] || {});
  }, [carDB, selectedMake, selectedModel]);

  const filteredMakes = useMemo(() => {
    if (!makeSearch.trim()) return makes;
    return makes.filter(m => m.toLowerCase().includes(makeSearch.toLowerCase()));
  }, [makes, makeSearch]);

  const [showAddForm, setShowAddForm] = useState(false);
  const [newMake, setNewMake] = useState('');
  const [newModel, setNewModel] = useState('');
  const [newYear, setNewYear] = useState('');
  const [newEngine, setNewEngine] = useState('');
  const [adding, setAdding] = useState(false);

  const worldModels = useMemo(() => {
    if (!newMake) return [];
    const w = WORLD_CARS[newMake];
    if (w) return w.models;
    const match = Object.keys(WORLD_CARS).find(k => k.toLowerCase() === newMake.toLowerCase());
    return match ? WORLD_CARS[match].models : [];
  }, [newMake]);

  const worldEngines = useMemo(() => {
    if (!newMake) return [];
    const w = WORLD_CARS[newMake];
    if (w) return w.engines;
    const match = Object.keys(WORLD_CARS).find(k => k.toLowerCase() === newMake.toLowerCase());
    return match ? WORLD_CARS[match].engines : [];
  }, [newMake]);

  const YEAR_SUGGESTIONS = ['2022-2025','2020-2024','2019-2023','2018-2022','2017-2021','2016-2020','2015-2019','2014-2018','2012-2016','2010-2014','2008-2012','2005-2009','2000-2005','1995-2000','1990-1995'];

  const handleAddVehicle = async () => {
    const make = newMake.trim(), model = newModel.trim(), year = newYear.trim(), engine = newEngine.trim();
    if(!make||!model||!year||!engine) return alert('Please fill all fields.');
    setAdding(true);
    try {
      const path = `system/car_db/${make}/${model}/${year}`;
      const ref = db.ref(path);
      const snap = await ref.once('value');
      const cur = snap.exists() && Array.isArray(snap.val()) ? snap.val() : [];
      if(!cur.includes(engine)) { cur.push(engine); await ref.set(cur); }
      setShowAddForm(false);
      setNewMake(''); setNewModel(''); setNewYear(''); setNewEngine('');
      setSelectedMake(make);
      setTimeout(() => setSelectedModel(model), 300);
    } catch(e) { alert(e.message); }
    setAdding(false);
  };

  return (
    <div style={{display:'flex',flexDirection:'column',gap:20}}>
      <div>
        <h2 style={{fontSize:22,fontWeight:900,color:'var(--text)',margin:0}}>System Database</h2>
        <p style={{fontSize:13,color:'var(--text2)',margin:'4px 0 0'}}>Manage vehicles, service pricing, and parts catalog across the entire platform.</p>
      </div>
      <div style={{display:'flex',gap:6,borderBottom:'1px solid var(--border)',paddingBottom:12,flexWrap:'wrap'}}>
        <button className={`tab-btn ${tab==='vehicles'?'active':''}`} onClick={()=>setTab('vehicles')}>Vehicle Directory</button>
        <button className={`tab-btn ${tab==='parts'?'active':''}`} onClick={()=>setTab('parts')} style={{display:'flex',alignItems:'center',gap:6}}>
          <ITag/> Parts Catalog & Pricing
        </button>
      </div>

      {tab === 'vehicles' && (
        <div style={{display:'grid',gridTemplateColumns:'220px 1fr',gap:16,minHeight:520}}>
          <div style={{background:'var(--surface)',border:'1px solid var(--border)',borderRadius:18,overflow:'hidden',display:'flex',flexDirection:'column'}}>
            <div style={{padding:'10px 12px',borderBottom:'1px solid var(--border)'}}>
              <div style={{position:'relative'}}>
                <div style={{position:'absolute',left:10,top:'50%',transform:'translateY(-50%)',color:'var(--text3)',pointerEvents:'none'}}><ISearch/></div>
                <input className="search-input" style={{paddingLeft:32,fontSize:12,padding:'7px 12px 7px 32px'}} placeholder={`Search ${makes.length} makes…`} value={makeSearch} onChange={e=>setMakeSearch(e.target.value)}/>
              </div>
            </div>
            <div style={{overflowY:'auto',flex:1}}>
              {filteredMakes.length === 0
                ? <div style={{padding:'16px',fontSize:12,color:'var(--text3)',textAlign:'center'}}>No makes found</div>
                : filteredMakes.map(m => (
                  <div key={m} onClick={() => handleMakeSelect(m)} style={{padding:'9px 14px',cursor:'pointer',fontSize:13,fontWeight:600,transition:'background .1s',background:m===selectedMake?'rgba(77,123,255,0.12)':'transparent',color:m===selectedMake?'var(--accent)':'var(--text2)',borderLeft:m===selectedMake?'3px solid var(--accent)':'3px solid transparent',whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}} title={m}>{m}</div>
                ))
              }
            </div>
            <div style={{padding:'10px 12px',borderTop:'1px solid var(--border)',background:'var(--surface2)'}}>
              <p style={{fontSize:10,color:'var(--text3)',margin:0,textAlign:'center',fontFamily:'JetBrains Mono'}}>{makes.length} makes in DB</p>
            </div>
          </div>
          <div style={{display:'flex',flexDirection:'column',gap:12}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',gap:12}}>
              <div className="model-tabs-wrap" style={{flex:1}}>
                {models.map(m => (
                  <button key={m} className={`tab-btn ${m===selectedModel?'active':''}`} onClick={()=>setSelectedModel(m)}>{m}</button>
                ))}
                {models.length===0 && <span style={{fontSize:13,color:'var(--text3)'}}>No models — select a make or add one.</span>}
              </div>
              <button className="btn-p" onClick={()=>setShowAddForm(!showAddForm)} style={{padding:'7px 14px',fontSize:12,flexShrink:0}}><IPlus/> Add Vehicle</button>
            </div>
            <div style={{background:'var(--surface)',border:'1px solid var(--border)',borderRadius:18,flex:1,overflow:'auto',padding:16,minHeight:420}}>
              {showAddForm ? (
                <div className="anim-up">
                  <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:4}}>
                    <h3 style={{fontSize:15,fontWeight:800,color:'var(--text)',margin:0}}>Add New Vehicle</h3>
                    <button className="btn-g" style={{padding:'5px 12px',fontSize:12}} onClick={()=>{setShowAddForm(false);setNewMake('');setNewModel('');setNewYear('');setNewEngine('');}}>Cancel</button>
                  </div>
                  <p style={{fontSize:12,color:'var(--text3)',margin:'0 0 16px'}}>Select from the global database of {ALL_MAKES.length}+ makes worldwide, or type a custom value.</p>
                  <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:14,marginBottom:18}}>
                    <SearchableDropdown label="MAKE" value={newMake} onChange={v=>{setNewMake(v);setNewModel('');setNewEngine('');}} options={ALL_MAKES} placeholder="Select make…"/>
                    <SearchableDropdown label="MODEL" value={newModel} onChange={v=>{setNewModel(v);setNewEngine('');}} options={worldModels} placeholder={newMake?(worldModels.length>0?'Select model…':'Type custom model'):'Select make first'} disabled={!newMake}/>
                    <SearchableDropdown label="YEAR RANGE" value={newYear} onChange={setNewYear} options={YEAR_SUGGESTIONS} placeholder="Select year range…"/>
                    <SearchableDropdown label="ENGINE" value={newEngine} onChange={setNewEngine} options={worldEngines} placeholder={newMake?(worldEngines.length>0?'Select engine…':'Type custom engine'):'Select make first'} disabled={!newMake}/>
                  </div>
                  <div style={{padding:'12px 14px',borderRadius:10,background:'rgba(77,123,255,0.05)',border:'1px solid rgba(77,123,255,0.15)',marginBottom:16}}>
                    <p style={{fontSize:10,fontWeight:700,color:'var(--accent)',margin:'0 0 8px',letterSpacing:'0.5px'}}>CUSTOM OVERRIDE (if not in list)</p>
                    <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
                      <div><label style={{fontSize:10,color:'var(--text3)',fontWeight:600,display:'block',marginBottom:4}}>Custom Make</label><input className="field" style={{padding:'8px 12px',fontSize:13}} value={newMake} onChange={e=>setNewMake(e.target.value)} placeholder="Type any make…"/></div>
                      <div><label style={{fontSize:10,color:'var(--text3)',fontWeight:600,display:'block',marginBottom:4}}>Custom Model</label><input className="field" style={{padding:'8px 12px',fontSize:13}} value={newModel} onChange={e=>setNewModel(e.target.value)} placeholder="Type any model…"/></div>
                      <div><label style={{fontSize:10,color:'var(--text3)',fontWeight:600,display:'block',marginBottom:4}}>Custom Year Range</label><input className="field" style={{padding:'8px 12px',fontSize:13}} value={newYear} onChange={e=>setNewYear(e.target.value)} placeholder="e.g. 2021-2024"/></div>
                      <div><label style={{fontSize:10,color:'var(--text3)',fontWeight:600,display:'block',marginBottom:4}}>Custom Engine</label><input className="field" style={{padding:'8px 12px',fontSize:13}} value={newEngine} onChange={e=>setNewEngine(e.target.value)} placeholder="e.g. 2.0L Turbo"/></div>
                    </div>
                  </div>
                  {newMake && newModel && newYear && newEngine && (
                    <div className="anim-up" style={{padding:'10px 14px',borderRadius:10,background:'rgba(0,255,136,0.06)',border:'1px solid rgba(0,255,136,0.2)',marginBottom:16,fontSize:12,color:'var(--text2)'}}>
                      <span style={{color:'var(--green)',fontWeight:700}}>✓ Ready to save: </span>
                      {newMake} {newModel} ({newYear}) — <span className="mono" style={{fontSize:11}}>{newEngine}</span>
                    </div>
                  )}
                  <div style={{display:'flex',gap:10}}>
                    <button className="btn-p" onClick={handleAddVehicle} disabled={adding||!newMake||!newModel||!newYear||!newEngine}>
                      {adding?<ISpin cls="w-4 h-4"/>:<><ISave/> Save to Database</>}
                    </button>
                  </div>
                </div>
              ) : selectedModel ? (
                <>
                  <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:16}}>
                    <div style={{width:40,height:40,borderRadius:12,background:'linear-gradient(135deg,var(--accent),var(--accent2))',display:'flex',alignItems:'center',justifyContent:'center',color:'#fff'}}><ICar/></div>
                    <div>
                      <p style={{fontSize:16,fontWeight:800,color:'var(--text)',margin:0}}>{selectedMake} {selectedModel}</p>
                      <p style={{fontSize:11,color:'var(--text3)',margin:0}}>{yearRanges.length} generation(s) in database</p>
                    </div>
                  </div>
                  {yearRanges.length === 0
                    ? <p style={{color:'var(--text3)',fontSize:13}}>No year ranges yet — click "Add Vehicle" to add one.</p>
                    : yearRanges.map(([yr, engines]) => (
                      <div key={yr} style={{marginBottom:12,padding:'12px 14px',borderRadius:14,background:'var(--input-bg)',border:'1px solid var(--border)'}}>
                        <p className="mono" style={{fontSize:10,fontWeight:700,color:'var(--cyan)',margin:'0 0 8px',letterSpacing:'0.5px'}}>{yr}</p>
                        <div style={{display:'flex',flexWrap:'wrap',gap:6}}>
                          {(Array.isArray(engines)?engines:[]).map(e=><span key={e} className="tag">{e}</span>)}
                        </div>
                      </div>
                    ))
                  }
                </>
              ) : (
                <div style={{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',height:300,gap:12,color:'var(--text3)'}}>
                  <ICar/><p style={{fontSize:13,margin:0}}>Select a make on the left, then a model tab above.</p>
                </div>
              )}
            </div>
          </div>
        </div>
      )}

      {tab === 'parts' && (
        <div className="anim-up">
          <PartsCatalogView systemData={systemData} makes={makes}/>
        </div>
      )}
    </div>
  );
}

function JobsView({ jobs, shopInfo }){

}

/* ════════════════════════════════════════════════════════════
   MAIN APP
   ════════════════════════════════════════════════════════════ */
function App(){
  const [user,setUser]=useState(null);
  const [profile,setProfile]=useState({name:'',shop:''});
  const [view,setView]=useState('overview');
  const [ready,setReady]=useState(false);
  const [jobs,setJobs]=useState(null);
  const [systemData,setSystemData]=useState(null);
  const [pendingCount,setPendingCount]=useState(0);
  const [dark,setDark]=useState(()=>{const s=localStorage.getItem('vynix_admin_dark');return s!==null?JSON.parse(s):true;});

  useEffect(()=>{
    localStorage.setItem('vynix_admin_dark',JSON.stringify(dark));
    document.documentElement.setAttribute('data-theme',dark?'dark':'light');
    document.getElementById('meta-theme').content=dark?'#070c1a':'#f0f4ff';
  },[dark]);

  useEffect(()=>{
    return auth.onAuthStateChanged(u=>{
      if(u){
        setUser(u);
        const ref=db.ref(`users/${u.uid}`);
        ref.on('value',snap=>{
          if(snap.exists())setProfile(snap.val());
          else{const d={name:u.displayName||'Admin',shop:'VynixPanelB Admin'};ref.set(d);setProfile(d);}
        });
        setReady(true);
      }
    });
  },[]);

  useEffect(()=>{
    const sysRef=db.ref('system');
    const sysCb=sysRef.on('value',snap=>{
      if(snap.exists()){
        const val=snap.val();
        // Seed if missing
        if(!val.parts_catalog) {
          db.ref('system/parts_catalog').set(DEFAULT_PARTS_CATALOG);
          val.parts_catalog=DEFAULT_PARTS_CATALOG;
        }
        setSystemData(val);
      } else {
        const seed={car_db:DEFAULT_CAR_DB,services:DEFAULT_SERVICE_CATALOG,parts_catalog:DEFAULT_PARTS_CATALOG};
        sysRef.set(seed);
        setSystemData(seed);
      }
    });
    return()=>sysRef.off('value',sysCb);
  },[]);

  useEffect(()=>{
    const ref=db.ref('workshop_jobs').limitToLast(500);
    const cb=ref.on('value',snap=>{
      if(!snap.exists()){setJobs([]);setPendingCount(0);return;}
      const arr=[];let c=0;
      snap.forEach(child=>{const val=child.val();arr.push({id:child.key,...val});if(val.status==='pending_approval')c++;});
      arr.sort((a,b)=>(b.createdAt||0)-(a.createdAt||0));
      setJobs(arr);setPendingCount(c);
    });
    return()=>ref.off('value',cb);
  },[]);

  if(!ready||!user||!systemData)return null;

  const NAV_ITEMS=[
    {id:'overview',l:'Overview',I:IDash},
    {id:'jobs',l:'Workshop Jobs',I:ICar,badge:pendingCount},
    {id:'database',l:'System Database',I:IDB},
    {id:'settings',l:'Settings',I:()=><svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" strokeWidth="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>},
  ];

  const handleSignOut=async()=>{try{await auth.signOut();window.location.replace('login.html');}catch(e){alert(e.message);}};

  return(
    <div style={{minHeight:'100dvh',display:'flex'}}>
      <nav className="sidebar-admin">
        <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:8,padding:'4px 6px'}}>
          <div style={{width:36,height:36,padding:8,borderRadius:12,background:'linear-gradient(135deg,#1a4fff,#0033e6)',color:'#fff',flexShrink:0}}><IWrench/></div>
          <div><p style={{fontSize:14,fontWeight:900,color:'var(--text)',margin:0,letterSpacing:'-0.3px'}}>VynixPanelB</p><p style={{fontSize:9,color:'var(--amber)',margin:0,fontFamily:'JetBrains Mono',fontWeight:700,letterSpacing:'0.5px'}}>★ ADMIN</p></div>
        </div>
        <div style={{padding:'8px 14px',borderRadius:10,background:'rgba(0,255,136,0.06)',border:'1px solid rgba(0,255,136,0.15)',marginBottom:20,display:'flex',alignItems:'center',gap:7}}>
          <span className="live-dot"/><span style={{fontSize:11,fontWeight:600,color:'var(--green)'}}>System Live</span>
        </div>
        <div style={{display:'flex',flexDirection:'column',gap:3,flex:1}}>
          {NAV_ITEMS.map(({id,l,I,badge})=>(
            <button key={id} className={`snav ${view===id?'active':''}`} onClick={()=>setView(id)} style={{position:'relative'}}>
              <I/> {l}
              {badge>0&&<span className="notif-badge">{badge}</span>}
            </button>
          ))}
        </div>
        <div style={{borderTop:'1px solid var(--border)',paddingTop:16}}>
          <div style={{display:'flex',justifyContent:'center',marginBottom:14}}><DarkModePill dark={dark} onToggle={()=>setDark(!dark)}/></div>
          <div style={{display:'flex',alignItems:'center',gap:10,padding:'10px 12px',borderRadius:14,background:'var(--surface)',border:'1px solid var(--border)'}}>
            <img src={user.photoURL||`https://ui-avatars.com/api/?name=${encodeURIComponent(profile.name)}&background=ffa500&color=fff`} alt="" style={{width:34,height:34,borderRadius:'50%',flexShrink:0,border:'2px solid var(--amber)'}}/>
            <div style={{overflow:'hidden',flex:1}}>
              <p style={{fontSize:12,fontWeight:700,color:'var(--text)',margin:0,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{profile.name||'Admin'}</p>
              <p style={{fontSize:10,color:'var(--amber)',margin:'1px 0 0',fontFamily:'JetBrains Mono',fontWeight:600}}>ADMIN</p>
            </div>
            <button onClick={handleSignOut} title="Sign Out" style={{background:'none',border:'none',cursor:'pointer',color:'var(--text3)',display:'flex',padding:4,borderRadius:6}} onMouseOver={e=>e.currentTarget.style.color='var(--red)'} onMouseOut={e=>e.currentTarget.style.color='var(--text3)'}><ILogout/></button>
          </div>
        </div>
      </nav>
      <main style={{flex:1,padding:'28px 32px',overflowY:'auto',minHeight:'100dvh'}}>
        <div style={{maxWidth:1100,margin:'0 auto'}}>
          {view==='overview'&&<OverviewView jobs={jobs} shopInfo={profile}/>}
          {view==='jobs'&&<JobsView jobs={jobs} shopInfo={profile}/>}
          {view==='database'&&<SystemDatabaseView systemData={systemData}/>}
          {view==='settings'&&<SettingsView user={user} profile={profile} onSave={setProfile}/>}
        </div>
      </main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
