      --surface: rgba(255,255,255,0.85);
      --surface2: rgba(255,255,255,0.6);
      --border: rgba(0,0,0,0.07);
      --border2: rgba(0,0,0,0.05);
      --text: #0d1426;
      --text2: #4a5580;
      --text3: #8896bb;
      --accent: #1a4fff;
      --accent2: #0033e6;
      --accent-glow: rgba(26,79,255,0.25);
      --cyan: #0090ff;
      --green: #00b86e;
      --amber: #e8a000;
      --red: #e03030;
      --shadow: 0 4px 24px rgba(0,0,0,0.08);
      --shadow-lg: 0 8px 40px rgba(0,0,0,0.12);
      --input-bg: rgba(0,0,0,0.04);
      --input-border: rgba(0,0,0,0.1);
      --panel-normal-fill: rgba(26,79,255,0.06);
      --panel-normal-stroke: rgba(26,79,255,0.3);
      --car-body-fill: rgba(26,79,255,0.05);
      --car-body-stroke: rgba(26,79,255,0.35);
      --car-glass-fill: rgba(26,79,255,0.1);

      --bg: #070c1a;
      --bg2: #0d1530;
      --surface: rgba(255,255,255,0.04);
      --surface2: rgba(255,255,255,0.02);
      --border: rgba(255,255,255,0.08);
      --border2: rgba(255,255,255,0.05);
      --text: #e8eeff;
      --text2: #8896cc;
      --text3: #4a5580;
      --accent: #4d7bff;
      --accent2: #1a4fff;
      --accent-glow: rgba(77,123,255,0.25);
      --cyan: #00f5ff;
      --green: #00ff88;
      --amber: #ffb800;
      --red: #ff5050;
      --shadow: 0 4px 24px rgba(0,0,0,0.4);
      --shadow-lg: 0 8px 40px rgba(0,0,0,0.6);
      --input-bg: rgba(255,255,255,0.05);
      --input-border: rgba(255,255,255,0.1);
      --panel-normal-fill: rgba(0,245,255,0.04);
      --panel-normal-stroke: rgba(0,245,255,0.25);
      --car-body-fill: rgba(0,245,255,0.05);
      --car-body-stroke: rgba(0,245,255,0.35);
      --car-glass-fill: rgba(0,245,255,0.1);
      --car-wheel-fill: rgba(255,255,255,0.05);
      --car-wheel-stroke: rgba(255,255,255,0.2);
      --skel: linear-gradient(90deg,rgba(255,255,255,0.03) 0%,rgba(255,255,255,0.07) 50%,rgba(255,255,255,0.03) 100%);
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html { font-size: 16px; }
    body {
      background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif;
      -webkit-font-smoothing: antialiased; overscroll-behavior-y: none; margin: 0;
      transition: background 0.3s ease, color 0.3s ease;
    }
    ::-webkit-scrollbar { display: none; }
    * { scrollbar-width: none; }

    /* ─── GLASS & SURFACES ─── */
    .surface {
      background: var(--surface); border: 1px solid var(--border);
      backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
    }
    .surface-solid {
      background: var(--bg2); border: 1px solid var(--border);
    }

    /* ─── INPUTS ─── */
    .field {
      background: var(--input-bg); border: 1px solid var(--input-border);
      color: var(--text); border-radius: 14px; padding: 14px 18px;
      width: 100%; outline: none; font-family: 'Inter', sans-serif;
      font-size: 15px; font-weight: 500; transition: all 0.2s;
      -webkit-appearance: none;
    }
    .field:focus {
      background: rgba(77,123,255,0.08); border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }
    .field::placeholder { color: var(--text3); }

    /* ─── BUTTONS ─── */
    .btn-p {
      background: linear-gradient(135deg, var(--accent), var(--accent2)); color: #fff;
      border: none; border-radius: 100px; padding: 14px 26px;
      font-family: 'Inter', sans-serif; font-weight: 700; font-size: 15px;
      cursor: pointer; transition: all 0.22s; display: inline-flex;
      align-items: center; justify-content: center; gap: 8px; touch-action: manipulation;
    }
    .btn-p:hover { transform: translateY(-2px); box-shadow: 0 8px 28px var(--accent-glow); }
    .btn-p:active { transform: scale(0.97); }
    .btn-p:disabled { background: var(--input-bg); color: var(--text3); cursor: not-allowed; box-shadow: none; transform: none; }

    .btn-g {
      background: var(--input-bg); color: var(--text2); border: 1px solid var(--border);
      border-radius: 100px; padding: 13px 22px; font-family: 'Inter', sans-serif;
      font-weight: 600; font-size: 14px; cursor: pointer; transition: all 0.2s;
      display: inline-flex; align-items: center; justify-content: center; gap: 7px;
    }
    .btn-g:hover { background: var(--border); color: var(--text); }
    .btn-g:active { transform: scale(0.97); }

    /* ─── BADGES ─── */
    .badge {
      display: inline-flex; align-items: center; gap: 4px; padding: 3px 10px;
      border-radius: 100px; font-size: 11px; font-weight: 700; letter-spacing: 0.4px;
      font-family: 'JetBrains Mono', monospace;
    }
    .badge-pending  { background: rgba(232,160,0,0.12); color: var(--amber); border: 1px solid rgba(232,160,0,0.25); }
    .badge-approved { background: rgba(0,184,110,0.1);  color: var(--green); border: 1px solid rgba(0,184,110,0.22); }
    .badge-rejected { background: rgba(224,48,48,0.1);  color: var(--red);   border: 1px solid rgba(224,48,48,0.22); }

    /* ─── SVG CAR PANEL CLASSES ─── */
    .p-hit   { fill: rgba(255,59,59,0.45); stroke: #ff4444; stroke-width: 2; cursor: pointer; transition: fill 0.15s; }
    .p-hit:hover { fill: rgba(255,59,59,0.65); }
    .p-ok    { fill: var(--panel-normal-fill); stroke: var(--panel-normal-stroke); stroke-width: 1.5; cursor: pointer; transition: fill 0.15s, stroke 0.15s; }
    .p-ok:hover { fill: rgba(77,123,255,0.15); stroke: var(--accent); }
    .c-body  { fill: var(--car-body-fill); stroke: var(--car-body-stroke); stroke-width: 1.5; }
    .c-glass { fill: var(--car-glass-fill); stroke: var(--car-body-stroke); stroke-width: 1; pointer-events: none; }
    .c-wheel { fill: var(--car-wheel-fill); stroke: var(--car-wheel-stroke); stroke-width: 1.5; }

    /* ─── EDIT INPUT ─── */
    .edit-n {
      background: var(--input-bg); border: 1px solid var(--input-border); color: var(--text);
      border-radius: 9px; padding: 7px 10px; font-family: 'JetBrains Mono', monospace;
      font-size: 13px; width: 88px; outline: none; transition: border-color 0.2s;
    }
    .edit-n:focus { border-color: var(--accent); box-shadow: 0 0 0 2px var(--accent-glow); }

    /* ─── SKELETON ─── */
    @keyframes shimmer { 0%{background-position:-500px 0} 100%{background-position:500px 0} }
    .skel { background: var(--skel); background-size: 500px 100%; animation: shimmer 1.6s infinite; border-radius: 14px; }

    /* ─── ANIMATIONS ─── */
    @keyframes slideUp { 0%{opacity:0;transform:translateY(16px)} 100%{opacity:1;transform:translateY(0)} }
    @keyframes floatY  { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }
    @keyframes scanLine{ 0%{transform:translateY(0)} 50%{transform:translateY(70px)} 100%{transform:translateY(0)} }
    @keyframes sheetUp { 0%{transform:translateY(100%);opacity:0} 100%{transform:translateY(0);opacity:1} }
    @keyframes modalIn { 0%{opacity:0;transform:translate(-50%,-45%) scale(0.95)} 100%{opacity:1;transform:translate(-50%,-50%) scale(1)} }
    @keyframes overlayIn{ 0%{opacity:0} 100%{opacity:1} }
    
    .anim-up   { animation: slideUp 0.38s cubic-bezier(0.16,1,0.3,1) forwards; }
    .anim-float{ animation: floatY 3s ease-in-out infinite; }
    .anim-scan { animation: scanLine 1.8s ease-in-out infinite; }
    .overlay-in{ animation: overlayIn 0.2s ease forwards; }

    /* ─── DARK MODE PILL TOGGLE ─── */
    .dm-pill {
      display: flex; align-items: center; background: var(--input-bg);
      border: 1px solid var(--border); border-radius: 100px; padding: 3px;
      gap: 2px; cursor: pointer; user-select: none; touch-action: manipulation;
    }
    .dm-btn {
      width: 32px; height: 32px; border-radius: 100px;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.25s; color: var(--text3);
    }
    .dm-btn.active { background: var(--accent); color: #fff; box-shadow: 0 2px 10px var(--accent-glow); }

    /* ─── RESPONSIVE MODAL/SHEET (MOBILE VS DESKTOP) ─── */
    .responsive-overlay {
      position: fixed; inset: 0; z-index: 200; background: rgba(0,0,0,0.6); backdrop-filter: blur(4px);
    }
    .responsive-panel {
      position: fixed; z-index: 201; background: var(--bg2); border: 1px solid var(--border);
      /* Mobile default: Bottom sheet */
      bottom: 0; left: 0; right: 0; top: auto;
      border-radius: 24px 24px 0 0;
      padding: 16px 20px calc(24px + env(safe-area-inset-bottom));
      animation: sheetUp 0.36s cubic-bezier(0.16,1,0.3,1) forwards;
    }
    .responsive-handle {
      width: 36px; height: 4px; background: var(--border); border-radius: 100px; margin: 0 auto 20px;
    }
    @media (min-width: 768px) {
      .responsive-panel {
        /* Desktop: Centered modal */
        top: 50%; left: 50%; bottom: auto; right: auto;
        transform: translate(-50%, -50%);
        width: 420px; border-radius: 24px; padding: 32px;
        animation: modalIn 0.3s cubic-bezier(0.16,1,0.3,1) forwards;
        box-shadow: var(--shadow-lg);
      }
      .responsive-handle { display: none; } /* Hide drag handle on desktop */
    }

    /* ─── MOBILE BOTTOM NAV ─── */
    .mobile-nav {
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 100;
      background: var(--surface); border-top: 1px solid var(--border);
      backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
      padding: 8px 24px calc(8px + env(safe-area-inset-bottom));
      display: flex; align-items: center; justify-content: space-around;
    }
    .mnav-btn {
      display: flex; flex-direction: column; align-items: center; gap: 4px;
      padding: 6px 12px; border: none; background: transparent; cursor: pointer;
      font-family: 'Inter', sans-serif; font-size: 9px; font-weight: 700;
      letter-spacing: 0.6px; color: var(--text3); transition: all 0.2s;
    }
    .mnav-btn.active { color: var(--accent); }
    .mnav-fab {
      width: 52px; height: 52px; border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border: none; cursor: pointer; color: #fff;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 4px 20px var(--accent-glow); transform: translateY(-12px);
    }
    .mnav-fab:active { transform: translateY(-12px) scale(0.93); }

    /* ─── SIDEBAR ─── */
    .sidebar {
      width: 260px; height: 100vh; position: sticky; top: 0;
      background: var(--bg2); border-right: 1px solid var(--border);
      padding: 24px 16px; display: flex; flex-direction: column;
    }
    .snav-item {
      display: flex; align-items: center; gap: 12px; padding: 12px 16px; border-radius: 14px;
      font-family: 'Inter', sans-serif; font-size: 14px; font-weight: 600;
      cursor: pointer; background: transparent; color: var(--text2);
      border: 1px solid transparent; transition: all 0.18s;
    }
    .snav-item.active { background: rgba(77,123,255,0.1); color: var(--accent); border-color: rgba(77,123,255,0.2); }
    .snav-item:not(.active):hover { background: var(--surface); color: var(--text); }

    .stat-card { padding: 18px 20px; border-radius: 20px; background: var(--surface); border: 1px solid var(--border); }
    .est-row {
      display: flex; align-items: center; gap: 12px; padding: 14px 20px; cursor: pointer;
      border-bottom: 1px solid var(--border2); transition: background 0.15s; user-select: none;
    }
    .est-row:hover { background: rgba(77,123,255,0.04); }
    
    .mono { font-family: 'JetBrains Mono', monospace; }
    .step-dot {
      width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center;
      justify-content: center; font-size: 12px; font-weight: 800; transition: all 0.25s; flex-shrink: 0;
    }
    .step-dot.on  { background: var(--accent); color: #fff; box-shadow: 0 0 0 4px var(--accent-glow); }
    .step-dot.off { background: var(--input-bg); color: var(--text3); }
    
    @media (max-width: 640px) { .btn-p, .btn-g { min-height: 48px; } }
  </style>
</head>

  /* ─── PDF EXPORT ──────────────────────── */
  function exportPDF(vehicle, fin, panels, profile, id) {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF({ orientation:'portrait', unit:'mm', format:'a4' });
    const pw = doc.internal.pageSize.getWidth();
    
    const shopName = profile?.shop || 'VynixPanelB Auto';
    const techName = profile?.name || 'Technician';

    doc.setFillColor(7,12,26); doc.rect(0,0,pw,38,'F');
    doc.setFillColor(26,79,255); doc.rect(0,0,4,38,'F');
    doc.setFont('helvetica','bold'); doc.setFontSize(22); doc.setTextColor(232,238,255);
    doc.text(shopName,14,16);
    doc.setFontSize(9); doc.setFont('helvetica','normal'); doc.setTextColor(150,170,220);
    doc.text('AI-Powered Damage Estimate',14,23);
    doc.text(`Issued: ${new Date().toLocaleDateString('en-ZA',{day:'2-digit',month:'long',year:'numeric'})}`,14,29);
    doc.text(`Ref: ${id?id.slice(-8).toUpperCase():'DRAFT'}`,pw-14,29,{align:'right'});
    doc.text(`Prepared by: ${techName}`,pw-14,23,{align:'right'});
    
    doc.setFillColor(15,22,55); doc.roundedRect(10,44,pw-20,22,3,3,'F');
    doc.setFont('helvetica','bold'); doc.setFontSize(9); doc.setTextColor(0,245,255);
    doc.text('VEHICLE DETAILS',16,53);
    doc.setFont('helvetica','normal'); doc.setTextColor(200,210,240);
    doc.text(`Make: ${vehicle.make||'–'}   Model: ${vehicle.model||'–'}   VIN: ${vehicle.vin||'–'}`,16,60);
    
    let nextY = 72;
    if (panels && panels.length > 0) {
      doc.setFont('helvetica','bold'); doc.setFontSize(9); doc.setTextColor(0,245,255);
      doc.text('DAMAGED PANELS',16,nextY);
      doc.setFont('helvetica','normal'); doc.setFontSize(8); doc.setTextColor(200,210,240);
      const names = panels.map(id=>PANELS.find(p=>p.id===id)?.label||id).join(', ');
      const split = doc.splitTextToSize(names,pw-32);
      doc.text(split,16,nextY+6);
      nextY += 6 + split.length * 5 + 8;
    }
    
    doc.autoTable({
      startY: nextY,
      head:[['Description','Labor Hrs','Labor (R)','Parts (R)','Total (R)']],
      body: fin.lineItems.map(i=>[i.description,i.laborHours.toFixed(1),i.laborCost.toFixed(2),i.partsCost.toFixed(2),i.total.toFixed(2)]),
      headStyles:{fillColor:[26,79,255],textColor:[255,255,255],fontStyle:'bold',fontSize:8},
      bodyStyles:{textColor:[30,40,80],fontSize:8,fillColor:[240,244,255]},
      alternateRowStyles:{fillColor:[228,234,255]},
      columnStyles:{0:{cellWidth:60},1:{halign:'center'},2:{halign:'right'},3:{halign:'right'},4:{halign:'right',fontStyle:'bold'}},
      margin:{left:10,right:10}, theme:'grid',
    });
    
    let fy = doc.lastAutoTable.finalY + 8;
    doc.setFillColor(240,244,255); doc.roundedRect(pw-82,fy,72,46,3,3,'F');
    doc.setFontSize(8.5); doc.setFont('helvetica','normal'); doc.setTextColor(80,100,150);
    const rc = pw-14;
    doc.text(`Labor (${fin.totalHours}h @ R${LABOR}/h)`,pw-84,fy+9,{align:'right'});
    doc.text(`R ${(fin.totalHours*LABOR).toFixed(2)}`,rc,fy+9,{align:'right'});
    doc.text('Parts / Materials',pw-84,fy+17,{align:'right'});
    doc.text(`R ${fin.totalParts.toFixed(2)}`,rc,fy+17,{align:'right'});
    doc.text('Subtotal',pw-84,fy+25,{align:'right'});
    doc.text(`R ${fin.subtotal.toFixed(2)}`,rc,fy+25,{align:'right'});
    doc.text('VAT 15%',pw-84,fy+33,{align:'right'});
    doc.text(`R ${fin.tax.toFixed(2)}`,rc,fy+33,{align:'right'});
    doc.setFont('helvetica','bold'); doc.setFontSize(10); doc.setTextColor(26,79,255);
    doc.text('GRAND TOTAL',pw-84,fy+44,{align:'right'});
    doc.text(`R ${fin.grandTotal.toFixed(2)}`,rc,fy+44,{align:'right'});
    
    const ph = doc.internal.pageSize.getHeight();
    doc.setFillColor(7,12,26); doc.rect(0,ph-14,pw,14,'F');
    doc.setFont('helvetica','normal'); doc.setFontSize(7); doc.setTextColor(100,120,160);
    doc.text('VynixPanelB | AI Damage Estimation Platform | Computer-generated estimate',pw/2,ph-7,{align:'center'});
    doc.save(`Estimate_${vehicle.make||'Vehicle'}_${vehicle.model||''}_${Date.now()}.pdf`);
  }

  /* ─── RECALC ──────────────────────────── */
  function recalc(items) {
    const totalHours = items.reduce((s,i)=>s+i.laborHours,0);
    const totalParts = items.reduce((s,i)=>s+i.partsCost,0);
    const subtotal = totalHours*LABOR + totalParts;
    const tax = subtotal*0.15;
    return { totalHours, totalParts, subtotal, tax, grandTotal: subtotal+tax };
  }

  /* ─── ESTIMATE WIZARD ─────────────────── */
  function Wizard({ onDone, profile }) {
    const [step, setStep]   = useState(1);
    const [uploading, setUploading] = useState(false);
    const [analyzing, setAnalyzing] = useState(false);
    const [veh, setVeh]   = useState({ vin:'', make:'', model:'' });
    const [imgs, setImgs] = useState([]);
    const [hit,  setHit]  = useState([]);
    const [fin,  setFin]  = useState(null);
    const [newDesc, setNewDesc] = useState('');
    const [saving, setSaving] = useState(false);

    const togglePanel = id => setHit(p=>p.includes(id)?p.filter(x=>x!==id):[...p,id]);

    const uploadFiles = async e => {
      const files = Array.from(e.target.files);
      if (!files.length) return;
      setUploading(true);
      for (const f of files) {
        const fd = new FormData();
        fd.append('file',f); fd.append('upload_preset',CLOUD_PRESET);
        try { const r=await fetch(CLOUD_URL,{method:'POST',body:fd}); const d=await r.json(); if(d.secure_url) setImgs(p=>[...p,d.secure_url]); } catch{}
      }
      setUploading(false);
    };

    useEffect(()=>{
      if (step!==4) return;
      setAnalyzing(true);
      const t = setTimeout(()=>{
        const panels = hit.length>0 ? hit : ['front-bumper','hood'];
        const items  = panels.map(pid=>{
          const c = PANEL_COSTS[pid]||{p:1500,h:2};
          const lc = c.h*LABOR;
          return {description:PANELS.find(p=>p.id===pid)?.label||pid,laborHours:c.h,laborCost:lc,partsCost:c.p,total:lc+c.p};
        });
        setFin({lineItems:items,...recalc(items)});
        setAnalyzing(false);
      },3000);
      return ()=>clearTimeout(t);
    },[step]);

    const updateItem = (idx,u)=>setFin(p=>{const items=[...p.lineItems];items[idx]=u;return{...p,lineItems:items,...recalc(items)};});
    const deleteItem = idx=>setFin(p=>{const items=p.lineItems.filter((_,i)=>i!==idx);return{...p,lineItems:items,...recalc(items)};});
    const addItem = ()=>{
      if(!newDesc.trim())return;
      const ni={description:newDesc.trim(),laborHours:1,laborCost:LABOR,partsCost:500,total:LABOR+500};
      setFin(p=>{const items=[...p.lineItems,ni];return{...p,lineItems:items,...recalc(items)};});
      setNewDesc('');
    };

    const save = async ()=>{
      if(!fin)return; setSaving(true);
      try {
        await db.ref('estimates').push({
          technicianId: auth.currentUser?.uid || 'anon',
          technicianName: profile?.name || 'Technician',
          shopName: profile?.shop || 'Vynix Auto',
          vehicle:veh, photos:imgs, damagedPanels:hit,
          financials:fin, status:'pending',
          createdAt:firebase.database.ServerValue.TIMESTAMP
        });
        onDone();
      } catch(e){ console.error(e); alert('Error saving.'); }
      setSaving(false);
    };

    const STEP_LABELS = ['Vehicle','Panels','Photos','AI Scan','Summary'];

    return (
      <div style={{maxWidth:680,margin:'0 auto'}}>
        <div className="surface" style={{borderRadius:100,padding:'10px 16px',display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:16}}>
          {STEP_LABELS.map((lbl,i)=>{
            const n=i+1, on=step>=n;
            return (
              <div key={n} style={{display:'flex',alignItems:'center',gap:6}}>
                <div className={`step-dot ${on?'on':'off'}`}>{n}</div>
                <span className="hidden sm:block" style={{fontSize:12,fontWeight:700,color:on?'var(--text)':'var(--text3)'}}>{lbl}</span>
              </div>
            );
          })}
        </div>

        <div className="surface" style={{borderRadius:24,padding:'24px 20px',minHeight:380}}>
          {/* STEP 1 */}
          {step===1 && (
            <div className="anim-up" style={{display:'flex',flexDirection:'column',gap:16}}>
              <div>
                <h2 style={{fontSize:20,fontWeight:800,color:'var(--text)',margin:0}}>Vehicle Details</h2>
                <p style={{fontSize:13,color:'var(--text2)',margin:'6px 0 0'}}>Enter the vehicle information for this estimate</p>
              </div>
              <input className="field" placeholder="VIN Number" value={veh.vin} onChange={e=>setVeh({...veh,vin:e.target.value})}/>
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
                <input className="field" placeholder="Make" value={veh.make} onChange={e=>setVeh({...veh,make:e.target.value})}/>
                <input className="field" placeholder="Model" value={veh.model} onChange={e=>setVeh({...veh,model:e.target.value})}/>
              </div>
              <div style={{display:'flex',justifyContent:'flex-end',marginTop:8}}>
                <button className="btn-p" disabled={!veh.vin||!veh.make} onClick={()=>setStep(2)} style={{width:'100%',maxWidth:220}}>Panel Mapping <IChev/></button>
              </div>
            </div>
          )}

          {/* STEP 2 */}
          {step===2 && (
            <div className="anim-up" style={{display:'flex',flexDirection:'column',gap:16}}>
              <div>
                <h2 style={{fontSize:20,fontWeight:800,color:'var(--text)',margin:0}}>Damage Map</h2>
                <p style={{fontSize:13,color:'var(--text2)',margin:'6px 0 0'}}>Tap the panels that are damaged</p>
              </div>
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16,alignItems:'start'}}>
                <CarWireframe selected={hit} onToggle={togglePanel}/>
                <div>
                  <p className="mono" style={{fontSize:10,fontWeight:700,color:'var(--accent)',letterSpacing:'1px',marginBottom:10}}>SELECTED ({hit.length})</p>
                  {hit.length===0
                    ? <p style={{fontSize:13,color:'var(--text3)'}}>Tap diagram to select panels</p>
                    : <div style={{display:'flex',flexWrap:'wrap',gap:6}}>
                        {hit.map(id=>(
                          <span key={id} className="badge" style={{background:'rgba(224,48,48,0.1)',color:'var(--red)',border:'1px solid rgba(224,48,48,0.2)',fontSize:10}}>
                            {PANELS.find(p=>p.id===id)?.label||id}
                            <button onClick={()=>togglePanel(id)} style={{background:'none',border:'none',cursor:'pointer',color:'inherit',padding:0,marginLeft:2,fontSize:12}}>×</button>
                          </span>
                        ))}
                      </div>
                  }
                </div>
              </div>
              <div style={{display:'flex',gap:10,marginTop:4}}>
                <button className="btn-g" onClick={()=>setStep(1)} style={{flex:'0 0 auto'}}>Back</button>
                <button className="btn-p" onClick={()=>setStep(3)} style={{flex:1}}>
                  {hit.length>0?`Continue (${hit.length})`:'Skip'} <IChev/>
                </button>
              </div>
            </div>
          )}

          {/* STEP 3 */}
          {step===3 && (
            <div className="anim-up" style={{display:'flex',flexDirection:'column',gap:16}}>
              <div>
                <h2 style={{fontSize:20,fontWeight:800,color:'var(--text)',margin:0}}>Damage Photos</h2>
                <p style={{fontSize:13,color:'var(--text2)',margin:'6px 0 0'}}>Upload close-up shots for AI analysis</p>
              </div>
              <label style={{
                display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',

                    <div style={{textAlign:'center'}}>
                      <p style={{fontSize:22,fontWeight:800,color:'var(--green)',marginBottom:4}}>Analysis Complete</p>

                    <button className="btn-p" onClick={()=>setStep(5)} style={{minWidth:220}}>View & Edit Estimate <IChev/></button>
                  </>
              }
            </div>

          {/* STEP 5 */}
          {step===5 && fin && (
            <div className="anim-up" style={{display:'flex',flexDirection:'column',gap:16}}>
              <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',gap:12}}>

                  <p style={{fontSize:12,color:'var(--text2)',margin:'4px 0 0'}}>Edit hours, parts, or add custom items</p>

                <button className="btn-g" onClick={()=>exportPDF(veh,fin,hit,profile,null)}

                  <IDl/> PDF
                </button>
              </div>

              {/* Line items */}
              <div style={{background:'var(--input-bg)',border:'1px solid var(--border)',borderRadius:16,padding:'4px 14px 12px'}}>
                <div style={{display:'grid',gridTemplateColumns:'1fr auto auto auto auto',gap:8,padding:'8px 0',borderBottom:'1px solid var(--border)',marginBottom:4}}>
                  {['ITEM','HRS','PARTS','TOTAL',''].map((h,i)=>(
                    <span key={i} className="mono" style={{fontSize:9,fontWeight:700,color:'var(--text3)',letterSpacing:'0.5px',textAlign:i>0?'right':'left'}}>{h}</span>
                  ))}

                {fin.lineItems.map((item,idx)=>(
                  <LineRow key={idx} item={item} idx={idx} onChange={updateItem} onDelete={deleteItem}/>

                <div style={{display:'flex',gap:8,marginTop:12,paddingTop:12,borderTop:'1px dashed var(--border)'}}>

                    onKeyDown={e=>e.key==='Enter'&&addItem()}/>
                  <button onClick={addItem} style={{
                    background:'rgba(77,123,255,0.1)',color:'var(--accent)',
                    border:'1px solid rgba(77,123,255,0.25)',borderRadius:12,
                    padding:'0 16px',cursor:'pointer',display:'flex',alignItems:'center',gap:6,
                    fontFamily:'Inter',fontWeight:700,fontSize:13,flexShrink:0,minHeight:48
                  }}><IPlus/> Add</button>
                </div>
              </div>

              {/* Totals */}
              <div style={{background:'rgba(77,123,255,0.06)',border:'1px solid rgba(77,123,255,0.18)',borderRadius:16,padding:'14px 16px'}}>

                  [`Labor (${fin.totalHours.toFixed(1)}h × R${LABOR})`,(fin.totalHours*LABOR).toFixed(2)],
                  ['Parts / Materials',fin.totalParts.toFixed(2)],

                  ['VAT 15%',fin.tax.toFixed(2)],
                ].map(([l,v])=>(
                  <div key={l} style={{display:'flex',justifyContent:'space-between',padding:'5px 0',fontSize:13,color:'var(--text2)'}}>
                    <span>{l}</span><span className="mono" style={{color:'var(--text)',fontWeight:600}}>R {v}</span>
                  </div>
                ))}
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',borderTop:'1px solid rgba(77,123,255,0.2)',paddingTop:12,marginTop:6}}>
                  <span style={{fontSize:15,fontWeight:800,color:'var(--accent)'}}>GRAND TOTAL</span>
                  <span className="mono" style={{fontSize:20,fontWeight:800,color:'var(--accent)'}}>R {fin.grandTotal.toFixed(2)}</span>
                </div>
              </div>

              <div style={{display:'flex',gap:10,flexDirection:'column'}}>
                <button className="btn-p" onClick={save} disabled={saving} style={{width:'100%'}}>
                  {saving ? <ISpin/> : <><ICheck/> Save to Database</>}
                </button>
                <div style={{display:'flex',gap:8}}>
                  <button className="btn-g" onClick={()=>exportPDF(veh,fin,hit,profile,null)} style={{flex:1,fontSize:13,color:'var(--accent)',borderColor:'rgba(77,123,255,0.25)'}}><IDl/> Download PDF</button>
                  <button className="btn-g" onClick={()=>setStep(1)} style={{flex:1,fontSize:13}}>Discard</button>
                </div>
              </div>
            </div>
          )}
        </div>
      </div>
    );
  }

  /* ─── DASHBOARD ───────────────────────── */
  function Dash({ onNew, profile }) {
    const [ests, setEsts] = useState(null);
    const [open, setOpen] = useState(null);

    useEffect(()=>{
      // Listen to real-time database changes for persistence on refresh
      const ref = db.ref('estimates').orderByChild('createdAt').limitToLast(60);
      ref.on('value', snap=>{
        if (!snap.exists()) { setEsts([]); return; }
        const arr=[]; snap.forEach(c=>arr.push({id:c.key,...c.val()})); arr.reverse(); setEsts(arr);
      });
      return ()=>ref.off();
    },[]);

    const setStatus = async (id,status) => db.ref(`estimates/${id}`).update({status});

    const approved = ests ? ests.filter(e=>e.status==='approved') : [];
    const revenue  = approved.reduce((s,e)=>s+(e.financials?.grandTotal||0),0);

    return (
      <div style={{display:'flex',flexDirection:'column',gap:16}}>
        {/* Stats */}
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
          {[
            {l:'Total',v:ests?ests.length:'–',c:'var(--accent)'},
            {l:'Pending',v:ests?ests.filter(e=>e.status==='pending').length:'–',c:'var(--amber)'},
            {l:'Approved',v:ests?approved.length:'–',c:'var(--green)'},
            {l:'Revenue',v:ests?`R ${Math.round(revenue).toLocaleString()}`:'–',c:'var(--green)'},
          ].map(s=>(
            <div key={s.l} className="stat-card">
              <p style={{fontSize:11,fontWeight:700,color:'var(--text3)',marginBottom:6,letterSpacing:'0.4px'}}>{s.l.toUpperCase()}</p>
              <p className="mono" style={{fontSize:22,fontWeight:800,color:s.c}}>{s.v}</p>
            </div>

        </div>

          <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'16px 20px',borderBottom:'1px solid var(--border)'}}>

            <button className="btn-p" onClick={onNew} style={{padding:'9px 18px',fontSize:13}}><IPlus/> New</button>

            <div>

                  <div className="est-row" onClick={()=>setOpen(open===est.id?null:est.id)}>
                    <div style={{width:38,height:38,borderRadius:12,background:'rgba(77,123,255,0.1)',border:'1px solid rgba(77,123,255,0.18)',display:'flex',alignItems:'center',justifyContent:'center',color:'var(--accent)',flexShrink:0}}>
                      <ICar/>
                    </div>
                    <div style={{flex:1,minWidth:0}}>
                      <p style={{fontSize:14,fontWeight:700,color:'var(--text)',margin:0,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>

                      <p style={{fontSize:11,color:'var(--text3)',margin:'3px 0 0',whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>

                    </div>
                    <div style={{display:'flex',flexDirection:'column',alignItems:'flex-end',gap:5,flexShrink:0}}>
                      <span className={`badge badge-${est.status||'pending'}`}>
                        {est.status==='pending'?'⬤ PENDING':est.status==='approved'?'⬤ APPROVED':'⬤ REJECTED'}
                      </span>
                      <span className="mono" style={{fontSize:11,fontWeight:700,color:'var(--accent)'}}>R {(est.financials?.grandTotal||0).toFixed(0)}</span>
                    </div>
                    <IChevD open={open===est.id}/>
                  </div>
                  {open===est.id && (

                      <div style={{background:'var(--bg)',border:'1px solid var(--border)',borderRadius:16,padding:14,display:'flex',flexDirection:'column',gap:12}}>

                              ))}
                            </div>
                          </div>
                        )}
                        {est.financials?.lineItems && (
                          <div>
                            <p className="mono" style={{fontSize:9,fontWeight:700,color:'var(--accent)',letterSpacing:'1px',marginBottom:7}}>LINE ITEMS</p>
                            {est.financials.lineItems.map((item,i)=>(
                              <div key={i} style={{display:'flex',justifyContent:'space-between',padding:'5px 0',borderBottom:'1px solid var(--border2)',fontSize:13}}>
                                <span style={{color:'var(--text2)'}}>{item.description}</span>

                              </div>
                            ))}

                        )}
                        {est.photos?.length>0 && (

                            <div style={{display:'flex',gap:8,overflowX:'auto',paddingBottom:4}}>
                              {est.photos.map((u,i)=><img key={i} src={u} alt="" style={{width:72,height:52,objectFit:'cover',borderRadius:10,border:'1px solid var(--border)',flexShrink:0}}/>)}
                            </div>
                          </div>
                        )}
                        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',flexWrap:'wrap',gap:10,paddingTop:4}}>
                          <span className="mono" style={{fontSize:16,fontWeight:800,color:'var(--accent)'}}>R {(est.financials?.grandTotal||0).toFixed(2)}</span>
                          <div style={{display:'flex',gap:7,flexWrap:'wrap'}}>
                            {/* Uses the saved shop/technician name from the estimate history to preserve the record exactly as it was created */}
                            <button onClick={()=>exportPDF(est.vehicle||{},est.financials||{lineItems:[],totalHours:0,totalParts:0,subtotal:0,tax:0,grandTotal:0},est.damagedPanels||[],{name: est.technicianName, shop: est.shopName},est.id)}
                              className="btn-g" style={{padding:'7px 14px',fontSize:12,color:'var(--accent)',borderColor:'rgba(77,123,255,0.25)'}}><IDl/> PDF</button>
                            {est.status!=='approved'&&<button onClick={()=>setStatus(est.id,'approved')} style={{padding:'7px 14px',borderRadius:100,fontSize:12,fontWeight:700,background:'rgba(0,184,110,0.1)',color:'var(--green)',border:'1px solid rgba(0,184,110,0.2)',cursor:'pointer',fontFamily:'Inter'}}>✓ Approve</button>}

                            {est.status!=='pending'&&<button onClick={()=>setStatus(est.id,'pending')} className="btn-g" style={{padding:'7px 14px',fontSize:12}}>Reset</button>}

                        </div>
                      </div>
                    </div>
                  )}
                </div>
              ))}
            </div>
          )}
        </div>
      </div>
    );
  }

    // Handle Authentication & Real-time Profile Loading
    useEffect(()=>{
      return auth.onAuthStateChanged(u=>{
        setUser(u);
        if (u) {

          profileRef.on('value', snap => {

              setProfile(snap.val());

              const defaultProfile = { name: u.displayName || 'Technician', shop: 'VynixPanelB Auto' };
              profileRef.set(defaultProfile);

    const login = async ()=>{
      try { await auth.signInWithPopup(gp); }

              <div style={{display:'flex',alignItems:'center',gap:10}}>
                <DarkModePill dark={dark} onToggle={()=>setDark(!dark)}/>
                <img src={user.photoURL||`https://ui-avatars.com/api/?name=${encodeURIComponent(profile.name)}&background=1a4fff&color=fff`} alt="" onClick={()=>setShowProfile(true)} style={{width:34,height:34,borderRadius:'50%',border:'1px solid var(--border)',cursor:'pointer'}}/>
              </div>
            </header>

            {view==='wizard'
              ? <Wizard onDone={()=>setView('dashboard')} profile={profile} />
              : <Dash onNew={()=>setView('wizard')} profile={profile} />
            }
          </div>
        </main>

        {/* ── Mobile Bottom Nav ── */}
        <nav className="mobile-nav">
          <button className={`mnav-btn ${view==='dashboard'?'active':''}`} onClick={()=>setView('dashboard')}>
            <IDash/> HOME
          </button>
          <button className="mnav-fab" onClick={()=>setView('wizard')}>
            <ICar/>
          </button>
          <button className="mnav-btn" onClick={()=>setSheet(true)} style={{color:sheet?'var(--red)':'var(--text3)'}}>
            <ILogout/> LOGOUT
          </button>
        </nav>

        {/* ── Modals / Sheets ── */}
        {sheet && <LogoutModal onConfirm={confirmLogout} onCancel={()=>setSheet(false)}/>}
        {showProfile && <ProfileModal profile={profile} onSave={saveProfile} onCancel={()=>setShowProfile(false)}/>}
      </div>
    );
  }

  /* ─── INJECT DESKTOP SIDEBAR VIS VIA CSS ── */
  const sidebarStyle = document.createElement('style');
  sidebarStyle.textContent = `@media(min-width:768px){#sidebar{display:flex!important}#main-content{padding-bottom:24px!important}.mobile-nav{display:none!important}}`;
  document.head.appendChild(sidebarStyle);

  ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
