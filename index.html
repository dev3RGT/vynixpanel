  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Syne', 'sans-serif'], mono: ['JetBrains Mono', 'monospace'] },
          colors: {
            ink: { 50:'#f0f4ff', 100:'#dce6ff', 200:'#b9cdff', 300:'#85a8ff', 400:'#4d7bff', 500:'#1a4fff', 600:'#0033e6', 700:'#0028b8', 800:'#001f8a', 900:'#00155c' },
            neon: { cyan:'#00f5ff', green:'#00ff88', amber:'#ffb800', red:'#ff3b3b' },
          },
          animation: {
            'slide-up':'slideUp 0.4s cubic-bezier(0.16,1,0.3,1) forwards',
            'fade-in':'fadeIn 0.3s ease forwards',
            'pulse-neon':'pulseNeon 2s ease-in-out infinite',
            'scan':'scan 1.8s ease-in-out infinite',
            'float':'float 3s ease-in-out infinite',
          },
          keyframes: {
            slideUp:{'0%':{opacity:'0',transform:'translateY(14px)'},'100%':{opacity:'1',transform:'translateY(0)'}},
            fadeIn:{'0%':{opacity:'0'},'100%':{opacity:'1'}},
            pulseNeon:{'0%,100%':{boxShadow:'0 0 8px #00f5ff44'},'50%':{boxShadow:'0 0 24px #00f5ffaa'}},
            scan:{'0%':{transform:'translateY(0)'},'50%':{transform:'translateY(72px)'},'100%':{transform:'translateY(0)'}},
            float:{'0%,100%':{transform:'translateY(0)'},'50%':{transform:'translateY(-8px)'}},
          }

    }

  <style>
    body{background:#070c1a;color:#e8eeff;-webkit-font-smoothing:antialiased;-webkit-tap-highlight-color:transparent;overscroll-behavior-y:none;font-family:'Syne',sans-serif;}
    ::-webkit-scrollbar{display:none;}*{scrollbar-width:none;}
    .glass{background:rgba(255,255,255,0.04);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,0.08);}
    .glass-heavy{background:rgba(10,15,40,0.85);backdrop-filter:blur(30px);border:1px solid rgba(255,255,255,0.1);}
    .neon-border{border:1px solid rgba(0,245,255,0.3);box-shadow:0 0 20px rgba(0,245,255,0.08),inset 0 0 20px rgba(0,245,255,0.03);}
    .input-field{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);color:#e8eeff;border-radius:14px;padding:14px 18px;width:100%;outline:none;font-family:'Syne',sans-serif;font-size:15px;transition:all 0.2s;}

    .btn-primary:hover{transform:translateY(-2px);box-shadow:0 8px 30px rgba(26,79,255,0.5);}
    .btn-primary:disabled{background:rgba(255,255,255,0.1);color:rgba(255,255,255,0.3);cursor:not-allowed;transform:none;box-shadow:none;}
    .btn-ghost{background:rgba(255,255,255,0.06);color:rgba(255,255,255,0.7);border:1px solid rgba(255,255,255,0.1);border-radius:100px;padding:13px 24px;font-family:'Syne',sans-serif;font-weight:600;font-size:14px;cursor:pointer;transition:all 0.2s;}
    .btn-ghost:hover{background:rgba(255,255,255,0.1);color:#fff;}
    .badge{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:100px;font-size:11px;font-weight:700;letter-spacing:0.5px;font-family:'JetBrains Mono',monospace;}
    .badge-pending{background:rgba(255,184,0,0.15);color:#ffb800;border:1px solid rgba(255,184,0,0.3);}
    .badge-approved{background:rgba(0,255,136,0.1);color:#00ff88;border:1px solid rgba(0,255,136,0.25);}
    .badge-rejected{background:rgba(255,59,59,0.1);color:#ff3b3b;border:1px solid rgba(255,59,59,0.25);}
    .panel-hit{fill:rgba(255,59,59,0.5);stroke:#ff3b3b;stroke-width:2;cursor:pointer;transition:all 0.2s;}
    .panel-hit:hover{fill:rgba(255,59,59,0.7);}
    .panel-normal{fill:rgba(0,245,255,0.04);stroke:rgba(0,245,255,0.25);stroke-width:1.5;cursor:pointer;transition:all 0.2s;}
    .panel-normal:hover{fill:rgba(0,245,255,0.15);stroke:rgba(0,245,255,0.6);}
    .car-body{fill:rgba(0,245,255,0.06);stroke:rgba(0,245,255,0.4);stroke-width:1.5;}
    .car-glass{fill:rgba(0,245,255,0.12);stroke:rgba(0,245,255,0.3);stroke-width:1;}
    .car-wheel{fill:rgba(255,255,255,0.06);stroke:rgba(255,255,255,0.25);stroke-width:1.5;}
    .edit-input{background:rgba(0,245,255,0.08);border:1px solid rgba(0,245,255,0.3);color:#e8eeff;border-radius:8px;padding:6px 10px;font-family:'JetBrains Mono',monospace;font-size:13px;width:90px;outline:none;}
    .edit-input:focus{border-color:#00f5ff;box-shadow:0 0 0 2px rgba(0,245,255,0.15);}

    function CarWireframe({ selected, onToggle }) {
      return (
        <div className="flex flex-col items-center">

    // ─── PDF EXPORT ───────────────────────────────────────────────
    function exportPDF(vehicle, estimateData, damagedPanels, techName, estimateId) {
      const { jsPDF } = window.jspdf;
      const doc = new jsPDF({ orientation:'portrait', unit:'mm', format:'a4' });
      const pw = doc.internal.pageSize.getWidth();

      // Header bar
      doc.setFillColor(7,12,26);
      doc.rect(0,0,pw,38,'F');
      doc.setFillColor(26,79,255);
      doc.rect(0,0,4,38,'F');

      doc.setFont('helvetica','bold');
      doc.setFontSize(22);
      doc.setTextColor(232,238,255);
      doc.text('VynixPanelB', 14, 16);
      doc.setFontSize(9);
      doc.setFont('helvetica','normal');
      doc.setTextColor(150,170,220);
      doc.text('AI-Powered Damage Estimate', 14, 23);
      doc.text(`Issued: ${new Date().toLocaleDateString('en-ZA',{day:'2-digit',month:'long',year:'numeric'})}`, 14, 29);
      doc.text(`Ref: ${estimateId ? estimateId.slice(-8).toUpperCase() : 'DRAFT'}`, pw-14, 29, {align:'right'});
      doc.text(`Technician: ${techName || 'N/A'}`, pw-14, 23, {align:'right'});

      // Vehicle section
      doc.setFillColor(15,22,55);
      doc.roundedRect(10,44,pw-20,22,3,3,'F');
      doc.setFont('helvetica','bold');
      doc.setFontSize(9);
      doc.setTextColor(0,245,255);
      doc.text('VEHICLE DETAILS', 16, 53);
      doc.setFont('helvetica','normal');
      doc.setTextColor(200,210,240);
      doc.text(`Make: ${vehicle.make || '–'}   Model: ${vehicle.model || '–'}   VIN: ${vehicle.vin || '–'}`, 16, 60);

      // Damaged panels
      if (damagedPanels && damagedPanels.length > 0) {
        doc.setFont('helvetica','bold');
        doc.setFontSize(9);
        doc.setTextColor(0,245,255);
        doc.text('DAMAGE MAPPING', 16, 76);
        doc.setFont('helvetica','normal');
        doc.setFontSize(8);
        doc.setTextColor(200,210,240);
        const panelNames = damagedPanels.map(id => CAR_PANELS.find(p=>p.id===id)?.label || id).join(', ');
        const split = doc.splitTextToSize(panelNames, pw - 32);
        doc.text(split, 16, 82);
      }

      // Line items table
      const startY = damagedPanels && damagedPanels.length > 0 ? 95 : 76;
      doc.autoTable({
        startY,
        head: [['Description','Labor Hrs','Labor Cost (R)','Parts Cost (R)','Total (R)']],
        body: estimateData.lineItems.map(i => [
          i.description, i.laborHours.toFixed(1),
          i.laborCost.toFixed(2), i.partsCost.toFixed(2), i.total.toFixed(2)
        ]),
        headStyles:{fillColor:[26,79,255],textColor:[255,255,255],fontStyle:'bold',fontSize:8},
        bodyStyles:{textColor:[30,40,80],fontSize:8,fillColor:[240,244,255]},
        alternateRowStyles:{fillColor:[228,234,255]},
        columnStyles:{0:{cellWidth:60},1:{halign:'center'},2:{halign:'right'},3:{halign:'right'},4:{halign:'right',fontStyle:'bold'}},
        margin:{left:10,right:10},
        theme:'grid',
      });

      let finalY = doc.lastAutoTable.finalY + 8;

      // Totals box
      doc.setFillColor(240,244,255);
      doc.roundedRect(pw-80, finalY, 70, 45, 3, 3, 'F');
      doc.setFontSize(8.5);
      doc.setFont('helvetica','normal');
      doc.setTextColor(80,100,150);
      const rCol = pw-14;
      doc.text(`Labor (${estimateData.totalHours}h @ R${LABOR_RATE}/h)`, pw-82, finalY+9, {align:'right'});
      doc.text(`R ${(estimateData.totalHours*LABOR_RATE).toFixed(2)}`, rCol, finalY+9, {align:'right'});
      doc.text('Parts / Materials', pw-82, finalY+17, {align:'right'});
      doc.text(`R ${estimateData.totalParts.toFixed(2)}`, rCol, finalY+17, {align:'right'});
      doc.text('Subtotal', pw-82, finalY+25, {align:'right'});
      doc.text(`R ${estimateData.subtotal.toFixed(2)}`, rCol, finalY+25, {align:'right'});
      doc.text('VAT 15%', pw-82, finalY+33, {align:'right'});
      doc.text(`R ${estimateData.tax.toFixed(2)}`, rCol, finalY+33, {align:'right'});
      doc.setFont('helvetica','bold');
      doc.setFontSize(10);
      doc.setTextColor(26,79,255);
      doc.text('GRAND TOTAL', pw-82, finalY+43, {align:'right'});
      doc.text(`R ${estimateData.grandTotal.toFixed(2)}`, rCol, finalY+43, {align:'right'});

      // Footer
      const pageH = doc.internal.pageSize.getHeight();
      doc.setFillColor(7,12,26);
      doc.rect(0, pageH-16, pw, 16, 'F');
      doc.setFont('helvetica','normal');
      doc.setFontSize(7.5);
      doc.setTextColor(100,120,160);
      doc.text('VynixPanelB | AI Damage Estimation Platform | This is a computer-generated estimate.', pw/2, pageH-8, {align:'center'});

      doc.save(`Estimate_${vehicle.make || 'Vehicle'}_${vehicle.model || ''}_${Date.now()}.pdf`);
    }

    // ─── EDITABLE LINE ITEM ROW ────────────────────────────────────
    function LineItemRow({ item, index, onChange, onDelete }) {
      return (
        <div className="grid grid-cols-12 gap-2 items-center py-3 border-b" style={{borderColor:'rgba(255,255,255,0.06)'}}>
          <div className="col-span-12 sm:col-span-4 text-sm" style={{color:'rgba(255,255,255,0.8)'}}>{item.description}</div>
          <div className="col-span-4 sm:col-span-2 flex flex-col gap-0.5">
            <label className="text-[10px]" style={{color:'rgba(255,255,255,0.35)',fontFamily:'JetBrains Mono'}}>HOURS</label>
            <input type="number" className="edit-input" value={item.laborHours} min="0" step="0.5"
              onChange={e => {
                const h = parseFloat(e.target.value) || 0;
                onChange(index, { ...item, laborHours: h, laborCost: h * LABOR_RATE, total: h * LABOR_RATE + item.partsCost });
              }} />
          </div>
          <div className="col-span-4 sm:col-span-2 flex flex-col gap-0.5">
            <label className="text-[10px]" style={{color:'rgba(255,255,255,0.35)',fontFamily:'JetBrains Mono'}}>PARTS (R)</label>
            <input type="number" className="edit-input" value={item.partsCost} min="0" step="50"
              onChange={e => {
                const p = parseFloat(e.target.value) || 0;
                onChange(index, { ...item, partsCost: p, total: item.laborCost + p });
              }} />
          </div>
          <div className="col-span-3 sm:col-span-3 flex flex-col gap-0.5">
            <label className="text-[10px]" style={{color:'rgba(255,255,255,0.35)',fontFamily:'JetBrains Mono'}}>TOTAL (R)</label>
            <span className="font-mono font-bold text-sm pt-1.5" style={{color:'#00f5ff'}}>{item.total.toFixed(2)}</span>
          </div>
          <div className="col-span-1 flex justify-end">
            <button onClick={() => onDelete(index)} className="p-1.5 rounded-lg hover:bg-red-500/20 transition-colors" style={{color:'rgba(255,59,59,0.7)'}}>
              <ITrash />
            </button>
          </div>
        </div>
      );
    }

    // ─── ESTIMATE WIZARD ──────────────────────────────────────────
    function EstimateWizard({ onComplete }) {
      const [step, setStep] = useState(1);
      const [isUploading, setIsUploading] = useState(false);
      const [isAnalyzing, setIsAnalyzing] = useState(false);
      const [vehicleInfo, setVehicleInfo] = useState({ vin:'', make:'', model:'' });
      const [images, setImages] = useState([]);
      const [damagedPanels, setDamagedPanels] = useState([]);
      const [estimateData, setEstimateData] = useState(null);
      const [newItemDesc, setNewItemDesc] = useState('');
      const [saving, setSaving] = useState(false);

      const togglePanel = (id) => setDamagedPanels(prev => prev.includes(id) ? prev.filter(p=>p!==id) : [...prev, id]);

      const handleImageUpload = async (e) => {
        const files = Array.from(e.target.files);
        if (!files.length) return;
        setIsUploading(true);
        for (const file of files) {
          const fd = new FormData();
          fd.append('file', file);
          fd.append('upload_preset', CLOUDINARY_PRESET);
          try {
            const res = await fetch(CLOUDINARY_URL, {method:'POST',body:fd});
            const d = await res.json();
            if (d.secure_url) setImages(prev => [...prev, d.secure_url]);
          } catch(err) { console.error(err); }
        }
        setIsUploading(false);
      };

      // AI Analysis (uses damaged panels to generate line items)
      useEffect(() => {
        if (step === 4) {
          setIsAnalyzing(true);
          const timer = setTimeout(() => {
            const panelDamageMap = {
              'front-bumper':  { partsCost: 2800, hoursPerPanel: 2.0 },
              'rear-bumper':   { partsCost: 2600, hoursPerPanel: 2.0 },
              'hood':          { partsCost: 4500, hoursPerPanel: 3.0 },
              'trunk':         { partsCost: 4200, hoursPerPanel: 3.0 },
              'roof':          { partsCost: 5500, hoursPerPanel: 4.0 },
              'front-left':    { partsCost: 3200, hoursPerPanel: 2.5 },
              'front-right':   { partsCost: 3200, hoursPerPanel: 2.5 },
              'rear-left':     { partsCost: 3000, hoursPerPanel: 2.5 },
              'rear-right':    { partsCost: 3000, hoursPerPanel: 2.5 },
              'left-door-front':{ partsCost: 3800, hoursPerPanel: 3.0 },
              'left-door-rear':{ partsCost: 3600, hoursPerPanel: 3.0 },
              'right-door-front':{ partsCost: 3800, hoursPerPanel: 3.0 },
              'right-door-rear':{ partsCost: 3600, hoursPerPanel: 3.0 },
              'windshield':    { partsCost: 4200, hoursPerPanel: 1.5 },
              'rear-windshield':{ partsCost: 3800, hoursPerPanel: 1.5 },
            };
            const panelsToProcess = damagedPanels.length > 0 ? damagedPanels : ['front-bumper','hood'];
            let totalHours = 0, totalParts = 0;
            const lineItems = panelsToProcess.map(pid => {
              const info = panelDamageMap[pid] || { partsCost: 1500, hoursPerPanel: 2 };
              const label = CAR_PANELS.find(p=>p.id===pid)?.label || pid;
              const laborHours = info.hoursPerPanel;
              const laborCost = laborHours * LABOR_RATE;
              const partsCost = info.partsCost;
              totalHours += laborHours;
              totalParts += partsCost;
              return { description: label, laborHours, laborCost, partsCost, total: laborCost + partsCost };
            });
            const subtotal = totalHours * LABOR_RATE + totalParts;
            const tax = subtotal * 0.15;
            setEstimateData({ lineItems, totalHours, totalParts, subtotal, tax, grandTotal: subtotal + tax });
            setIsAnalyzing(false);
          }, 3200);
          return () => clearTimeout(timer);
        }
      }, [step]);

      // Editable items helpers
      const updateLineItem = (idx, updated) => {
        setEstimateData(prev => {
          const items = [...prev.lineItems];
          items[idx] = updated;
          const totalHours = items.reduce((s,i) => s + i.laborHours, 0);
          const totalParts = items.reduce((s,i) => s + i.partsCost, 0);
          const subtotal = totalHours * LABOR_RATE + totalParts;
          const tax = subtotal * 0.15;
          return { ...prev, lineItems: items, totalHours, totalParts, subtotal, tax, grandTotal: subtotal + tax };
        });
      };
      const deleteLineItem = (idx) => {
        setEstimateData(prev => {
          const items = prev.lineItems.filter((_,i) => i !== idx);
          const totalHours = items.reduce((s,i) => s + i.laborHours, 0);
          const totalParts = items.reduce((s,i) => s + i.partsCost, 0);
          const subtotal = totalHours * LABOR_RATE + totalParts;
          const tax = subtotal * 0.15;
          return { ...prev, lineItems: items, totalHours, totalParts, subtotal, tax, grandTotal: subtotal + tax };
        });
      };
      const addLineItem = () => {
        if (!newItemDesc.trim()) return;
        const newItem = { description: newItemDesc.trim(), laborHours: 1, laborCost: LABOR_RATE, partsCost: 500, total: LABOR_RATE + 500 };
        setEstimateData(prev => {
          const items = [...prev.lineItems, newItem];
          const totalHours = items.reduce((s,i) => s + i.laborHours, 0);
          const totalParts = items.reduce((s,i) => s + i.partsCost, 0);
          const subtotal = totalHours * LABOR_RATE + totalParts;
          const tax = subtotal * 0.15;
          return { ...prev, lineItems: items, totalHours, totalParts, subtotal, tax, grandTotal: subtotal + tax };
        });
        setNewItemDesc('');
      };

      const handleSave = async () => {
        if (!estimateData) return;
        setSaving(true);
        try {
          const ref = await db.ref('estimates').push({
            technicianId: auth.currentUser?.uid || 'unknown',
            technicianName: auth.currentUser?.displayName || 'Technician',
            vehicle: vehicleInfo,
            photos: images,
            damagedPanels,
            financials: estimateData,
            status: 'pending',
            createdAt: firebase.database.ServerValue.TIMESTAMP
          });
          onComplete();
        } catch(err) {
          console.error(err);
          alert('Error saving estimate.');
        }
        setSaving(false);
      };

      const STEPS = ['Vehicle','Panels','Photos','AI Scan','Summary'];

      return (
        <div className="max-w-3xl mx-auto space-y-5">
          {/* Step bar */}
          <div className="glass rounded-full px-4 py-3 flex items-center justify-between animate-slide-up">
            {STEPS.map((label, i) => {
              const num = i + 1;
              const active = step >= num;
              return (
                <div key={num} className="flex items-center gap-1.5">
                  <div className={`w-7 h-7 rounded-full flex items-center justify-center text-xs font-bold transition-all ${active ? 'bg-ink-500 text-white shadow-[0_0_12px_rgba(26,79,255,0.6)]' : 'bg-white/5 text-white/30'}`}>{num}</div>
                  <span className={`hidden sm:block text-xs font-semibold transition-colors ${active ? 'text-white/80' : 'text-white/25'}`}>{label}</span>
                </div>
              );
            })}
          </div>

          <div className="glass rounded-3xl p-6 sm:p-8 min-h-96">

            {/* STEP 1 - Vehicle */}
            {step === 1 && (
              <div className="space-y-5 animate-slide-up">
                <div>
                  <h2 className="text-2xl font-bold">Vehicle Details</h2>
                  <p className="text-sm mt-1" style={{color:'rgba(255,255,255,0.4)'}}>Enter the vehicle information for this estimate</p>
                </div>
                <input className="input-field" placeholder="VIN Number" value={vehicleInfo.vin} onChange={e=>setVehicleInfo({...vehicleInfo,vin:e.target.value})}/>
                <div className="grid grid-cols-2 gap-4">
                  <input className="input-field" placeholder="Make (e.g. Toyota)" value={vehicleInfo.make} onChange={e=>setVehicleInfo({...vehicleInfo,make:e.target.value})}/>
                  <input className="input-field" placeholder="Model (e.g. Corolla)" value={vehicleInfo.model} onChange={e=>setVehicleInfo({...vehicleInfo,model:e.target.value})}/>
                </div>
                <div className="flex justify-end pt-2">
                  <button className="btn-primary" disabled={!vehicleInfo.vin||!vehicleInfo.make} onClick={()=>setStep(2)}>Panel Mapping <IChev/></button>
                </div>
              </div>
            )}

            {/* STEP 2 - Damage Map */}
            {step === 2 && (
              <div className="space-y-5 animate-slide-up">
                <div>
                  <h2 className="text-2xl font-bold">Interactive Damage Map</h2>
                  <p className="text-sm mt-1" style={{color:'rgba(255,255,255,0.4)'}}>Tap the panels that are damaged on the car diagram below</p>
                </div>
                <div className="grid grid-cols-1 sm:grid-cols-2 gap-6 items-start">
                  <CarWireframe selected={damagedPanels} onToggle={togglePanel} />
                  <div>
                    <p className="text-xs font-bold mb-3" style={{color:'rgba(0,245,255,0.7)',fontFamily:'JetBrains Mono',letterSpacing:'1px'}}>SELECTED PANELS ({damagedPanels.length})</p>
                    {damagedPanels.length === 0
                      ? <p className="text-sm" style={{color:'rgba(255,255,255,0.3)'}}>No panels selected yet. Tap on the diagram.</p>
                      : <div className="flex flex-wrap gap-2">
                          {damagedPanels.map(id => (
                            <span key={id} className="badge" style={{background:'rgba(255,59,59,0.12)',color:'#ff7070',border:'1px solid rgba(255,59,59,0.25)'}}>
                              {CAR_PANELS.find(p=>p.id===id)?.label || id}
                              <button onClick={()=>togglePanel(id)} style={{opacity:0.6,marginLeft:2}}>×</button>
                            </span>
                          ))}
                        </div>
                    }
                  </div>
                </div>
                <div className="flex flex-col-reverse sm:flex-row justify-between gap-3 pt-2">
                  <button className="btn-ghost" onClick={()=>setStep(1)}>Back</button>
                  <button className="btn-primary" onClick={()=>setStep(3)}>
                    {damagedPanels.length > 0 ? `Continue with ${damagedPanels.length} panel(s)` : 'Skip'} <IChev/>
                  </button>
                </div>
              </div>
            )}

            {/* STEP 3 - Photos */}
            {step === 3 && (
              <div className="space-y-5 animate-slide-up">
                <div>
                  <h2 className="text-2xl font-bold">Damage Photos</h2>
                  <p className="text-sm mt-1" style={{color:'rgba(255,255,255,0.4)'}}>Upload close-up shots of the damaged areas for AI analysis</p>
                </div>
                <label className="flex flex-col items-center justify-center w-full h-48 border-2 border-dashed rounded-2xl cursor-pointer transition-all hover:border-cyan-400/60 hover:bg-cyan-400/5" style={{borderColor:'rgba(0,245,255,0.2)'}}>
                  {isUploading
                    ? <div style={{color:'#00f5ff'}}><ISpin/></div>
                    : <div className="flex flex-col items-center" style={{color:'rgba(0,245,255,0.5)'}}>
                        <IUpload/>
                        <span className="text-sm font-medium mt-2">Tap to Upload</span>
                        <span className="text-xs mt-1" style={{color:'rgba(255,255,255,0.3)'}}>Multiple files accepted</span>
                      </div>
                  }
                  <input type="file" multiple accept="image/*" className="hidden" onChange={handleImageUpload} disabled={isUploading}/>
                </label>
                {images.length > 0 && (
                  <div className="grid grid-cols-3 sm:grid-cols-4 gap-2">
                    {images.map((img,i) => (
                      <img key={i} src={img} alt="" className="w-full h-20 object-cover rounded-xl" style={{border:'1px solid rgba(0,245,255,0.15)'}}/>
                    ))}
                  </div>
                )}
                <div className="flex flex-col-reverse sm:flex-row justify-between gap-3 pt-2">
                  <button className="btn-ghost" onClick={()=>setStep(2)}>Back</button>
                  <button className="btn-primary" disabled={images.length<1||isUploading} onClick={()=>setStep(4)}>Run AI Analysis <IChev/></button>
                </div>
              </div>
            )}

            {/* STEP 4 - AI Scan */}
            {step === 4 && (
              <div className="flex flex-col items-center justify-center min-h-64 gap-6 animate-slide-up">
                {isAnalyzing ? (
                  <>
                    <div className="relative animate-float">
                      <ICamera/>
                      <div className="absolute top-0 left-0 w-full h-0.5 rounded-full animate-scan" style={{background:'linear-gradient(90deg,transparent,#00f5ff,transparent)',boxShadow:'0 0 10px #00f5ff'}}/>
                    </div>
                    <div className="text-center">
                      <h2 className="text-xl font-bold" style={{color:'#00f5ff'}}>Neural Analysis Running…</h2>
                      <p className="text-sm mt-2" style={{color:'rgba(255,255,255,0.4)'}}>Mapping {damagedPanels.length || 2} panels · Calculating repair estimates</p>
                    </div>
                    <div className="flex gap-1.5">{[0,1,2,3,4].map(i=><div key={i} className="w-1.5 h-1.5 rounded-full animate-pulse" style={{background:'#00f5ff',opacity:0.6,animationDelay:`${i*0.15}s`}}/>)}</div>
                  </>
                ) : (
                  <>
                    <div className="p-4 rounded-full" style={{background:'rgba(0,255,136,0.1)',boxShadow:'0 0 30px rgba(0,255,136,0.2)'}}>
                      <svg className="w-14 h-14" fill="none" stroke="#00ff88" viewBox="0 0 24 24" strokeWidth="1.5"><path strokeLinecap="round" strokeLinejoin="round" d="M22 11.08V12a10 10 0 1 1-5.93-9.14M22 4L12 14.01l-3-3"/></svg>
                    </div>
                    <div className="text-center">
                      <h2 className="text-2xl font-bold" style={{color:'#00ff88'}}>Analysis Complete</h2>
                      <p className="text-sm mt-1" style={{color:'rgba(255,255,255,0.4)'}}>{estimateData?.lineItems.length} damage items detected</p>
                    </div>
                    <button className="btn-primary" onClick={()=>setStep(5)}>View & Edit Estimate <IChev/></button>
                  </>
                )}
              </div>
            )}

            {/* STEP 5 - Editable Summary */}
            {step === 5 && estimateData && (
              <div className="space-y-5 animate-slide-up">
                <div className="flex items-start justify-between">
                  <div>
                    <h2 className="text-2xl font-bold">Estimate Summary</h2>
                    <p className="text-sm mt-0.5" style={{color:'rgba(255,255,255,0.4)'}}>Edit hours, parts costs, or add custom line items</p>
                  </div>
                  <button
                    onClick={()=>exportPDF(vehicleInfo, estimateData, damagedPanels, auth.currentUser?.displayName, null)}
                    className="btn-ghost flex items-center gap-2 text-sm px-4 py-2"
                    style={{color:'#00f5ff',borderColor:'rgba(0,245,255,0.25)',flexShrink:0}}
                  >
                    <IDownload/> PDF
                  </button>
                </div>

                {/* Editable line items */}
                <div className="rounded-2xl p-4" style={{background:'rgba(255,255,255,0.03)',border:'1px solid rgba(255,255,255,0.07)'}}>
                  <div className="hidden sm:grid grid-cols-12 gap-2 pb-2 mb-1 text-[10px] font-bold" style={{color:'rgba(0,245,255,0.5)',fontFamily:'JetBrains Mono',letterSpacing:'0.8px',borderBottom:'1px solid rgba(255,255,255,0.06)'}}>
                    <div className="col-span-4">DESCRIPTION</div><div className="col-span-2">HOURS</div><div className="col-span-2">PARTS (R)</div><div className="col-span-3">TOTAL (R)</div><div className="col-span-1"></div>
                  </div>
                  {estimateData.lineItems.map((item, idx) => (
                    <LineItemRow key={idx} item={item} index={idx} onChange={updateLineItem} onDelete={deleteLineItem}/>
                  ))}
                  {/* Add custom item */}
                  <div className="flex gap-2 mt-3 pt-3" style={{borderTop:'1px dashed rgba(255,255,255,0.08)'}}>
                    <input className="input-field flex-1" placeholder="Add custom line item description…" value={newItemDesc} onChange={e=>setNewItemDesc(e.target.value)}
                      onKeyDown={e=>e.key==='Enter'&&addLineItem()} style={{padding:'10px 14px',fontSize:'13px'}}/>
                    <button onClick={addLineItem} className="p-3 rounded-xl flex items-center gap-1.5 text-sm font-semibold" style={{background:'rgba(0,245,255,0.1)',color:'#00f5ff',border:'1px solid rgba(0,245,255,0.2)',flexShrink:0}}>
                      <IPlus/><span className="hidden sm:inline">Add</span>
                    </button>
                  </div>
                </div>

                {/* Totals */}
                <div className="rounded-2xl p-4 space-y-2 text-right" style={{background:'rgba(26,79,255,0.06)',border:'1px solid rgba(26,79,255,0.2)'}}>
                  {[
                    [`Labor (${estimateData.totalHours.toFixed(1)}h × R${LABOR_RATE})`, (estimateData.totalHours*LABOR_RATE).toFixed(2)],
                    ['Parts / Materials', estimateData.totalParts.toFixed(2)],
                    ['Subtotal', estimateData.subtotal.toFixed(2)],
                    ['VAT 15%', estimateData.tax.toFixed(2)],
                  ].map(([label,val])=>(
                    <div key={label} className="flex justify-between text-sm" style={{color:'rgba(255,255,255,0.5)'}}>
                      <span>{label}</span><span className="font-mono" style={{color:'rgba(255,255,255,0.8)'}}>R {val}</span>
                    </div>
                  ))}
                  <div className="flex justify-between items-center pt-3 mt-3" style={{borderTop:'1px solid rgba(26,79,255,0.3)'}}>
                    <span className="text-base font-bold" style={{color:'#00f5ff'}}>GRAND TOTAL</span>
                    <span className="text-xl font-bold font-mono" style={{color:'#00f5ff'}}>R {estimateData.grandTotal.toFixed(2)}</span>
                  </div>
                </div>

                <div className="flex flex-col-reverse sm:flex-row justify-between gap-3">
                  <button className="btn-ghost" onClick={()=>setStep(1)}>Discard</button>
                  <div className="flex gap-3">
                    <button onClick={()=>exportPDF(vehicleInfo, estimateData, damagedPanels, auth.currentUser?.displayName, null)}
                      className="btn-ghost flex items-center gap-2" style={{color:'#00f5ff',borderColor:'rgba(0,245,255,0.25)'}}>
                      <IDownload/> Download PDF
                    </button>
                    <button className="btn-primary" onClick={handleSave} disabled={saving}>
                      {saving ? <ISpin/> : <><ICheck/> Save Estimate</>}
                    </button>
                  </div>
                </div>
              </div>
            )}
          </div>
        </div>
      );
    }

    // ─── LIVE DASHBOARD ───────────────────────────────────────────
    function Dashboard({ onNew }) {
      const [estimates, setEstimates] = useState(null);
      const [selected, setSelected] = useState(null);

      useEffect(() => {
        const ref = db.ref('estimates').orderByChild('createdAt').limitToLast(50);
        ref.on('value', snap => {
          if (!snap.exists()) { setEstimates([]); return; }
          const arr = [];
          snap.forEach(child => arr.push({ id: child.key, ...child.val() }));
          arr.reverse();
          setEstimates(arr);
        });
        return () => ref.off();
      }, []);

      const updateStatus = async (id, status) => {
        await db.ref(`estimates/${id}`).update({ status });
      };

      const totalRevenue = estimates ? estimates.filter(e=>e.status==='approved').reduce((s,e)=>s+(e.financials?.grandTotal||0),0) : 0;
      const pending = estimates ? estimates.filter(e=>e.status==='pending').length : 0;

      return (
        <div className="space-y-6 animate-slide-up">
          {/* Stats */}
          <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
            {[
              { label:'Total Estimates', value: estimates ? estimates.length : '–', color:'#00f5ff' },
              { label:'Pending Approval', value: estimates ? pending : '–', color:'#ffb800' },
              { label:'Approved', value: estimates ? estimates.filter(e=>e.status==='approved').length : '–', color:'#00ff88' },
              { label:'Revenue (Approved)', value: estimates ? `R ${totalRevenue.toLocaleString('en-ZA',{minimumFractionDigits:0,maximumFractionDigits:0})}` : '–', color:'#00ff88' },
            ].map(s => (
              <div key={s.label} className="glass rounded-2xl p-5">
                <p className="text-xs font-semibold mb-2" style={{color:'rgba(255,255,255,0.4)',letterSpacing:'0.5px'}}>{s.label.toUpperCase()}</p>
                <p className="text-2xl font-bold font-mono" style={{color:s.color}}>{s.value}</p>
              </div>
            ))}
          </div>

          {/* Estimates List */}
          <div className="glass rounded-3xl overflow-hidden">
            <div className="flex items-center justify-between px-6 py-4" style={{borderBottom:'1px solid rgba(255,255,255,0.07)'}}>
              <h2 className="text-lg font-bold">Recent Estimates</h2>
              <button onClick={onNew} className="btn-primary text-sm px-5 py-2.5"><IPlus/> New</button>
            </div>

            {estimates === null ? (
              <div className="p-6 space-y-3">
                {[1,2,3].map(i=><div key={i} className="skeleton h-14 rounded-xl"/>)}
              </div>
            ) : estimates.length === 0 ? (
              <div className="text-center py-16 px-6">
                <div className="w-12 h-12 mx-auto mb-4 opacity-20"><ICar/></div>
                <p style={{color:'rgba(255,255,255,0.4)'}}>No estimates yet. Create your first one.</p>
                <button onClick={onNew} className="btn-primary mt-5 mx-auto">Create Estimate <IChev/></button>
              </div>
            ) : (
              <div className="divide-y" style={{divideColor:'rgba(255,255,255,0.05)'}}>
                {estimates.map(est => (
                  <div key={est.id}>
                    <div
                      className="px-6 py-4 flex items-center gap-4 cursor-pointer hover:bg-white/[0.02] transition-colors"
                      onClick={() => setSelected(selected===est.id ? null : est.id)}
                    >
                      <div className="w-10 h-10 rounded-xl flex items-center justify-center shrink-0" style={{background:'rgba(26,79,255,0.15)',border:'1px solid rgba(26,79,255,0.2)'}}>
                        <ICar/>
                      </div>
                      <div className="flex-1 min-w-0">
                        <p className="font-semibold truncate">{est.vehicle?.make} {est.vehicle?.model} <span className="font-mono text-xs" style={{color:'rgba(255,255,255,0.4)'}}>{est.vehicle?.vin}</span></p>
                        <p className="text-xs mt-0.5" style={{color:'rgba(255,255,255,0.35)'}}>
                          {est.createdAt ? new Date(est.createdAt).toLocaleDateString('en-ZA',{day:'2-digit',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'}) : 'Unknown date'}
                          {est.technicianName ? ` · ${est.technicianName}` : ''}
                        </p>
                      </div>
                      <div className="flex items-center gap-3 shrink-0">
                        <span className="font-mono font-bold text-sm hidden sm:block" style={{color:'#00f5ff'}}>R {(est.financials?.grandTotal||0).toFixed(2)}</span>
                        <span className={`badge badge-${est.status||'pending'}`}>
                          {est.status === 'pending' ? '⬤ PENDING' : est.status === 'approved' ? '⬤ APPROVED' : '⬤ REJECTED'}
                        </span>
                        <svg className={`w-4 h-4 transition-transform duration-200 ${selected===est.id?'rotate-90':''}`} fill="none" stroke="currentColor" viewBox="0 0 24 24" strokeWidth="2" style={{color:'rgba(255,255,255,0.3)'}}><path strokeLinecap="round" strokeLinejoin="round" d="M9 5l7 7-7 7"/></svg>
                      </div>
                    </div>

                    {/* Expanded detail */}
                    {selected === est.id && (
                      <div className="px-6 pb-5 animate-slide-up">
                        <div className="rounded-2xl p-4 space-y-4" style={{background:'rgba(0,0,0,0.25)',border:'1px solid rgba(255,255,255,0.06)'}}>
                          {/* Damaged panels */}
                          {est.damagedPanels && est.damagedPanels.length > 0 && (
                            <div>
                              <p className="text-[10px] font-bold mb-2" style={{color:'rgba(0,245,255,0.5)',fontFamily:'JetBrains Mono',letterSpacing:'1px'}}>DAMAGED PANELS</p>
                              <div className="flex flex-wrap gap-1.5">
                                {est.damagedPanels.map(id => (
                                  <span key={id} className="badge" style={{background:'rgba(255,59,59,0.1)',color:'#ff7070',border:'1px solid rgba(255,59,59,0.2)',fontSize:'10px'}}>
                                    {CAR_PANELS.find(p=>p.id===id)?.label || id}
                                  </span>
                                ))}
                              </div>
                            </div>
                          )}
                          {/* Line items */}
                          {est.financials?.lineItems && (
                            <div>
                              <p className="text-[10px] font-bold mb-2" style={{color:'rgba(0,245,255,0.5)',fontFamily:'JetBrains Mono',letterSpacing:'1px'}}>LINE ITEMS</p>
                              <div className="space-y-1">
                                {est.financials.lineItems.map((item,i) => (
                                  <div key={i} className="flex justify-between text-sm py-1" style={{borderBottom:'1px solid rgba(255,255,255,0.04)'}}>
                                    <span style={{color:'rgba(255,255,255,0.6)'}}>{item.description}</span>
                                    <span className="font-mono font-bold" style={{color:'#e8eeff'}}>R {item.total?.toFixed(2)}</span>
                                  </div>
                                ))}
                              </div>
                            </div>
                          )}
                          {/* Photos strip */}
                          {est.photos && est.photos.length > 0 && (
                            <div>
                              <p className="text-[10px] font-bold mb-2" style={{color:'rgba(0,245,255,0.5)',fontFamily:'JetBrains Mono',letterSpacing:'1px'}}>PHOTOS ({est.photos.length})</p>
                              <div className="flex gap-2 overflow-x-auto">
                                {est.photos.map((url,i) => <img key={i} src={url} alt="" className="w-20 h-14 object-cover rounded-lg shrink-0" style={{border:'1px solid rgba(255,255,255,0.1)'}}/>)}
                              </div>
                            </div>
                          )}
                          {/* Grand total + actions */}
                          <div className="flex flex-col sm:flex-row items-start sm:items-center justify-between gap-3 pt-2">
                            <div className="text-lg font-bold font-mono" style={{color:'#00f5ff'}}>
                              Grand Total: R {(est.financials?.grandTotal||0).toFixed(2)}
                            </div>
                            <div className="flex gap-2 flex-wrap">
                              <button onClick={()=>exportPDF(est.vehicle||{}, est.financials||{lineItems:[],totalHours:0,totalParts:0,subtotal:0,tax:0,grandTotal:0}, est.damagedPanels||[], est.technicianName, est.id)}
                                className="btn-ghost flex items-center gap-1.5 text-xs px-3 py-2" style={{color:'#00f5ff',borderColor:'rgba(0,245,255,0.25)'}}>
                                <IDownload/> PDF
                              </button>
                              {est.status !== 'approved' && (
                                <button onClick={()=>updateStatus(est.id,'approved')} className="text-xs px-4 py-2 rounded-full font-semibold transition-all" style={{background:'rgba(0,255,136,0.12)',color:'#00ff88',border:'1px solid rgba(0,255,136,0.25)'}}>
                                  ✓ Approve
                                </button>
                              )}
                              {est.status !== 'rejected' && (
                                <button onClick={()=>updateStatus(est.id,'rejected')} className="text-xs px-4 py-2 rounded-full font-semibold transition-all" style={{background:'rgba(255,59,59,0.1)',color:'#ff7070',border:'1px solid rgba(255,59,59,0.25)'}}>
                                  ✕ Reject
                                </button>
                              )}
                              {est.status !== 'pending' && (
                                <button onClick={()=>updateStatus(est.id,'pending')} className="btn-ghost text-xs px-4 py-2">
                                  Reset
                                </button>
                              )}
                            </div>
                          </div>
                        </div>
                      </div>
                    )}
                  </div>
                ))}
              </div>
            )}
          </div>
        </div>
      );
    }

    // ─── APP SHELL ────────────────────────────────────────────────
    function App() {
      const [user, setUser] = useState(null);
      const [view, setView] = useState('dashboard');
      const [loadingAuth, setLoadingAuth] = useState(true);

      useEffect(() => {
        const unsub = auth.onAuthStateChanged(u => { setUser(u); setLoadingAuth(false); });
        return unsub;
      }, []);

      const login = async () => {
        try { await auth.signInWithPopup(googleProvider); }
        catch(e) { alert('Login failed: ' + e.message); }
      };

      if (loadingAuth) return (
        <div className="min-h-screen flex items-center justify-center">
          <ISpin/>
        </div>
      );

      if (!user) return (
        <div className="min-h-screen flex items-center justify-center p-5 relative overflow-hidden">
          <div className="absolute inset-0" style={{background:'radial-gradient(ellipse at 20% 50%, rgba(26,79,255,0.12) 0%,transparent 60%), radial-gradient(ellipse at 80% 20%, rgba(0,245,255,0.08) 0%,transparent 50%)'}}/>
          <div className="w-full max-w-sm glass rounded-3xl p-8 animate-slide-up relative z-10 neon-border">
            <div className="flex justify-center mb-8 animate-float">
              <div className="w-16 h-16 p-3.5 rounded-2xl" style={{background:'linear-gradient(135deg,#1a4fff,#0033e6)',boxShadow:'0 8px 30px rgba(26,79,255,0.5)'}}>
                <IWrench/>
              </div>
            </div>
            <h1 className="text-3xl font-extrabold text-center mb-1">VynixPanelB</h1>
            <p className="text-center text-sm mb-8" style={{color:'rgba(255,255,255,0.4)'}}>Technician Workspace</p>
            <button onClick={login} className="w-full flex items-center justify-center gap-3 py-4 px-6 rounded-full font-semibold transition-all hover:-translate-y-1" style={{background:'rgba(255,255,255,0.07)',border:'1px solid rgba(255,255,255,0.12)',color:'#e8eeff'}}>
              <IGoog/> Continue with Google
            </button>
          </div>
        </div>
      );

      return (
        <div className="min-h-screen flex flex-col md:flex-row">
          {/* Sidebar */}
          <nav className="hidden md:flex flex-col w-64 h-screen sticky top-0 p-5" style={{background:'rgba(7,12,26,0.95)',borderRight:'1px solid rgba(255,255,255,0.06)'}}>
            <div className="flex items-center gap-3 mb-8 px-2">
              <div className="w-9 h-9 p-2 rounded-xl shrink-0" style={{background:'linear-gradient(135deg,#1a4fff,#0033e6)'}}>
                <IWrench/>
              </div>
              <span className="text-lg font-extrabold tracking-tight">VynixPanelB</span>
            </div>
            <div className="space-y-1 flex-1">
              {[
                {id:'dashboard', label:'Dashboard', Icon: IDash},
                {id:'wizard', label:'New Estimate', Icon: ICar},
              ].map(({id,label,Icon}) => (
                <button key={id} onClick={()=>setView(id)} className="w-full flex items-center gap-3 px-4 py-3.5 rounded-2xl text-sm font-semibold transition-all" style={view===id?{background:'rgba(26,79,255,0.18)',color:'#7eb3ff',border:'1px solid rgba(26,79,255,0.25)'}:{color:'rgba(255,255,255,0.45)',border:'1px solid transparent'}}>
                  <Icon/> {label}
                </button>
              ))}
            </div>
            <div style={{borderTop:'1px solid rgba(255,255,255,0.07)',paddingTop:'1rem'}}>
              <div className="flex items-center gap-3 px-2 mb-3">
                <img src={user.photoURL||`https://ui-avatars.com/api/?name=${user.displayName}&background=1a4fff&color=fff`} alt="" className="w-9 h-9 rounded-full shrink-0"/>
                <div className="overflow-hidden">
                  <p className="text-sm font-semibold truncate">{user.displayName||'Technician'}</p>
                  <p className="text-xs truncate" style={{color:'rgba(255,255,255,0.35)'}}>{user.email}</p>
                </div>
              </div>
              <button onClick={()=>auth.signOut()} className="w-full flex items-center justify-center gap-2 py-2.5 rounded-xl text-sm font-semibold" style={{background:'rgba(255,59,59,0.08)',color:'rgba(255,59,59,0.8)',border:'1px solid rgba(255,59,59,0.15)'}}>
                <ILogout/> Sign Out
              </button>
            </div>
          </nav>

          {/* Main */}
          <main className="flex-1 p-4 md:p-8 pb-28 md:pb-8 overflow-y-auto">
            <div className="max-w-5xl mx-auto">
              <header className="mb-6 flex items-center justify-between animate-slide-up">
                <div className="md:hidden flex items-center gap-3">
                  <div className="w-8 h-8 p-1.5 rounded-xl" style={{background:'linear-gradient(135deg,#1a4fff,#0033e6)'}}><IWrench/></div>
                  <span className="font-extrabold">VynixPanelB</span>
                </div>
                <div className="hidden md:block">
                  <h1 className="text-2xl font-bold">{view==='dashboard'?'Dashboard':'New Estimate'}</h1>
                  <p className="text-sm mt-0.5" style={{color:'rgba(255,255,255,0.4)'}}>{view==='dashboard'?'Real-time estimates from Firebase':'Follow the steps below'}</p>
                </div>
                <img src={user.photoURL||''} alt="" className="w-9 h-9 rounded-full md:hidden" style={{border:'1px solid rgba(255,255,255,0.1)'}}/>
              </header>

              {view === 'wizard'
                ? <EstimateWizard onComplete={()=>setView('dashboard')}/>
                : <Dashboard onNew={()=>setView('wizard')}/>
              }
            </div>
          </main>

          {/* Mobile bottom nav */}
          <nav className="md:hidden fixed bottom-0 left-0 right-0 z-50 px-6 py-3 flex justify-around items-center"
            style={{background:'rgba(7,12,26,0.95)',backdropFilter:'blur(20px)',borderTop:'1px solid rgba(255,255,255,0.07)',paddingBottom:'calc(0.75rem + env(safe-area-inset-bottom))'}}>
            <button onClick={()=>setView('dashboard')} className="flex flex-col items-center gap-1 p-2" style={{color:view==='dashboard'?'#00f5ff':'rgba(255,255,255,0.35)'}}>
              <IDash/><span className="text-[9px] font-bold tracking-widest">HOME</span>
            </button>
            <button onClick={()=>setView('wizard')} className="p-4 rounded-full -translate-y-5" style={{background:'linear-gradient(135deg,#1a4fff,#0033e6)',boxShadow:'0 0 25px rgba(26,79,255,0.6)',border:'3px solid rgba(7,12,26,0.9)'}}>
              <ICar/>
            </button>
            <button onClick={()=>auth.signOut()} className="flex flex-col items-center gap-1 p-2" style={{color:'rgba(255,59,59,0.6)'}}>
              <ILogout/><span className="text-[9px] font-bold tracking-widest">LOGOUT</span>
            </button>
          </nav>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
</html>
